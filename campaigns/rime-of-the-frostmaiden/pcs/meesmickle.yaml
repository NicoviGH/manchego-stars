# pcs/meesmickle.yaml — Meesmickle, Warlock (The Fiend)
# Source: data/pc-sheets/meesmickle.json + References/PCs/Meesmickle Character Sheet.pdf
# Class roster: docs/CLASSES.md (generated). Rationale: docs/decisions.md §Class Mapping & Promotions.

id: meesmickle
name: Meesmickle
death_quote: "Nine lives. ...Somebody miscounted."  # falls-in-battle quote (#6 dialogue pass; lore/meesmickle.md)
lord_pitch: "Dark mage -- hits resistance at range, but fragile."  # lord-select card blurb (#46): plain + qualitative, FE8 class-help register (no stats); Nicolas-confirmed 2026-06-21
portrait_ref: portraits/meesmickle.png   # GBA-ready sprite pending (issue #23)
portrait_source: data/portraits/meesmickle.jpeg
# Portrait source: https://www.dndbeyond.com/avatars/25348/435/1581111423-72613637.jpeg

# ── Custom Art Brief (decided 2026-06-01 portrait walkthrough) ───────────────────
# ALL parts custom indexed-palette art. Follow the concept ref faithfully.
# Vampire Tabaxi — must read as totally distinct from Marty (the OTHER Shaman).
art:
  render:                     # exact reproduction of the shipped bust (tools/ref_to_bust.py)
    flip_h: true               # bust faces right; flip to FE8's canonical screen-left facing
    ref: "References/PCs/Meesmickle Clean.png"
    crop: [40, 255, 1864, 1775]    # ref pixels, ~1.2 aspect — shifted +40 right (subject left)
    zoom: 0.88                     # headroom so both cape halves clear FE8's dead top corners (3px residual)
    hand_pass: null
  approach: custom
  fidelity: faithful
  must_keep:                  # tells that make the bust read as "Meesmickle"
    - sleek black cat face (vampire tabaxi)
    - red Dracula cape with a high standing collar
    - sparkly rhinestone/diamond bib necklace
  face: visible               # cat eyes blink, small mouth for talk
  composition: clean-field    # NO cosmic background — neutral FE field so the red cape pops
  expression: regal-diva      # aloof, half-lidded, smug pampered aristocat (comedic charm)
  palette_plan: >             # rough 16-color budget (incl. index-0 transparent)
    cat blacks ×3 (cool-blue-tinted) + fur highlight, cape reds ×3, white +
    pale-grey diamond bling, green cat-eye, pink nose/mouth, black outline.
  map_sprite:                 # overworld idle/walk base (issue #38 art loop; Nicolas's pick 2026-06-05)
    base: Gargoyle            # geometry token only (32x32, 3-frame). ART = FE-Repo "Tiger" side frames (RandomWizard, Squaresoft) reskinned to the black aristocat; see CREDITS.md.
    footprint: 16x16          # cat-sized (sprite frame is 32x32; reads party-scale)
    weapon: none              # quadruped holds nothing; mechanically still a Shaman (dark tome), cast not shown
    adds:
      - round the snout into a cat face + pointy cat ears
      - restyle the flame-mane; recolour fur black (cool-blue-tinted)
      - red cape draped over the back
      - green cat-eye

# ── D&D 5e Source (reference only — does NOT drive FE mechanics) ────────────────
# FE stats come verbatim from the vanilla class below, not from D&D scores.
# Raw sheet: data/pc-sheets/meesmickle.json  ·  Curated flavor: lore/meesmickle.md
dnd:
  race: Vampire Tabaxi
  class: "Warlock (The Fiend)"
  source: data/pc-sheets/meesmickle.json
  lore: lore/meesmickle.md

# ── FE Starting Stats (Chapter 1 / level 1 equivalent) ─────────────────────────
# Adjust during Phase 1 playtesting.
fe_stats:
  class: Shaman              # FE base class Shaman — dark magic user
  level: 1
  # Vanilla FE8 Shaman stats, verbatim from data_classes.c [CLASS_SHAMAN - 1]. No D&D-derived tuning.
  # Shaman is a magic unit: single Pow stat is the magic attack (= MAG), no STR.
  # LCK: ClassData has no base luck — set 0 until personal luck is assigned deliberately.
  HP: 16
  MAG: 2                     # FE Pow (Shaman basePow) — magic attack stat
  SKL: 1
  SPD: 2
  DEF: 2
  RES: 4
  LCK: 0                     # ClassData has no base luck
  MOV: 5                     # Shaman baseMov
  CON: 7

# ── Promotion (FE8 branched — the PLAYER chooses at the Master Seal) ──────────────
promotion:
  branch: [Druid, Summoner]  # vanilla Shaman branch (classchg-data.c [CLASS_SHAMAN])
  default: Summoner          # thematic lean; player may pick either. Summoner grants the vanilla
                             # FE8 Summon command (CA_SUMMON) — a stock class feature, not custom.

# ── Growth Rates (% per level) — vanilla Shaman growths from data_classes.c ──────
growth_rates:
  HP: 50
  MAG: 50
  SKL: 32
  SPD: 30
  DEF: 10
  RES: 30
  LCK: 20

# ── Inventory (Chapter 1 starting equipment) ─────────────────────────────────
# MVP: stock FE weapons — tome stats inherited from the vanilla item in `fe_base` (no custom
# Might). Eldritch/force flavor rides on the sprite art + damage_type label. The reflavored
# Vulnerary is the party-wide "Goodberry" (campaign.yaml item_names); narrative flavor: he
# crushes the berry into a blood-dark draught rather than quaffing a potion.
inventory:
  - id: eldritch-blast
    name: "Eldritch Blast"
    # Flavor name (Hexbolt); mechanically the basic Dark tome (stock 'Flux' stats — name-only reskin).
    fe_base: flux
    fe_weapon_type: Dark      # FE Shaman weapon class (baseRanks ITYPE_DARK)
    range: 2
    damage_type: force        # cosmetic flavor label only
  - id: goodberry
    name: "Goodberry"         # reflavored Vulnerary (party-wide name; her "blood-dark draught")
    fe_base: vulnerary
    uses: 3
# -- Unique Abilities ------------------------------------------------------
# NONE. Meesmickle is a stock FE8 Shaman -- no per-character mechanics, even on promotion.
# Individuality comes from flavor text, portrait/sprite art, and palette -- not special
# skills (Nicolas's call, 2026-05-29: vanilla classes only, nothing extra: no timed
# buffs/debuffs, no special movement, no procs).

signature_moment:
  chapter: ch09-revels-end   # post-MVP (Act II opener — roadmap.md Ch 9, the prison break)
  description: >
    The Revel's End prison break. As the party each does their part to escape,
    Meesmickle reveals a fake "toe bean" concealing a bound giant orc and looses it
    to spark a riot — the distraction that covers the breakout. Mechanically a
    scripted event-summon (the orc spawns as a hostile NPC that turns the prison
    against its guards). It also seeds his Summoner promotion: the first Master Seal
    is looted at Revel's End (roadmap.md / decisions.md promotion seam), and the
    Summon command (CA_SUMMON) the Summoner branch grants is the vanilla mechanic
    this beat foreshadows — phantom-summoning becomes his signature going forward.
  dialogue_trigger: meesmickle_toebean_orc
  # Sourced from Nicolas's recall — past the DM notes (which end at the Eastway
  # capture, with the party hauled off to Revel's End). Fits the Summoner branch
  # (promotion.default = Summoner above).

