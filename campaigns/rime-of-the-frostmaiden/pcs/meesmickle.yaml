# pcs/meesmickle.yaml — Meesmickle, Warlock (The Fiend)
# Source: data/pc-sheets/meesmickle.json + References/PCs/Meesmickle Character Sheet.pdf
# See docs/class-mapping.md and docs/PRD.md §6.7 for class mapping rationale.

id: meesmickle
name: Meesmickle
portrait_ref: portraits/meesmickle.png   # GBA-ready sprite pending (issue #23)
portrait_source: data/portraits/meesmickle.jpeg
# Portrait source: https://www.dndbeyond.com/avatars/25348/435/1581111423-72613637.jpeg

# ── D&D 5e Identity ────────────────────────────────────────────────────────────
dnd:
  race: "Vampire Tabaxi"     # homebrew
  class: Warlock
  subclass: "The Fiend"
  level_end_state: 20
  alignment: chaotic_neutral
  size: small                # Vampire Tabaxi — "I am a cat"
  background: Noble
  ability_scores:
    STR: 10
    DEX: 20
    CON: 19
    INT: 12
    WIS: 8
    CHA: 16
  saving_throw_proficiencies: [WIS, CHA]
  languages: [Common, Abyssal]   # per PDF p3
  hp_max: 183
  ac: 15
  racial_traits:
    # Vampire Tabaxi — from PDF page 3
    feline_agility: true        # double movement speed once per round of combat
    unholy_body: true           # healing potions deal poison damage; must drink blood/hit dice/rest to heal
    cats_claws: true            # unarmed: 1d4 slashing, climbing speed 20 ft
    darkvision: 60
    fur_coat: true              # unaffected by cold; protected from direct sunlight

# ── FE Starting Stats (Chapter 1 / level 1 equivalent) ─────────────────────────
# Adjust during Phase 1 playtesting.
fe_stats:
  class: "Shaman (Dark)"     # FE base class Shaman — dark magic user
  promoted_class: "Dark Sage"
  level: 1
  # Vanilla FE8 Shaman stats, verbatim from data_classes.c [CLASS_SHAMAN - 1]. No D&D-derived tuning.
  # Shaman is a magic unit: single Pow stat is the magic attack (= MAG), no STR.
  # LCK: ClassData has no base luck — set 0 until personal luck is assigned deliberately.
  HP: 16
  MAG: 2                     # FE Pow (Shaman basePow) — magic attack stat
  SKL: 1
  SPD: 2
  DEF: 2
  RES: 4
  LCK: 0                     # ClassData has no base luck
  MOV: 5                     # Shaman baseMov
  CON: 7

# ── Growth Rates (% per level) — vanilla Shaman growths from data_classes.c ──────
growth_rates:
  HP: 50
  MAG: 50
  SKL: 32
  SPD: 30
  DEF: 10
  RES: 30
  LCK: 20

# ── Inventory (Chapter 1 starting equipment) ─────────────────────────────────
# NOTE: Meesmickle CANNOT use healing potions — Unholy Body turns them into poison.
# Her healing items are Blood Vials (consumed to recover HP via hit dice).
inventory:
  - id: eldritch-blast-tome
    name: "Eldritch Blast"
    flavor: "Hexbolt — crackling beams of raw eldritch force lance out from her claws."
    fe_mechanic: "locked personal force tome (her basic weapon); beam count = brave-style extra hits"
    fe_weapon_type: Dark      # FE Shaman weapon class (baseRanks ITYPE_DARK); force is Dark reflavor
    damage_type: force        # D&D flavor only
    range: 2                  # FE tome range (Eldritch Spear extension is flavor)
    uses: null    # FE tome — finite uses TBD (no infinite weapons)
    locked: true              # Warlock cantrip, cannot be traded
    # BEAM COUNT scales with character level (each beam rolls + targets separately):
    #   1 beam (Ch1–4) → 2 beams (Ch5, L5) → 3 beams (Ch10, L11) → 4 beams (Ch17, L17).
    # MVP = 1–2 beams; 4 beams is endgame only.
    beam_scaling:
      - { chapters: "1-4", beams: 1 }
      - { chapters: "5-9", beams: 2 }
      - { chapters: "10-16", beams: 3 }
      - { chapters: "17-20", beams: 4 }
    notes: "Agonizing Blast (invocation, Ch2): +CHA to each beam's damage. Repelling Blast: push target 1 tile on hit."
  - id: blood-vial
    name: "Blood Vial"
    is_healing: true
    effect: spend_hit_dice    # triggers a hit die roll to recover HP — Meesmickle's only healing
    uses: 3

# ── Unique Abilities ─────────────────────────────────────────────────────────
unique_abilities:
  - id: dark-ones-blessing
    name: "Dark One's Blessing"
    # Passive: when Meesmickle reduces an enemy to 0 HP, gain temp HP equal to
    # CHA mod + FE level (~7 at ch1). Stacks across kills in the same map.
    # FE implementation: passive — on kill, apply a temp HP buff token.
    # Note: these temp HP bypass Unholy Body (not a healing potion).
    flavor: "Soul Tithe — the Fiend rewards each kill with a sliver of the victim's stolen vitality."
    fe_mechanic: "on-kill passive: gain temp HP (bypasses her healing restriction)"
    type: passive
    unlock_chapter: 1         # Fiend L1 → Ch1 (MVP)
    effect: temp_hp_on_kill
    temp_hp_value: 7          # tune in Phase 1 playtesting

  - id: hurl-through-hell
    name: "Hurl Through Hell"
    # 1/chapter nuke: after landing a hit with Eldritch Blast, the target is
    # briefly banished and takes 10d10 psychic damage on return.
    # FE implementation: activated skill usable immediately after a successful
    #   Eldritch Blast hit; adds 10d10 psychic to that attack's result.
    flavor: "Damnation — she banishes a foe screaming through the Nine Hells; it returns broken."
    fe_mechanic: "1/chapter finisher proc: after an Eldritch Blast hit, adds a massive psychic burst"
    type: activated
    unlock_chapter: 13        # The Fiend L14 → Ch13 (POST-MVP)
    uses_per_chapter: 1
    damage_dice: "10d10"
    damage_type: psychic
    trigger: after_hit

  - id: one-with-shadows
    name: "One with Shadows"
    # Activated action: spend Meesmickle's turn action to become invisible.
    # Stays invisible until she moves OR takes any action/reaction.
    # Cannot be targeted by ranged attacks while invisible; -3 to adjacent hit rates.
    # FE implementation: activated command (costs turn action, like a Guard stance).
    #   Moving from the tile breaks invisibility.
    flavor: "Shadowmeld — the cat melts into the dark and simply isn't there anymore."
    fe_mechanic: "activated stance: untargetable by ranged until she moves or acts (Invocation, Ch2)"
    type: activated           # costs action — NOT a passive
    unlock_chapter: 2         # Eldritch Invocation tier → Ch2 (MVP)
    effect: invisible_until_move_or_act

  - id: feline-agility
    name: "Feline Agility"
    # Vampire Tabaxi racial: once per round, can double movement speed.
    # In FE: once per turn, after using her action, may move again (full MOV).
    # Models the burst-of-speed that resets each round.
    # FE implementation: passive — after attacking, Meesmickle may move a second time.
    type: passive
    unlock_chapter: 1         # racial — available from start
    effect: bonus_movement_after_action
    uses_per_turn: 1

  - id: unholy-body
    name: "Unholy Body"
    # Vampire Tabaxi racial: Meesmickle is undead. Dark magic sustains her.
    # CRITICAL GAMEPLAY RULE: healing potions (vulneraries) deal POISON damage
    # to Meesmickle instead of restoring HP. Cannot accept healing items from allies.
    # To recover HP: she must drink blood (Blood Vial item), spend hit dice after
    # battle, or finish a long rest (= chapter end).
    # FE implementation: passive flag checked during item use; potions redirect to poison.
    # NOTE: FE8 has no damage-type system, so the D&D "necrotic resistance" is FLAVOR ONLY and has
    # no mechanical effect (no ×0.5, no element-keyed defense). Removed as a mechanic.
    type: passive
    unlock_chapter: 1         # racial — available from start
    effect: healing_items_deal_poison

  - id: fiendish-resilience
    name: "Fiendish Resilience"
    # FE-native: a timed +DEF/RES self-buff (engine/status def_buff_timed). FE8 has no damage-type
    # resistance, so there is NO damage-type selection menu and NO ×0.5 multiplier — just flat +DEF/RES.
    flavor: "Infernal Hide — her fur hardens against whatever's hurting her most today."
    fe_mechanic: "1/chapter: timed flat +DEF/RES self-buff (FE-native)"
    type: activated
    unlock_chapter: 9         # The Fiend L10 → Ch9 (POST-MVP)
    uses_per_chapter: 1
    effect: timed_def_res_buff

  - id: power-word-kill
    name: "Power Word Kill"
    # 9th-level Mystic Arcanum (PDF spell page). 1/long rest.
    # Speak a word of power: target with ≤100 HP dies instantly. No save.
    # FE implementation: activated command. Target must have current HP ≤ threshold or it fails.
    # Devastating endgame finisher; pairs with Hurl Through Hell as nuke combo.
    flavor: "Word of Ending — she speaks a single syllable of the Abyss and a weakened foe simply stops."
    fe_mechanic: "1/chapter: instakill a target already below the HP threshold (no save)"
    type: activated
    unlock_chapter: 17        # 9th-level Mystic Arcanum (Warlock L17) → Ch17 (deep endgame)
    uses_per_chapter: 1
    target_max_hp: 100
    effect: instant_kill_if_under_threshold

  - id: demiplane
    name: Demiplane
    flavor: "She folds open a pocket of stone-walled nowhere — handy for stashing loot or hiding."
    fe_mechanic: "NONE — dropped as a combat ability (no FE analogue). Narrative/utility only."
    # 8th-level Mystic Arcanum. DROPPED as a usable mechanic per rules-mapping §C (no clean FE
    # analogue for a tactical map). Kept only as a narrative beat she can invoke between battles.
    type: narrative_utility
    unlock_chapter: 15        # would arrive at Warlock L15 → Ch15, but non-combat
    effect: narrative_only

  # ── Known Spell Kit (Warlock = KNOWN-caster; this is her short Pact list) ──
  # DUAL STRUCTURE: fe_mechanic = vanilla FE8 anchor; flavor = fiend-pact vampire-cat reskin.
  # Pact slot level → chapter: 1st→Ch1, 2nd→Ch3, 3rd→Ch5, 4th→Ch7. Mystic Arcanums separate
  # (6th→Ch10, 7th→Ch13, 9th→Ch17 — the big 1/chapter spells).

  - id: toll-the-dead
    name: "Toll the Dead"
    flavor: "Death Knell — a mournful bell that tolls louder for the already-wounded."
    fe_mechanic: "dark tome cantrip; deals extra damage to targets below full HP"
    type: spell_tome
    spell_level: 0            # cantrip
    unlock_chapter: 1
    damage_type: necrotic
    save: WIS
    range: 4
    uses: null    # FE tome — finite uses TBD (no infinite weapons)
    effect: bonus_damage_vs_wounded

  - id: hellish-rebuke
    name: "Hellish Rebuke"
    flavor: "Spite — strike the cat and hellfire lashes back up your arm."
    fe_mechanic: "counterattack proc: when hit in melee, auto-deal fire damage to the attacker"
    type: reaction
    spell_level: 1
    unlock_chapter: 1
    uses_per_chapter: 3
    damage_type: fire
    save: DEX
    trigger: when_hit

  - id: burning-hands
    name: "Burning Hands"
    flavor: "Brimstone Breath — a fan of sulfurous hellfire from her spread claws."
    fe_mechanic: "fire tome, short cone (a few adjacent tiles)"
    type: spell_tome
    spell_level: 1
    unlock_chapter: 1
    uses_per_chapter: 2
    damage_type: fire
    save: DEX
    range: 1
    aoe: cone

  - id: suggestion
    name: "Suggestion"
    flavor: "Honeyed Whisper — a purring command the target's body obeys before the mind objects."
    fe_mechanic: "charm flag: target can't act against Meesmickle this turn (treats her as ally)"
    type: spell_tome
    spell_level: 2
    unlock_chapter: 3
    uses_per_chapter: 1
    save: WIS
    range: 3
    effect: charm_cant_act_vs_caster

  - id: fireball
    name: "Fireball"
    flavor: "Hellfire Burst — a bead of fiend-fire that blooms into an inferno."
    fe_mechanic: "fire siege tome (AoE compromised to siege-range single-target)"
    type: spell_tome
    spell_level: 3
    unlock_chapter: 5
    uses_per_chapter: 1
    damage_type: fire
    save: DEX
    range: 5

  - id: vampiric-touch
    name: "Vampiric Touch"
    flavor: "Bloodletting — she drinks the life out of a foe; perfect for a vampire who can't sip potions."
    fe_mechanic: "Nosferatu (dark drain): damages the target and heals Meesmickle for a share"
    type: spell_tome
    spell_level: 3
    unlock_chapter: 5
    uses_per_chapter: 2
    damage_type: necrotic
    range: 1
    effect: damage_and_self_heal   # bypasses Unholy Body's potion restriction

  - id: dark-ones-own-luck
    name: "Dark One's Own Luck"
    flavor: "Devil's Favor — the Fiend tips a roll her way, just this once."
    fe_mechanic: "1/chapter: reroll one of her own failed attacks or saves"
    type: activated
    unlock_chapter: 6         # The Fiend L6 → Ch6 (MVP)
    uses_per_chapter: 1
    effect: reroll_self

  - id: eyebite
    name: "Eyebite"
    flavor: "Evil Eye — a baleful stare that sickens, panics, or simply drops a foe where it stands."
    fe_mechanic: "1/chapter status proc: inflict one of poison / fear-debuff / sleep on a target"
    type: activated
    spell_level: 6            # 6th Mystic Arcanum
    unlock_chapter: 10        # Warlock L11 → Ch10 (POST-MVP)
    uses_per_chapter: 1
    save: WIS
    range: 4
    effect: choose_status_sicken_panic_sleep

  - id: finger-of-death
    name: "Finger of Death"
    flavor: "Reaper's Touch — a word of unmaking; the slain rise to serve her."
    fe_mechanic: "dark nuke; if it kills a target, that target rises as a temporary thrall (summon-on-kill)"
    type: activated
    spell_level: 7            # 7th Mystic Arcanum
    unlock_chapter: 13        # Warlock L13 → Ch13 (POST-MVP)
    uses_per_chapter: 1
    damage_type: necrotic
    save: CON
    range: 4
    effect: damage_and_raise_thrall_on_kill

# ── Signature Moment ─────────────────────────────────────────────────────────
