# pcs/sclorbo.yaml — Sclorbo, Bard (College of Lore)
# Source: data/pc-sheets/sclorbo.json + References/PCs/Sclorbo Character Sheet.pdf
# NOTE: Level 16 vs. 20 for the rest of the party — player left before campaign end.
# See docs/class-mapping.md and docs/PRD.md §6.7 for class mapping rationale.

id: sclorbo
name: Sclorbo
portrait_ref: portraits/sclorbo.png     # GBA-ready sprite pending (issue #23)
portrait_source: data/portraits/sclorbo.jpeg
# Portrait source: https://www.dndbeyond.com/avatars/25339/252/1581111423-72588721.jpeg

# ── D&D 5e Identity ────────────────────────────────────────────────────────────
dnd:
  race: Chwinga                   # homebrew nature elemental
  class: Bard
  subclass: "College of Lore"
  level_end_state: 16             # lowest in party (player left before campaign end)
  alignment: chaotic_good         # CORRECTED: Chaotic Good (not Chaotic Neutral — PDF confirmed)
  size: small                     # Chwinga — tiny nature elemental
  background: "Folk Hero"
  personality: "If someone is in trouble, I'm always ready to lend help. I'm confident in my own abilities and do what I can to instill confidence in others."
  ideal: "Sincerity. There's no good in pretending to be something I'm not. (Neutral)"   # CORRECTED 2026-05-27 — PDF p4
  bond: "I protect those who cannot protect themselves."
  flaw: "The people who knew me when I was young know my shameful secret, so I can never go home."
  speech: none                    # Sclorbo CANNOT SPEAK — communicates via telepathy within 20 ft.
                                  # FE implementation: dialogue uses telepathic impression flavor.
  ability_scores:
    STR: 13
    DEX: 15
    CON: 12
    INT: 8
    WIS: 18
    CHA: 17
  saving_throw_proficiencies: [DEX, CHA]
  languages: [Common]                # PDF doesn't list extras; Common assumed (Chwinga base)
  hp_max: 99
  ac: 12
  speed_ft:
    walking: 30
    swimming: 20
  racial_traits:
    # Chwinga (homebrew nature elemental) — from PDF page 3
    chwinga_telepathy:
      # Sclorbo's only form of communication — cannot produce speech.
      # FE implementation: all dialogue uses telepathic impression flavor (italics, no quotes).
      range_ft: 20
    evasion:
      # When subjected to an effect allowing a DEX save for half damage:
      # no damage on success, half damage on failure.
      # FE implementation: passive flag on all DEX saves.
      no_damage_on_save: true
      half_damage_on_fail: true
    magical_gift:
      # Action: charm one humanoid within 5 ft (WIS save DC 16). 1/long rest (= 1/chapter).
      # FE implementation: activated command — adjacent humanoid enemy saves or is charmed
      #   (cannot act against Sclorbo this turn; treated as allied for reactions).
      uses_per_chapter: 1
      range_ft: 5
      save: WIS
      save_dc: 16
      effect: charmed
    natural_shelter:
      # Can hide inside rocks, plants, or water tiles — invulnerable while inside.
      # Emerge as a bonus action.
      # FE implementation: activated command — sink into adjacent terrain, become untargetable.
      effect: untargetable_while_inside
      exit: bonus_action

# ── FE Starting Stats (Chapter 1 / level 1 equivalent) ─────────────────────────
# Sclorbo is a Dancer — Dance replaces Attack. Adjust during Phase 1 playtesting.
fe_stats:
  class: "Dancer (Bard)"
  promoted_class: "Lore Bishop (custom)"  # Dancer chassis at base; Bishop-tier healer at promotion,
                                          # Dance retained as a unique skill.
                                          # Changed 2026-05-27 to reflect Cure Wounds / Revivify /
                                          # Mass Cure Wounds / Raise Dead prepared list (PDF p5).
                                          # NOTE: reviver kit (Revivify/Mass Cure/Raise Dead) is
                                          # gated POST-MVP — in MVP he only has Cure Wounds.
                                          # See docs/decisions.md + unique_abilities.bard-healing-suite.
  level: 1
  HP: 16
  STR: 3                          # STR 13 — slightly stronger than other casters
  MAG: 5                          # CHA 17 → buff/debuff spell potency
  SKL: 5
  SPD: 8                          # DEX 15 + Dancer mobility → fast
  DEF: 2                          # lightest armor in the party
  RES: 7                          # WIS 18 → high RES, second only to Marty
  LCK: 6                          # CHA 17 + Dancer archetype → high luck
  MOV: 6
  CON: 7

# ── Growth Rates (% per level, FE standard) ──────────────────────────────────
# Slightly lower ceilings reflecting level 16 end-state.
growth_rates:
  HP: 45
  STR: 15
  MAG: 40
  SKL: 40
  SPD: 60
  DEF: 15
  RES: 55
  LCK: 50

# ── Inventory (Chapter 1 starting equipment) ─────────────────────────────────
inventory:
  - id: rapier
    name: Rapier
    damage_type: piercing
    weapon_dice: "1d6"
    ability_mod: DEX
    range: melee
    uses: null
  - id: ray-of-frost
    name: "Ray of Frost"
    flavor: "Frostsong — a shivering note of cold that crackles across the target and slows it."
    fe_mechanic: "ice tome cantrip; on hit, target loses MOV/SPD (slow proc)"
    damage_type: cold
    weapon_dice: "1d8"            # ch1 equivalent; end-state 3d8 via Additional Magical Secrets
    ability_mod: CHA              # +8 to hit at end-state (CHA + prof)
    range: 3                      # 60 ft → ~3 FE tiles
    uses: null                    # cantrip — infinite uses
    notes: "Acquired via Additional Magical Secrets (College of Lore). Also applies -10 ft MOV on hit."
  - id: vicious-mockery
    name: "Vicious Mockery"
    flavor: "Withering Impression — a telepathic jab of pure derision that rattles a foe's nerve."
    fe_mechanic: "psychic tome cantrip; on hit, target attacks at −hit next turn (his primary attack)"
    damage_type: psychic
    weapon_dice: "1d4"            # cantrip — scales at higher chapters
    ability_mod: CHA
    range: 3                      # 60 ft
    uses: null                    # cantrip — infinite uses
    notes: "On hit: target has disadvantage on its next attack roll (WIS save DC negates damage only)."
  - id: heal-staff
    name: "Heal Staff"
    flavor: "Mending Hum — a soothing telepathic resonance that knits flesh back together."
    fe_mechanic: "vanilla FE Heal staff, single-target restore"
    # Sclorbo's Cure Wounds spell (Bard 1st). THE ONLY HEAL HE HAS IN MVP (Ch1–7) —
    # all raise-dead-type healing is gated POST-MVP per Nicolas's call (2026-05-28).
    is_staff: true
    effect: restore_hp
    staff_dice: "1d8+MAG"
    uses: 8                       # 8 staff charges per chapter (= 1st-level slot count)
  - id: vulnerary
    name: "Healing Potion"
    uses: 2

# ── D&D-Derived Stat Overrides ───────────────────────────────────────────────
# FLAVOR ONLY (combat revert 2026-05-28): combat is vanilla FE. `AC`, `prof_bonus`, `ability_mod_atk`
# here — and every `save:`/`save_dc:`/`advantage*` field in this file — are source-of-record/flavor,
# NOT read by resolution (defense = FE DEF/RES + avoid; no saves; no advantage). NOTE: `spell_slots`
# below IS still used by engine/spell-slots. See docs/decisions.md §Combat System.
d20_fields:
  AC: 12
  ability_mod_atk: CHA
  prof_bonus: 2
  spell_slots: "3"                # 3×1st-level (Bard level 2)

# ── Unique Abilities ─────────────────────────────────────────────────────────
unique_abilities:
  - id: dance
    name: Dance
    # FE Dancer core: spend Sclorbo's action to refresh an adjacent ally's movement
    # and action for the turn. Standard FE Dancer mechanic.
    # BALANCE LEVER (2026-05-27): Dance and Cast are mutually exclusive per turn.
    # On any given turn Sclorbo picks ONE: Dance/Refresh OR spell-cast/heal/buff.
    # This prevents Lore Bishop from being a one-man support engine.
    flavor: "An encouraging telepathic nudge that spurs an ally to move and strike again."
    fe_mechanic: "vanilla FE Dancer refresh — grants an ally another turn"
    type: dancer_refresh
    unlock_chapter: 1
    range: 1
    mutually_exclusive_with: [spell_cast, heal_staff, bardic_inspiration]

  - id: bardic-inspiration
    name: "Bardic Inspiration"
    flavor: "Inspiring Impression — Sclorbo beams a wave of confidence into an ally's mind."
    fe_mechanic: "ally buff: grants a bonus die added to their next attack or save"
    # Grant an adjacent ally an inspiration die added to their next attack or save.
    # Uses = CHA mod (3/chapter). Die grows with bard level on the 1:1 curve.
    type: activated
    unlock_chapter: 1
    uses_per_chapter: 3
    die_scaling:
      - { chapters: "1-4", die: "1d6" }
      - { chapters: "5-8", die: "1d8" }
      - { chapters: "9-13", die: "1d10" }
      - { chapters: "14-20", die: "1d12" }
    effect: grant_inspiration_die

  - id: cutting-words
    name: "Cutting Words"
    flavor: "Cutting Impression — a perfectly-timed mental jeer that throws a foe off mid-swing."
    fe_mechanic: "auto-proc debuff: subtracts from a nearby enemy's attack/save roll (no player input)"
    # Reaction: when an enemy within 3 tiles attacks, subtract 1d6 from their roll. CHA save DC 14.
    type: reaction
    unlock_chapter: 3         # College of Lore L3 → Ch3 (MVP)
    range: 3
    die: "1d6"
    save: CHA
    save_dc: 14

  - id: magical-gift
    name: "Magical Gift"
    # Chwinga racial: charm adjacent humanoid (WIS save DC 16). 1/chapter.
    # FE implementation: activated command — target cannot counterattack Sclorbo this turn.
    type: activated
    unlock_chapter: 1         # racial — available from start
    uses_per_chapter: 1
    range: 1
    save: WIS
    save_dc: 16
    effect: charmed

  - id: natural-shelter
    name: "Natural Shelter"
    # Chwinga racial: hide inside adjacent rock, plant, or water tile.
    # While inside: untargetable by all attacks and effects.
    # FE implementation: activated command — sink into terrain, become untargetable.
    type: activated
    unlock_chapter: 1         # racial — available from start
    effect: untargetable_in_terrain
    exit: bonus_action_emerge

  - id: evasion
    name: Evasion
    # Chwinga racial: on DEX save for half damage — no damage on success, half on failure.
    # FE implementation: passive flag on all DEX saves.
    type: passive
    unlock_chapter: 1         # racial — available from start
    effect: evasion_on_dex_saves

  - id: jack-of-all-trades
    name: "Jack of All Trades"
    # Passive: Sclorbo never counts as untrained — minor universal accuracy bonus.
    type: passive
    unlock_chapter: 2         # Bard L2 → Ch2 (MVP)
    effect: never_untrained

  - id: bard-healing-suite
    name: "Bard Healing Suite"
    flavor: "Sclorbo's restorative repertoire — humming, chiming impressions that mend and revive."
    fe_mechanic: "a progression of vanilla FE staves (Heal → Physic/Recover → Revive)"
    # Per PDF p5 — Sclorbo's reviver kit: Cure Wounds (1st), Revivify (3rd, via Lore's Additional
    # Magical Secrets), Mass Cure Wounds (5th), Raise Dead (5th). He's the party's revival caster.
    #
    # GATING CORRECTED 2026-05-28 (Nicolas's fork): the reviver role is POST-MVP. Even though
    # Revivify (3rd-level) is *mechanically* reachable by Ch6 via Additional Magical Secrets, we
    # deliberately gate ALL raise-dead-type healing to Ch9+ to preserve FE Classic-mode permadeath
    # tension in the first third. MVP heal = Cure Wounds ONLY.
    # (The earlier "Revivify is 5th-level" note was wrong — it's 3rd — but the post-MVP
    #  conclusion stands, for pacing reasons rather than spell-level reasons.)
    type: progression_note
    spells:
      - { name: "Cure Wounds", level: 1, staff_id: heal-staff, unlock_chapter: 1, mvp: true }
      - { name: "Revivify", level: 3, staff_id: revive-staff, unlock_chapter: 9, mvp: false,
          flavor: "Spark of Return — a jolt of vital resonance pulls the just-fallen back." }
      - { name: "Mass Cure Wounds", level: 5, staff_id: physic-staff, unlock_chapter: 9, mvp: false,
          flavor: "Renewing Chorus — a swelling harmony that mends the whole party at once." }
      - { name: "Raise Dead", level: 5, staff_id: rescue-revive-staff, unlock_chapter: 11, mvp: false,
          flavor: "Soul Recall — Sclorbo coaxes a departed soul back into its body." }

  - id: song-of-rest
    name: "Song of Rest"
    # Between-chapter feature: allies regain extra 1d10 HP when spending Hit Dice on
    # short rest. FE implementation: between-chapter HP recovery bonus while Sclorbo is alive.
    type: between_chapter
    unlock_chapter: 2         # Bard L2 → Ch2 (MVP)
    effect: ally_extra_recovery

  # ── Known Spell Kit (Bard = KNOWN-caster; this is his curated signature set) ──
  # DUAL STRUCTURE: fe_mechanic = vanilla FE8 anchor; flavor = mute Chwinga reskin (he 'casts'
  # via telepathic impressions, hums, and chimes — no spoken words). Spell-level → chapter:
  #   1st→Ch1, 3rd→Ch5, 6th→Ch11, 7th→Ch13. Cure Wounds (heal-staff) is his ONLY MVP heal.

  - id: heroism
    name: "Heroism"
    flavor: "Heartening Presence — Sclorbo floods an ally with fearless, buoyant resolve."
    fe_mechanic: "ally buff item: grants temp HP each turn + immunity to fear for the duration"
    type: spell_tome
    spell_level: 1
    unlock_chapter: 1
    uses_per_chapter: 2
    range: 1
    effect: temp_hp_and_fearless

  - id: magic-missile
    name: "Magic Missile"
    flavor: "Unerring Motes — three darts of pale force-light that bend through the air to strike."
    fe_mechanic: "force tome that ALWAYS HITS (FE always-hit targeting); splits into multiple darts"
    type: spell_tome
    spell_level: 1
    unlock_chapter: 1
    uses_per_chapter: 2
    damage_type: force
    weapon_dice: "1d4+1"      # per dart
    darts: 3
    auto_hit: true            # no attack roll — reliable chip
    range: 4

  - id: hideous-laughter
    name: "Tasha's Hideous Laughter"
    flavor: "Fit of Giggles — Sclorbo plants an absurd impression; the target collapses cackling."
    fe_mechanic: "single-target can't-act (Sleep-style): incapacitated, can't move/act/counter"
    type: spell_tome
    spell_level: 1
    unlock_chapter: 1
    uses_per_chapter: 1
    save: WIS
    range: 3
    effect: incapacitate_single

  - id: call-lightning
    name: "Call Lightning"
    flavor: "Storm Crash — Sclorbo summons a roiling cloud overhead and calls bolts down at will."
    fe_mechanic: "thunder siege tome (long-range single-target), reusable across the map"
    type: spell_tome
    spell_level: 3
    unlock_chapter: 5
    uses_per_chapter: 2
    damage_type: thunder
    weapon_dice: "3d10"
    save: DEX
    range: 5

  - id: ottos-irresistible-dance
    name: "Otto's Irresistible Dance"
    flavor: "Puppet Jig — Sclorbo's silent rhythm hijacks a foe's body into a helpless dance."
    fe_mechanic: "hard CC: target is forced to caper — can't attack and shuffles uncontrollably"
    type: spell_tome
    spell_level: 6
    unlock_chapter: 11        # POST-MVP (Magical Secrets territory)
    uses_per_chapter: 1
    save: WIS
    range: 3
    effect: forced_dance_incapacitate

  - id: mordenkainens-sword
    name: "Mordenkainen's Sword"
    flavor: "Spirit Blade — a shimmering sword of force winks into being and fights at his command."
    fe_mechanic: "summons a temporary allied 'blade' unit that attacks on Sclorbo's turn"
    type: summon
    spell_level: 7
    unlock_chapter: 13        # POST-MVP
    uses_per_chapter: 1
    spawn_unit: force-blade
    max_active: 1

# ── Signature Moment ─────────────────────────────────────────────────────────
signature_moment:
  chapter: tbd               # NICOLAS TO RECALL — not in the DM notes
  description: >
    TBD — Nicolas to recall Sclorbo's standout campaign beat. The current DM
    notes don't single one out (only that he weathered the Targos night out in
    the snow with Rootis in Ch 2). Candidate hooks once recalled: a clutch
    Cure-Wounds heal that saves a downed ally in a big-battle chapter.
  dialogue_trigger: null

# ── Support Affinities ────────────────────────────────────────────────────────
supports:
  - partner: marty
    affinity: wind
  - partner: rootis
    affinity: ice
