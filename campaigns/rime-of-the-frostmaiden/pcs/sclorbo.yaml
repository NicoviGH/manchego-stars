# pcs/sclorbo.yaml — Sclorbo, Bard (College of Lore)
# Source: data/pc-sheets/sclorbo.json + References/PCs/Sclorbo Character Sheet.pdf
# NOTE: Level 16 vs. 20 for the rest of the party — player left before campaign end.
# See docs/class-mapping.md and docs/PRD.md §6.7 for class mapping rationale.

id: sclorbo
name: Sclorbo
portrait_ref: portraits/sclorbo.png     # GBA-ready sprite pending (issue #23)
portrait_source: data/portraits/sclorbo.jpeg
# Portrait source: https://www.dndbeyond.com/avatars/25339/252/1581111423-72588721.jpeg

# ── D&D 5e Identity ────────────────────────────────────────────────────────────
dnd:
  race: Chwinga                   # homebrew nature elemental
  class: Bard
  subclass: "College of Lore"
  level_end_state: 16             # lowest in party (player left before campaign end)
  alignment: chaotic_good         # CORRECTED: Chaotic Good (not Chaotic Neutral — PDF confirmed)
  size: small                     # Chwinga — tiny nature elemental
  background: "Folk Hero"
  personality: "If someone is in trouble, I'm always ready to lend help. I'm confident in my own abilities and do what I can to instill confidence in others."
  ideal: "Sincerity. There's no good in pretending to be something I'm not. (Neutral)"   # CORRECTED 2026-05-27 — PDF p4
  bond: "I protect those who cannot protect themselves."
  flaw: "The people who knew me when I was young know my shameful secret, so I can never go home."
  speech: none                    # Sclorbo CANNOT SPEAK — communicates via telepathy within 20 ft.
                                  # FE implementation: dialogue uses telepathic impression flavor.
  ability_scores:
    STR: 13
    DEX: 15
    CON: 12
    INT: 8
    WIS: 18
    CHA: 17
  saving_throw_proficiencies: [DEX, CHA]
  languages: [Common]                # PDF doesn't list extras; Common assumed (Chwinga base)
  hp_max: 99
  ac: 12
  speed_ft:
    walking: 30
    swimming: 20
  racial_traits:
    # Chwinga (homebrew nature elemental) — from PDF page 3
    chwinga_telepathy:
      # Sclorbo's only form of communication — cannot produce speech.
      # FE implementation: all dialogue uses telepathic impression flavor (italics, no quotes).
      range_ft: 20
    evasion:
      # When subjected to an effect allowing a DEX save for half damage:
      # no damage on success, half damage on failure.
      # FE implementation: passive flag on all DEX saves.
      no_damage_on_save: true
      half_damage_on_fail: true
    magical_gift:
      # Action: charm one humanoid within 5 ft (WIS save DC 16). 1/long rest (= 1/chapter).
      # FE implementation: activated command — adjacent humanoid enemy saves or is charmed
      #   (cannot act against Sclorbo this turn; treated as allied for reactions).
      uses_per_chapter: 1
      range_ft: 5
      save: WIS
      save_dc: 16
      effect: charmed
    natural_shelter:
      # Can hide inside rocks, plants, or water tiles — invulnerable while inside.
      # Emerge as a bonus action.
      # FE implementation: activated command — sink into adjacent terrain, become untargetable.
      effect: untargetable_while_inside
      exit: bonus_action

# ── FE Starting Stats (level 1) ────────────────────────────────────────────────
# Sclorbo is the party healer: vanilla Priest (staff healer) → Bishop (Light magic + staff).
# Class changed from Dancer 2026-05-29 (Nicolas's call): Dancer can't heal/attack in vanilla, and
# his whole kit (Cure Wounds, debuff cantrips) is healer/caster — Priest→Bishop is the native fit
# and the "Lore Bishop" promotion is just Bishop. Dropped Dance.
fe_stats:
  class: Priest                   # FE base class — male staff healer (Cleric's male counterpart)
  promoted_class: Bishop          # Light magic (attack) + staves; = the former "Lore Bishop" concept
  level: 1
  # Vanilla FE8 Priest stats, verbatim from data_classes.c [CLASS_PRIEST - 1]. No D&D-derived tuning.
  # Priest is a magic (Light/staff) class: single Pow = magic attack (= MAG). At BASE it is staff-only
  # (heals, cannot attack); the Light attack rank comes at the Bishop promotion (post-MVP).
  # LCK: ClassData has no base luck — set 0 until personal luck is assigned deliberately.
  HP: 18
  MAG: 1                          # FE Pow (Priest basePow) — magic attack stat (used from Bishop)
  SKL: 1
  SPD: 2
  DEF: 1
  RES: 5
  LCK: 0                          # ClassData has no base luck
  MOV: 5                          # Priest baseMov
  CON: 5

# ── Growth Rates (% per level) — vanilla Priest growths from data_classes.c ──────
growth_rates:
  HP: 50
  MAG: 30
  SKL: 35
  SPD: 32
  DEF: 8
  RES: 50
  LCK: 45

# ── Inventory (Chapter 1 starting equipment) ─────────────────────────────────
# FE-LEGAL for Priest→Bishop: Heal Staff is a base-Priest staff; the attack cantrips are Light tomes
# usable from the Bishop promotion (base Priest is staff-only). Rapier removed — no Sword rank exists
# anywhere on the Priest/Bishop line (FE-strict: a healer carries no sword).
inventory:
  - id: heal-staff
    name: "Heal Staff"
    flavor: "Mending Hum — a soothing telepathic resonance that knits flesh back together."
    fe_mechanic: "vanilla FE Heal staff, single-target restore (Mag-based; no D&D dice)"
    # Sclorbo's Cure Wounds spell (Bard 1st). His MVP heal — reviver kit is gated POST-MVP.
    fe_weapon_type: Staff         # FE Priest weapon class (baseRanks ITYPE_STAFF) — vanilla at base
    is_staff: true
    effect: restore_hp
    uses: 8                       # 8 staff charges per chapter (= 1st-level slot count)
  - id: ray-of-frost
    name: "Ray of Frost"
    flavor: "Frostsong — a shivering note of cold that crackles across the target."
    fe_weapon_type: Light         # FE Bishop attack rank; cold flavor reskinned to Light
    unlock: promotion             # base Priest is staff-only; usable once promoted to Bishop
    damage_type: cold             # D&D flavor only
    range: 2                      # FE Light tome range
    uses: null    # FE tome — finite uses TBD (no infinite weapons)
    notes: "Vanilla Light tome — no slow/MOV proc (D&D effect dropped)."
  - id: vicious-mockery
    name: "Vicious Mockery"
    flavor: "Withering Impression — a telepathic jab of pure derision."
    fe_weapon_type: Light         # FE Bishop attack rank; psychic flavor reskinned to Light
    unlock: promotion             # base Priest is staff-only; usable once promoted to Bishop
    damage_type: psychic          # D&D flavor only
    range: 2                      # FE Light tome range
    uses: null    # FE tome — finite uses TBD (no infinite weapons)
    notes: "Vanilla Light tome — no −hit/disadvantage proc (D&D effect dropped)."
  - id: vulnerary
    name: "Healing Potion"
    uses: 2
# -- Unique Abilities ------------------------------------------------------
# NONE. Sclorbo is a stock FE8 Priest -- no per-character mechanics, even on promotion.
# Individuality comes from flavor text, portrait/sprite art, and palette -- not special
# skills (Nicolas's call, 2026-05-29: vanilla classes only, nothing extra: no timed
# buffs/debuffs, no special movement, no procs).

signature_moment:
  chapter: tbd               # NICOLAS TO RECALL — not in the DM notes
  description: >
    TBD — Nicolas to recall Sclorbo's standout campaign beat. The current DM
    notes don't single one out (only that he weathered the Targos night out in
    the snow with Rootis in Ch 2). Candidate hooks once recalled: a clutch
    Cure-Wounds heal that saves a downed ally in a big-battle chapter.
  dialogue_trigger: null

# ── Support Affinities ────────────────────────────────────────────────────────
supports:
  - partner: marty
    affinity: wind
  - partner: rootis
    affinity: ice
