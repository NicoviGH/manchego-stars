# pcs/rootis.yaml — Rootis, Sorcerer (Draconic Bloodline — White Dragon)
# Source: data/pc-sheets/rootis.json + References/PCs/Rootis Character Sheet.pdf
# IMPORTANT: Dragon Ancestry is WHITE (Cold), NOT fire. JSON did not specify this.
# See docs/class-mapping.md and docs/PRD.md §6.7 for class mapping rationale.

id: rootis
name: Rootis
portrait_ref: portraits/rootis.png      # GBA-ready sprite pending (issue #23)
portrait_source: data/portraits/rootis.jpeg   # note: source file was named "Rootis Character Sheet.jpeg" — it's the portrait
# Portrait source: https://www.dndbeyond.com/avatars/25348/565/1581111423-72613710.jpeg

# ── D&D 5e Identity ────────────────────────────────────────────────────────────
dnd:
  race: Snowperson           # homebrew — literally made of snow
  class: Sorcerer
  subclass: "Draconic Bloodline"
  dragon_ancestor: "White Dragon"  # COLD ancestry — Elemental Affinity is cold, not fire
  level_end_state: 20
  alignment: neutral_good
  size: medium               # 4 ft tall, gender: snowman, eyes: coal (PDF p4)
  background: "Custom Background"
  personality: "There's nothing I like more than a good mystery."
  ideal: "No Limits. Nothing should fetter the infinite possibility inherent in all existence. (Chaotic)"
  bond: null                 # PDF p4: blank
  flaw: "I overlook obvious solutions in favor of complicated ones."
  ability_scores:
    STR: 8
    DEX: 18
    CON: 20
    INT: 12
    WIS: 11
    CHA: 17
  saving_throw_proficiencies: [CON, CHA]
  languages: [Celestial, Common, Draconic, Primordial]   # per PDF p1
  hp_max: 202                # CORRECTED: includes Draconic Resilience +20 HP
  ac: 17                     # Draconic Resilience: AC = 13 + DEX mod when unarmored
                             # (PDF p2). DEX 18 → AC 17. Scales with DEX, not flat.
  speed_ft:
    walking: 25
    flying: 25               # Dragon Wings = POST-MVP transform (5e L14 → Ch13). Through MVP
                             # Rootis is a foot Mage (Ice); flying unlocks only at Ch13.
    climbing: 20
    swimming: 35
  racial_traits:
    # Snowperson — from PDF page 3
    frosty_form:
      cold_immunity: true    # full Cold damage immunity
      cold_terrain_immune: true  # unaffected by difficult terrain from ice/cold
    heat_vulnerability: true # vulnerable to fire damage (×2 incoming fire)
    snow_body:
      resistance: [bludgeoning, piercing, slashing]  # resistant to ALL physical damage
    crystallize:
      # Action: freeze body — become IMMUNE to slashing and piercing,
      # but LOSE bludgeoning resistance. 1/long rest (= 1/chapter).
      # FE implementation: activated command — player chooses when to crystallize.
      uses_per_chapter: 1
      grants_immunity: [slashing, piercing]
      removes_resistance: [bludgeoning]
    elemental_properties:
      # If hit by an ice-based attack, recover HP instead of taking damage.
      # FE implementation: passive — cold-type incoming attacks trigger a heal flag.
      heals_from_cold: true
    body_building:
      # If surrounded by snow tiles, can spend an action to absorb snow and recover 2d4 HP.
      # 1/short or long rest (= once per map phase).
      uses_per_map: 1
      heal_dice: "2d4"
      requires_snow_terrain: true
    snow_ski:
      # Double movement speed on ice/snow terrain tiles.
      # Very relevant — most maps in this campaign are arctic.
      # FE implementation: passive — on snow/ice tiles, MOV doubles.
      effect: double_mov_on_ice_snow

# ── FE Starting Stats (Chapter 1 / level 1 equivalent) ─────────────────────────
# Rootis is an ice/cold sorcerer, NOT fire. Class corrected from "Mage (Fire)" to "Mage (Ice)".
# Snow Body (resistant to B/P/S) makes Rootis surprisingly durable for a mage.
# Adjust during Phase 1 playtesting.
fe_stats:
  class: "Mage (Ice)"        # FE base class Mage — cold-type tome caster (Anima reflavored)
  promoted_class: Sage
  level: 1
  # Vanilla FE8 Mage stats, verbatim from data_classes.c [CLASS_MAGE - 1]. No D&D-derived tuning.
  # Mage is a magic unit: single Pow stat is the magic attack (= MAG), no STR.
  # LCK: ClassData has no base luck — set 0 until personal luck is assigned deliberately.
  HP: 16
  MAG: 1                     # FE Pow (Mage basePow) — magic attack stat
  SKL: 2
  SPD: 3
  DEF: 3
  RES: 3
  LCK: 0                     # ClassData has no base luck
  MOV: 5                     # Mage baseMov
  CON: 6

# ── Growth Rates (% per level) — vanilla Mage growths from data_classes.c ────────
growth_rates:
  HP: 55
  MAG: 55
  SKL: 40
  SPD: 35
  DEF: 5
  RES: 30
  LCK: 20

# ── Inventory (Chapter 1 starting equipment) ─────────────────────────────────
# Primary cantrip is Ray of Frost (cold), not fire. Corrected from first pass.
inventory:
  - id: ray-of-frost
    name: "Ray of Frost"
    fe_weapon_type: Anima     # FE Mage weapon class (baseRanks ITYPE_ANIMA); cold is Anima reflavor
    damage_type: cold         # D&D flavor only
    range: 2                  # 60 ft cantrip → ~2-3 FE tiles
    uses: null    # FE tome — finite uses TBD (no infinite weapons)
    notes: "Also applies -10 ft move penalty (= -1 MOV in FE) on hit"
  - id: chill-touch
    name: "Chill Touch"
    # Secondary cantrip per PDF p1 (4d8 necrotic at level 20). Non-elemental, useful
    # vs cold-immune enemies. Ranged spell attack (despite name).
    fe_weapon_type: Anima     # FE Mage weapon class; necrotic flavor reskinned to Anima
    damage_type: necrotic     # D&D flavor only
    range: 3                  # 120 ft → ~3 FE tiles
    uses: null    # FE tome — finite uses TBD (no infinite weapons)
    notes: "Target cannot regain HP until end of next turn (anti-heal). Undead also get disadvantage on attacks vs Rootis until then."
  - id: vulnerary
    name: "Healing Potion"
    uses: 2

# ── Unique Abilities ─────────────────────────────────────────────────────────
unique_abilities:
  - id: metamagic-twinned
    name: "Metamagic: Twinned Spell"
    # Spend sorcery points equal to spell level: duplicate a single-target spell to
    # hit a second enemy in range at no extra action cost.
    # FE implementation: activated modifier — hit two enemies with one cast.
    type: activated
    unlock_chapter: 3         # Metamagic = Sorcerer L3 → Ch3 (MVP)
    uses_per_chapter: 2       # approximate SP cost at level 1 SP pool
    effect: twin_single_target_spell

  - id: metamagic-empowered
    name: "Metamagic: Empowered Spell"
    # Spend 1 SP: reroll up to 3 damage dice; keep the new results.
    # FE implementation: after rolling spell damage, player may reroll once.
    type: activated
    unlock_chapter: 3         # Metamagic = Sorcerer L3 → Ch3 (MVP)
    uses_per_chapter: 3

  - id: metamagic-distant
    name: "Metamagic: Distant Spell"
    # Spend 1 SP: double range of a spell (or make a touch spell 30 ft).
    # FE implementation: spell range doubled for that cast (e.g. Ray of Frost 2 → 4 tiles).
    # Per PDF p1 — confirms Rootis has Distant Spell, not just Twinned + Empowered.
    type: activated
    unlock_chapter: 3         # Metamagic = Sorcerer L3 → Ch3 (MVP)
    uses_per_chapter: 3

  - id: metamagic-extended
    name: "Metamagic: Extended Spell"
    # Spend 1 SP: double duration of a spell up to 24 hours.
    # FE relevance: extends concentration buffs (e.g. Mage Armor) across multiple maps.
    # Per PDF p2 — confirms Rootis has Extended Spell.
    type: activated
    unlock_chapter: 3         # Metamagic = Sorcerer L3 → Ch3 (MVP)
    uses_per_chapter: 3

  - id: sorcerous-restoration
    name: "Sorcerous Restoration"
    # Level 20 capstone: regain 4 sorcery points after a short rest.
    # FE implementation: between-chapter refill, +4 SP if short rest taken mid-chapter.
    type: passive
    unlock_chapter: 19        # Sorcerer L20 capstone → Ch19+ (deep endgame)
    sp_per_short_rest: 4

  - id: draconic-presence
    name: "Draconic Presence"
    # Level 18 Draconic Bloodline: action, spend 5 SP — 60-ft aura of fear or awe
    # (Rootis chooses). Hostile creatures starting their turn in the aura must succeed
    # on a WIS save DC 17 or be charmed/frightened (Rootis's choice) until aura ends.
    # Lasts up to 1 minute (concentration).
    # FE implementation: activated command, costs SP, applies frightened/charmed status
    # to enemies within 4 tiles for the rest of the player's turn.
    type: activated
    unlock_chapter: 17        # Draconic Bloodline L18 → Ch17 (post-MVP)
    uses_per_chapter: 1       # 5 SP cost; limited by SP pool
    sp_cost: 5
    range: 4                  # 60 ft → ~4 FE tiles
    save: WIS
    save_dc: 17
    effect: aura_charm_or_frighten

  - id: dragon-wings
    name: "Dragon Wings"
    # POST-MVP. Sorcerer/Draconic L14 feature → Ch13 on the 1:1 curve. Through all of MVP
    # (Ch1–7) Rootis is a FOOT Mage (Ice); he does NOT have flight or the transform yet.
    # CORRECTED 2026-05-28: earlier YAML marked this "ALREADY AVAILABLE / always-on", which
    # was based on the level-20 end-state sheet and is wrong for gameplay pacing.
    # Bonus action to sprout/dismiss wings; fly speed = walking speed.
    #
    # FE implementation (decided 2026-05-27): MANAKETE-STYLE CLASS TRANSFORM.
    # Reuses the FE8 Manakete/Myrrh transform code path (Dragonstone mechanic).
    #   Foot form  = Mage (Ice) — base movement, ~5 MOV, normal terrain rules
    #   Dragon form = custom flier Sage variant — flier MOV, ignores terrain
    # Toggle is an in-combat command. Each toggle CONSUMES 1 Sorcery Point to gate spam
    # (mirrors the 5e bonus-action cost model). When SP pool is empty, Rootis is locked
    # into whichever form he's currently in until chapter end.
    # See docs/decisions.md and docs/class-mapping.md.
    type: class_transform
    unlock_chapter: 13           # Sorcerer/Draconic L14 → Ch13 (post-MVP)
    unlocks_at_promotion: false  # unlocked by chapter gate, not by FE promotion
    transform_to: "Sage (Dragon Form)"
    transform_from: "Mage (Ice)"
    cost_per_toggle:
      resource: sorcery_points
      amount: 1
    effect: flier_movement_toggle

  - id: elemental-affinity-cold
    name: "Elemental Affinity (Cold)"
    # Passive: Rootis adds CHA mod (+3 at ch1, scaling) to damage rolls with cold-type tomes.
    # Can spend 1 SP to gain cold resistance for 1 hour (= rest of the map).
    # FE implementation: passive bonus applied to cold-type tomes only.
    # NOTE: This is COLD affinity, not fire — White Dragon ancestry.
    type: passive
    unlock_chapter: 6         # Draconic Bloodline L6 → Ch6 (MVP)
    effect: plus_cha_mod_cold_damage

  - id: crystallize
    name: Crystallize
    # Snowperson racial: action to freeze body into an icy form.
    # Grants: immunity to slashing and piercing damage.
    # Removes: bludgeoning resistance (Snow Body).
    # Duration: until Rootis takes a long rest (= until chapter end).
    # 1/long rest (= 1/chapter).
    # FE implementation: activated command — toggle defensive mode.
    type: activated
    unlock_chapter: 1         # racial — available from start
    uses_per_chapter: 1
    grants_immunity: [slashing, piercing]
    removes_resistance: [bludgeoning]

  - id: elemental-properties
    name: "Elemental Properties"
    # Snowperson racial: when hit by a cold/ice-based attack, Rootis RECOVERS HP
    # equal to the damage roll instead of taking damage.
    # FE implementation: passive flag — cold-type incoming damage becomes healing.
    # Synergizes with enemy ice mages or cold terrain effects.
    type: passive
    unlock_chapter: 1         # racial — available from start
    effect: cold_attacks_heal

  - id: snow-ski
    name: "Snow Ski"
    # Snowperson racial: on ice or snow terrain tiles, Rootis travels double distance.
    # FE implementation: passive — on snow/ice tiles, effective MOV is doubled.
    # Very relevant for this campaign's arctic maps.
    type: passive
    unlock_chapter: 1         # racial — available from start
    effect: double_mov_on_ice_snow

  # ── Signature Spell Kit (curated 2026-05-28; KNOWN-caster, so this is his full known list) ──
  # Cantrips (Ray of Frost primary, Chill Touch secondary) live in `inventory`.
  # DUAL STRUCTURE: fe_mechanic = the vanilla FE8 anchor (playability spine);
  #   flavor = Rootis's reskin (a curious snowman who treats magic as a mystery to solve).
  # Spell-level → chapter: 1st→Ch1, 3rd→Ch5, 5th→Ch9, 6th→Ch11, 8th→Ch15, 9th→Ch17.
  # KEPT FIRE (Immolation, Incendiary Cloud): intentional irony — Rootis casts fire despite
  # his ×2 fire vulnerability (Nicolas's call, 2026-05-28). Both post-MVP.
  # AoE NOTE: FE tomes are single-target; D&D AoE compromises to siege-range single-target.

  - id: earth-tremor
    name: "Earth Tremor"
    flavor: "Frostquake — the packed snow underfoot bucks and splinters into shards."
    fe_mechanic: "short-range anima tome; small burst that knocks targets prone (−avoid)"
    type: spell_tome
    spell_level: 1
    unlock_chapter: 1
    damage_type: bludgeoning
    save: DEX
    range: 1                  # centered on Rootis → adjacent ring
    effect: aoe_damage_and_prone

  - id: hypnotic-pattern
    name: "Hypnotic Pattern"
    flavor: "Snowblind — a slow shimmer of suspended ice crystals that empties the mind."
    fe_mechanic: "Sleep staff (AoE variant): targets skip their turn, can't act or counter"
    type: spell_tome
    spell_level: 3
    unlock_chapter: 5
    uses_per_chapter: 2
    save: WIS
    range: 4                  # 120 ft cast → cube placed within ~4 tiles
    aoe: "2x2"
    effect: sleep_status_aoe

  - id: fly
    name: "Fly"
    flavor: "Flurry Step — Rootis loosens into drifting powder and rides the wind."
    fe_mechanic: "temporary flier-movement buff on self or one ally (fixed duration)"
    type: spell_tome
    spell_level: 3
    unlock_chapter: 5
    uses_per_chapter: 2
    effect: grant_flier_movement_timed
    duration_turns: 3

  - id: cone-of-cold
    name: "Cone of Cold"
    flavor: "Glacier Breath — a roaring fan of sub-zero air that flash-freezes everything."
    fe_mechanic: "Fimbulvetr (top ice tome); AoE compromised to siege-range single-target"
    type: spell_tome
    spell_level: 5
    unlock_chapter: 9
    uses_per_chapter: 2
    damage_type: cold
    save: CON
    range: 3
    aoe: cone

  - id: immolation
    name: "Immolation"
    flavor: "Paradox Flame — the snowman wills fire into being; it scorches him too."
    fe_mechanic: "Elfire/Bolganone (fire tome), single-target with a burn DoT"
    type: spell_tome
    spell_level: 5
    unlock_chapter: 9
    uses_per_chapter: 1
    damage_type: fire
    save: DEX
    range: 3
    effect: damage_plus_burn_dot
    flavor_note: "Off-theme on purpose — ironic given Rootis's ×2 fire vulnerability."

  - id: globe-of-invulnerability
    name: "Globe of Invulnerability"
    flavor: "Hoarfrost Dome — a crackling shell of rime that swallows incoming magic."
    fe_mechanic: "Barrier staff (anti-magic / +RES shield) on self + adjacent allies"
    type: spell_tome
    spell_level: 6
    unlock_chapter: 11
    uses_per_chapter: 1
    effect: anti_magic_bubble_timed
    duration_turns: 3

  - id: abi-dalzims-horrid-wilting
    name: "Abi-Dalzim's Horrid Wilting"
    flavor: "Deep Freeze — Rootis rips every drop of moisture from flesh and air alike."
    fe_mechanic: "Eclipse/Luna-tier dark anima nuke (huge single-target); siege range"
    type: spell_tome
    spell_level: 8
    unlock_chapter: 15
    uses_per_chapter: 1
    damage_type: necrotic
    save: CON
    range: 4
    aoe: "2x2"

  - id: incendiary-cloud
    name: "Incendiary Cloud"
    flavor: "Smoldering Whiteout — a drifting bank of burning ash he can barely stand near."
    fe_mechanic: "fire siege tome reflavored as a drifting hazard tile"
    type: spell_tome
    spell_level: 8
    unlock_chapter: 15
    uses_per_chapter: 1
    damage_type: fire
    save: DEX
    range: 4
    effect: drifting_hazard_zone
    flavor_note: "Off-theme on purpose — see immolation."

  - id: meteor-swarm
    name: "Meteor Swarm"
    flavor: "Hailfall — the sky splits and boulders of ice and fire rain from the clouds."
    fe_mechanic: "ultimate siege bombardment (Purge/Bolting-tier), multi-point"
    type: spell_tome
    spell_level: 9
    unlock_chapter: 17
    uses_per_chapter: 1
    damage_type: [fire, bludgeoning]
    save: DEX
    range: 8
    aoe: multi_blast

# ── Signature Moment ─────────────────────────────────────────────────────────
signature_moment:
  chapter: tbd               # NICOLAS TO RECALL — not in the DM notes
  description: >
    TBD — Nicolas to recall Rootis's standout campaign beat. The current DM notes
    don't single one out (only that he weathered the Targos night out in the snow
    with Sclorbo in Ch 2). Candidate hooks once recalled: a tank/Snow-Body
    "wall" moment holding a chokepoint in a big-battle chapter.
  dialogue_trigger: null

# ── Support Affinities ────────────────────────────────────────────────────────
supports:
  - partner: meesmickle
    affinity: dark
  - partner: sclorbo
    affinity: water
