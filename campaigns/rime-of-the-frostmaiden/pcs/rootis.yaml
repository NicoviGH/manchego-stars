# pcs/rootis.yaml — Rootis, Sorcerer (Draconic Bloodline — White Dragon)
# Source: data/pc-sheets/rootis.json + References/PCs/Rootis Character Sheet.pdf
# IMPORTANT: Dragon Ancestry is WHITE (Cold), NOT fire. JSON did not specify this.
# Class roster: docs/CLASSES.md (generated). Rationale: docs/decisions.md §Class Mapping & Promotions.

id: rootis
name: Rootis
portrait_ref: portraits/rootis.png      # GBA-ready sprite pending (issue #23)
portrait_source: data/portraits/rootis.jpeg   # note: source file was named "Rootis Character Sheet.jpeg" — it's the portrait
# Portrait source: https://www.dndbeyond.com/avatars/25348/565/1581111423-72613710.jpeg

# ── Custom Art Brief (decided 2026-06-01 portrait walkthrough) ───────────────────
# ALL parts custom indexed-palette art. Follow the concept ref faithfully.
art:
  render:                     # exact reproduction of the shipped bust (tools/ref_to_bust.py)
    ref: "References/PCs/Rootis Bust 1.png"
    crop: [216, 100, 1704, 1340]   # ref pixels, ~1.2 aspect — shifted +90 right (subject left) to centre the head
    downscale: smooth
    zoom: 0.94                     # headroom so the head clears FE8's dead top corners (0px clipped)
    hand_pass: portraits/rootis_cleanup.py
  approach: custom
  fidelity: faithful
  must_keep:                  # tells that make the bust read as "Rootis"
    - two-segment pale blue-white snowman
    - dark coal square eyes + coal-dot smile
    - orange carrot nose
  face: visible               # coal eyes blink, coal-dot mouth moves for talk
  arms: none                  # keep the pure armless snowman — magic does the work, no twig arms
  effects: none               # NO frost aura in the portrait — cold magic rides on the battle/spell anim
  expression: jolly           # cheerful coal smile
  palette_plan: >             # rough 16-color budget (incl. index-0 transparent)
    snow whites/pale-blues ×4 (rounded shading), coal blacks ×2, orange carrot ×2,
    cool shadow blue, black outline. Small palette — spend it on smooth snow gradients.

# ── D&D 5e Source (reference only — does NOT drive FE mechanics) ────────────────
# FE stats come verbatim from the vanilla class below, not from D&D scores.
# Raw sheet: data/pc-sheets/rootis.json  ·  Curated flavor: lore/rootis.md
dnd:
  race: Snowperson
  class: "Sorcerer (Draconic Bloodline)"
  dragon_ancestor: White Dragon
  source: data/pc-sheets/rootis.json
  lore: lore/rootis.md

# ── FE Starting Stats (Chapter 1 / level 1 equivalent) ─────────────────────────
# Rootis is an ice/cold sorcerer, NOT fire. Class corrected from "Mage (Fire)" to "Mage (Ice)".
# Snow Body (resistant to B/P/S) makes Rootis surprisingly durable for a mage.
# Adjust during Phase 1 playtesting.
fe_stats:
  class: "Mage (Ice)"        # FE base class Mage — cold-type tome caster (Anima reflavored)
  level: 1
  # Vanilla FE8 Mage stats, verbatim from data_classes.c [CLASS_MAGE - 1]. No D&D-derived tuning.
  # Mage is a magic unit: single Pow stat is the magic attack (= MAG), no STR.
  # LCK: ClassData has no base luck — set 0 until personal luck is assigned deliberately.
  HP: 16
  MAG: 1                     # FE Pow (Mage basePow) — magic attack stat
  SKL: 2
  SPD: 3
  DEF: 3
  RES: 3
  LCK: 0                     # ClassData has no base luck
  MOV: 5                     # Mage baseMov
  CON: 6

# ── Promotion (FE8 branched — the PLAYER chooses at the Master Seal) ──────────────
promotion:
  branch: [Sage, "Mage Knight"]   # vanilla Mage branch (classchg-data.c [CLASS_MAGE])
  default: Sage                   # thematic lean; player may pick either.

# ── Growth Rates (% per level) — vanilla Mage growths from data_classes.c ────────
growth_rates:
  HP: 55
  MAG: 55
  SKL: 40
  SPD: 35
  DEF: 5
  RES: 30
  LCK: 20

# ── Inventory (Chapter 1 starting equipment) ─────────────────────────────────
# MVP: stock FE weapons — tome stats inherited from the vanilla item in `fe_base` (no custom
# Might). His ice element rides on the flavor NAME + sprite art: "Ray of Frost" is mechanically
# the basic Anima tome (stock 'Fire' stats). The dropped "Chill Touch" cantrip is parked in lore.
inventory:
  - id: ray-of-frost
    name: "Ray of Frost"
    # Flavor name; mechanically the basic Anima tome (stock 'Fire' stats — name-only reskin).
    fe_base: fire
    fe_weapon_type: Anima     # FE Mage weapon class (baseRanks ITYPE_ANIMA)
    range: 2
    damage_type: cold         # cosmetic flavor label only
  - id: vulnerary
    name: "Healing Potion"    # reflavored Vulnerary (consumable)
    fe_base: vulnerary
    uses: 2
# -- Unique Abilities ------------------------------------------------------
# NONE. Rootis is a stock FE8 Mage -- no per-character mechanics, even on promotion.
# Individuality comes from flavor text, portrait/sprite art, and palette -- not special
# skills (Nicolas's call, 2026-05-29: vanilla classes only, nothing extra: no timed
# buffs/debuffs, no special movement, no procs).

signature_moment:
  chapter: tbd               # NICOLAS TO RECALL — not in the DM notes
  description: >
    TBD — Nicolas to recall Rootis's standout campaign beat. The current DM notes
    don't single one out (only that he weathered the Targos night out in the snow
    with Sclorbo in Ch 2). Candidate hooks once recalled: a tank/Snow-Body
    "wall" moment holding a chokepoint in a big-battle chapter.
  dialogue_trigger: null

# ── Support Affinities ────────────────────────────────────────────────────────
supports:
  - partner: meesmickle
    affinity: dark
  - partner: sclorbo
    affinity: water
