# pcs/wolfram.yaml — Wolfram, Metallurgist (School of the Smith)
# Source: data/pc-sheets/wolfram.json + References/PCs/Wolfram Character sheet.pdf
# Class is fully homebrew — see References/Class_The_Metallurgist.pdf for full details.
# D&D Beyond approximated Wolfram as a Warlock (no official Metallurgist sheet support).
# Class roster: docs/CLASSES.md (generated). Rationale: docs/decisions.md §Class Mapping & Promotions.

id: wolfram
name: Wolfram
portrait_ref: portraits/wolfram.png     # GBA-ready sprite pending (issue #23)
portrait_source: data/portraits/wolfram.jpeg
# Portrait source: https://www.dndbeyond.com/avatars/25957/254/1581111423-74374750.jpeg

# ── Custom Art Brief (decided 2026-06-01 portrait walkthrough) ───────────────────
# ALL parts custom indexed-palette art. Follow the concept ref faithfully.
art:
  render:                     # exact reproduction of the shipped bust (tools/ref_to_bust.py)
    ref: "References/PCs/womfram bust 3.png"   # filename typo is real (as supplied)
    crop: [280, 70, 1980, 1487]    # ref pixels, ~1.2 aspect
    downscale: smooth
    hand_pass: null
  approach: custom
  fidelity: faithful
  must_keep:                  # tells that make the bust read as "Wolfram"
    - hulking grey MINERAL-SCALED face (metallic/stony texture, not plain skin), beard + topknot
    - leather harness straps across chest, quiver strap hint
    - frost-crusted crystalline accents (cold-smith motif) — subtle, e.g. on shoulder/collar
  face: visible               # eyes blink, mouth moves for talk
  composition: face-and-straps  # NO weapon/fist crowded in — warhammer rides on map+battle sprites
  age_note: younger-than-weathered   # looks worn but is actually on the younger side
  expression: serious-focused        # preoccupied, thinking about his minerals/ores; not a roar
  palette_plan: >             # rough 16-color budget (incl. index-0 transparent)
    mineral greys ×4 (cool, slightly metallic) + dark scale shadow, leather browns ×2,
    beard grey-brown, pale frost-crystal blue-white ×2, eye, black outline.

# ── D&D 5e Source (reference only — does NOT drive FE mechanics) ────────────────
# FE stats come verbatim from the vanilla class below, not from D&D scores.
# Raw sheet: data/pc-sheets/wolfram.json  ·  Curated flavor: lore/wolfram.md
dnd:
  race: Mineralscale Drakeborn
  class: "Metallurgist (School of the Smith)"
  source: data/pc-sheets/wolfram.json
  lore: lore/wolfram.md

# ── FE Starting Stats (level 1) ────────────────────────────────────────────────
# Vanilla FE8 Knight (Armor Knight) stats, verbatim from data_classes.c [CLASS_ARMOR_KNIGHT - 1].
# No D&D-derived tuning. FE Knight is a pure-Lance physical unit: single Pow stat (= STR), no MAG.
# LCK: ClassData has no base luck — set 0 until personal luck is assigned deliberately.
fe_stats:
  class: Knight              # FE8 Armor Knight (display name "Knight")
  level: 1
  HP: 17
  STR: 5                          # FE Pow (Armor Knight basePow)
  SKL: 2
  SPD: 0                          # vanilla Armor Knight base SPD is 0
  DEF: 9
  RES: 0
  LCK: 0                          # ClassData has no base luck
  MOV: 4                          # Armor Knight baseMov
  CON: 13

# ── Promotion (FE8 branched — the PLAYER chooses at the Master Seal) ──────────────
promotion:
  branch: [General, "Great Knight"]   # vanilla Armor Knight branch (classchg-data.c [CLASS_ARMOR_KNIGHT])
  default: General                    # thematic lean; player may pick either.

# ── Growth Rates (% per level) — vanilla Armor Knight growths from data_classes.c ──
growth_rates:
  HP: 80
  STR: 40
  SKL: 30
  SPD: 15
  DEF: 28
  RES: 20
  LCK: 25

# ── Inventory (Chapter 1 starting equipment) ─────────────────────────────────
# MVP: stock FE weapons — stats inherited from the vanilla item in `fe_base` (no custom Might).
# Wolfram's personal-weapon flavor (Warhammer) is parked in lore/wolfram.md as a POST-MVP item;
# his fire/forge identity rides on the sprite art. Javelin gives the armored unit its ranged option.
inventory:
  - id: iron-lance
    name: "Iron Lance"
    fe_base: iron-lance             # vanilla FE8 stats (Mt/Hit/Crit/Wt/uses); no custom tuning
    fe_weapon_type: Lance           # FE Knight weapon class (baseRanks ITYPE_LANCE)
    damage_type: piercing           # cosmetic flavor label only
  - id: javelin
    name: "Javelin"
    fe_base: javelin                # 1–2 range thrown lance; vanilla stats (the armored unit's ranged option)
    fe_weapon_type: Lance
    range: 2
    damage_type: bludgeoning        # cosmetic flavor label only
  - id: vulnerary
    name: "Healing Potion"          # reflavored Vulnerary (consumable)
    fe_base: vulnerary
    uses: 2
# -- Unique Abilities ------------------------------------------------------
# NONE. Wolfram is a stock FE8 Knight -- no per-character mechanics, even on promotion.
# Individuality comes from flavor text, portrait/sprite art, and palette -- not special
# skills (Nicolas's call, 2026-05-29: vanilla classes only, nothing extra: no timed
# buffs/debuffs, no special movement, no procs).

signature_moment:
  chapter: ch03-the-termalaine-mine     # PRIMARY
  description: >
    Snacked on ore samples in the Termalaine mine while the party cleared out the Grells.
    Also used the recovered iron ingots after Chapter 1 to forge armored siding for
    the party's sled while camping in the snow.
  dialogue_trigger: wolfram_ore_snacking
  # SECONDARY beat — Ch7 (Blood in Bremen): mid-battle, Wolfram bites a chunk out of
  # Speaker Dorbulgruf's steel axe in defiance (same metal-eating identity as the Ch3
  # primary). Anchored in ch07-blood-in-bremen.yaml (trigger: wolfram_axe_bite).

# ── Support Affinities ────────────────────────────────────────────────────────
supports:
  - partner: braulo
    affinity: fire
  - partner: prof-rbg
    affinity: thunder
