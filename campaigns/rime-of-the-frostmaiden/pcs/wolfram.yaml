# pcs/wolfram.yaml — Wolfram, Metallurgist (School of the Smith)
# Source: data/pc-sheets/wolfram.json + References/PCs/Wolfram Character sheet.pdf
# Class is fully homebrew — see References/Class_The_Metallurgist.pdf for full details.
# D&D Beyond approximated Wolfram as a Warlock (no official Metallurgist sheet support).
# See docs/class-mapping.md and docs/PRD.md §6.7 for class mapping rationale.

id: wolfram
name: Wolfram
portrait_ref: portraits/wolfram.png     # GBA-ready sprite pending (issue #23)
portrait_source: data/portraits/wolfram.jpeg
# Portrait source: https://www.dndbeyond.com/avatars/25957/254/1581111423-74374750.jpeg

# ── D&D 5e Identity ────────────────────────────────────────────────────────────
dnd:
  race: "Mineralscale Drakeborn"  # homebrew Dragonborn variant — scales are literal metal
  class: Metallurgist             # fully homebrew; approximated as Warlock on D&D Beyond
  subclass: "School of the Smith"
  level_end_state: 20
  alignment: chaotic_good
  size: medium                    # 6'4" tall, 1000 lbs — extremely dense from metallic scales
  age: 40
  height: "6'4\""
  weight: "1000 lbs"
  gender: male
  physical: "Gray skin, dark eyes, hairless. Scales of living metal."
  patron: METALLO                 # cosmic being, first to create metal; Wolfram is his Avatar
  backstory: >
    A scaleless Drakeborn, shamed by his people for lacking scales. While wandering, he found
    an alien meteorite ring in the earth. METALLO — a cosmic being trillions of years old, the
    first entity ever to create metal — spoke to him through it and named him The First
    Metallurgist. His scales grew back, forged from living metal. He now serves as METALLO's
    Avatar in the mortal world.
  ability_scores:
    STR: 20
    DEX: 12
    CON: 14
    INT: 20
    WIS: 9
    CHA: 10
  saving_throw_proficiencies: [DEX, INT]
  hp_max: 143
  ac: 26                          # highest in party — heavy armor + shield + stacked Upgrade Armor
  speed_ft: 30
  racial_traits:
    # Mineralscale Drakeborn — from PDF page 3
    fire_resistance: true         # half damage from fire (passive in unique_abilities too)
    darkvision_60: true
    metallic_scales:
      # Living metal scales. Natural armor contribution baked into AC 26 total.
      note: "Scales of actual metal. AC 26 = heavy armor + shield + stacked Upgrade Armor upgrades."
    breath_weapon:
      # ACTION — Wolfram can use his breath weapon EVERY TURN (not 1/long rest).
      # 30-ft cone, DEX save DC 16, fire damage.
      # Damage scales: 2d6 (levels 1–5) → 3d6 (6–10) → 4d6 (11–15) → 5d6 (16–20).
      # FE implementation: activated command costing Wolfram's action, unlimited per chapter.
      action_cost: action
      uses_per_chapter: null      # unlimited — can use every turn
      shape: cone
      range_ft: 30
      save: DEX
      save_dc: 16
      damage_type: fire
      damage_scaling:
        - levels: "1-5"
          dice: "2d6"
        - levels: "6-10"
          dice: "3d6"
        - levels: "11-15"
          dice: "4d6"
        - levels: "16-20"
          dice: "5d6"

# ── FE Starting Stats (Chapter 1 / level 1 equivalent) ─────────────────────────
# Wolfram is the party wall. Highest DEF, lowest SPD. Adjust during Phase 1 playtesting.
fe_stats:
  class: Knight
  promoted_class: General
  level: 1
  HP: 20
  STR: 8                          # STR 20 → strong; second only to Braulo
  MAG: 3                          # INT 20 → Metallurgist spells and Magic Stone
  SKL: 5
  SPD: 3                          # heavy armor — defining Knight limitation
  DEF: 10                         # highest base DEF in the party; AC 26 end-state target
  RES: 2                          # WIS 9 → lowest RES in the party
  LCK: 2
  MOV: 4
  CON: 14                         # heaviest unit — can wield heavy weapons without penalty

# ── Growth Rates (% per level, FE standard) ──────────────────────────────────
growth_rates:
  HP: 60
  STR: 55
  MAG: 20
  SKL: 35
  SPD: 15                         # lowest SPD growth by design — Knight archetype
  DEF: 75                         # highest DEF growth in the party — endgame fortress
  RES: 10
  LCK: 20

# ── Inventory (Chapter 1 starting equipment) ─────────────────────────────────
inventory:
  - id: warhammer
    name: Warhammer
    damage_type: bludgeoning
    weapon_dice: "1d8"            # PDF confirmed 1d8 (not 1d10)
    ability_mod: STR
    range: melee
    uses: null
  - id: iron-lance
    name: "Iron Lance"
    damage_type: piercing
    weapon_dice: "1d6"
    ability_mod: STR
    range: melee
    uses: null
  - id: magic-stone
    name: "Magic Stone"
    # Wolfram's only ranged option — useful for flying enemies or distant threats.
    # INT-based: +11 to hit at end-state (+5 INT mod + 6 prof); 1d6+5 bludgeoning.
    damage_type: bludgeoning
    weapon_dice: "1d6"
    ability_mod: INT              # INT-based (Metallurgist spellcasting modifier)
    range: 2                      # 60 ft → ~2-3 FE tiles
    uses: null                    # cantrip — infinite uses
    notes: "+11 to hit at end-state (INT 20 + prof 6). Deals +5 bludgeoning on hit."
  - id: vulnerary
    name: "Healing Potion"
    uses: 2

# ── D&D-Derived Stat Overrides ───────────────────────────────────────────────
d20_fields:
  AC: 18                          # Chapter 1: heavy armor + shield + level 1 Upgrade Armor
                                  # End-state target: 26. Scales via Upgrade Armor each chapter.
  ability_mod_atk: STR            # STR for melee; INT for Metallurgist spells and Magic Stone
  prof_bonus: 2
  spell_slots: null               # Metallurgist is a half-caster; no slots until level 3

# ── Unique Abilities ─────────────────────────────────────────────────────────
unique_abilities:
  - id: forge
    name: Forge
    # Between-chapter command: upgrade one ally's weapon (+1 damage die) or armor (+2 AC).
    # School of the Smith: Improved Upgrade — +2 AC per upgrade application (not +1).
    # FE implementation: Preparation screen command — player selects ally and item to upgrade.
    type: between_chapter
    uses_per_chapter: 1
    effect: upgrade_ally_gear

  - id: breath-weapon
    name: "Breath Weapon"
    # ACTION (unlimited per chapter): 30-ft cone, DEX save DC 16, fire damage.
    # Wolfram uses this EVERY TURN if desired — not restricted per rest.
    # Damage scales by chapter; starts at 2d6 (ch1 equivalent).
    # FE implementation: activated command costing Wolfram's action each turn.
    type: activated
    uses_per_chapter: null        # unlimited
    action_cost: action
    shape: cone
    range: 2                      # 30 ft → ~2 FE tiles
    save: DEX
    save_dc: 16
    damage_type: fire
    ch1_damage_dice: "2d6"        # scales to 3d6 / 4d6 / 5d6 in later chapters

  - id: devils-sight
    name: "Devil's Sight"
    # Metallurgist invocation: see normally (not just darkvision) in all darkness up to 120 ft,
    # including magical darkness. Wolfram never has visibility penalties.
    # FE implementation: passive — ignores all darkness visibility modifiers.
    type: passive
    effect: see_normally_in_darkness
    range_ft: 120

  - id: minions-of-chaos
    name: "Minions of Chaos"
    # Metallurgist: 1/chapter — conjure an elemental (CR ≤ level/3).
    # Element chosen at time of use: fire, earth, water, or air.
    # FE implementation: activated command — spawns an elemental allied unit on the map.
    type: activated
    uses_per_chapter: 1
    effect: conjure_elemental_unit

  - id: power-word-stun
    name: "Power Word Stun"
    # 8th-level Mystic Arcanum: target with ≤150 HP is Stunned.
    # Stunned: cannot move, act, or react. Repeats CON save at end of each turn to end.
    # FE implementation: activated command — enemy cannot act, and rolls CON save each turn.
    type: activated
    uses_per_chapter: 1           # 1/long rest (Mystic Arcanum)
    target_max_hp: 150            # only works on targets with ≤150 HP
    effect: stunned_until_save
    save: CON
    save_dc: 18                   # 8 + INT mod + prof bonus at end-state

  - id: imprisonment
    name: Imprisonment
    # 9th-level Mystic Arcanum: permanently trap one creature.
    # Incapacitated and immune to all damage until a specific condition is met.
    # FE implementation: activated command — removes enemy from the map until chapter end.
    type: activated
    uses_per_chapter: 1           # 1/long rest (Mystic Arcanum)
    effect: remove_from_map_permanent

  - id: feral-strike-bite
    name: "Feral Strike: Bite"
    # Drakeborn racial bonus action: after landing a melee hit, deal 1d8 bludgeoning.
    # FE implementation: passive — Wolfram's melee attacks always deal +1d8 follow-up bite.
    type: passive
    follow_up_dice: "1d8"
    damage_type: bludgeoning

  - id: shield-spell
    name: "Shield (spell)"
    # Reaction: +5 AC until the start of Wolfram's next turn.
    # INT-based (Metallurgist spellcasting modifier).
    # FE implementation: reaction skill — adds +5 to effective DEF for that attack.
    type: reaction
    uses_per_chapter: 3
    ac_bonus: 5

  - id: fire-resistance
    name: "Fire Resistance"
    # Mineralscale Drakeborn racial: half damage from fire-type sources.
    # FE implementation: passive — fire-type attacks deal ×0.5 damage to Wolfram.
    type: passive
    damage_resistance: fire

# ── Signature Moment ─────────────────────────────────────────────────────────
signature_moment:
  chapter: ch03-the-termalaine-mine
  description: >
    Snacked on ore samples in the Termalaine mine while the party cleared out the Grells.
    Also used the recovered iron ingots after Chapter 1 to forge armored siding for
    the party's sled while camping in the snow.
  dialogue_trigger: wolfram_ore_snacking

# ── Support Affinities ────────────────────────────────────────────────────────
supports:
  - partner: braulo
    affinity: fire
  - partner: prof-rbg
    affinity: thunder
