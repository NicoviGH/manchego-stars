# pcs/wolfram.yaml — Wolfram, Metallurgist (School of the Smith)
# Source: data/pc-sheets/wolfram.json + References/PCs/Wolfram Character sheet.pdf
# Class is fully homebrew — see References/Class_The_Metallurgist.pdf for full details.
# D&D Beyond approximated Wolfram as a Warlock (no official Metallurgist sheet support).
# See docs/class-mapping.md and docs/PRD.md §6.7 for class mapping rationale.

id: wolfram
name: Wolfram
portrait_ref: portraits/wolfram.png     # GBA-ready sprite pending (issue #23)
portrait_source: data/portraits/wolfram.jpeg
# Portrait source: https://www.dndbeyond.com/avatars/25957/254/1581111423-74374750.jpeg

# ── D&D 5e Identity ────────────────────────────────────────────────────────────
dnd:
  race: "Mineralscale Drakeborn"  # homebrew Dragonborn variant — scales are literal metal
  class: Metallurgist             # fully homebrew; approximated as Warlock on D&D Beyond
  subclass: "School of the Smith"
  level_end_state: 20
  alignment: chaotic_good
  size: medium                    # 6'4" tall, 1000 lbs — extremely dense from metallic scales
  age: 40
  height: "6'4\""
  weight: "1000 lbs"
  gender: male
  physical: "Gray skin, dark eyes, hairless. Scales of living metal."
  patron: METALLO                 # cosmic being, first to create metal; Wolfram is his Avatar
  backstory: >
    A scaleless Drakeborn, shamed by his people for lacking scales. While wandering, he found
    an alien meteorite ring in the earth. METALLO — a cosmic being trillions of years old, the
    first entity ever to create metal — spoke to him through it and named him The First
    Metallurgist. His scales grew back, forged from living metal. He now serves as METALLO's
    Avatar in the mortal world.
  ability_scores:
    STR: 20
    DEX: 12
    CON: 14
    INT: 20
    WIS: 9
    CHA: 10
  saving_throw_proficiencies: [DEX, INT]
  languages: [Common, Draconic]   # per PDF p1
  hp_max: 143
  ac: 26                          # highest in party — heavy armor + shield + stacked Upgrade Armor
  speed_ft: 30
  racial_traits:
    # Mineralscale Drakeborn — from PDF page 3
    fire_resistance: true         # half damage from fire (passive in unique_abilities too)
    darkvision_60: true
    metallic_scales:
      # Living metal scales. Natural armor contribution baked into AC 26 total.
      note: "Scales of actual metal. AC 26 = heavy armor + shield + stacked Upgrade Armor upgrades."
    breath_weapon:
      # ACTION — 1/short rest per PDF p3 ("Once per short rest as an action").
      # Each creature in area: DEX save DC 16, fire damage on fail (half on success).
      # Damage scales: 2d6 (levels 1–5) → 3d6 (6–10) → 4d6 (11–15) → 5d6 (16–20).
      # FE implementation: activated command, refreshes once per chapter (= one short rest).
      # CORRECTED 2026-05-27: previously listed unlimited; PDF confirms 1/SR.
      action_cost: action
      uses_per_chapter: 1         # 1 per short rest; FE = 1 per chapter
      shape: cone                 # PDF doesn't restate area; default standard Dragonborn cone
      range_ft: 30                # PDF doesn't specify; default Dragonborn 30 ft
      save: DEX
      save_dc: 16
      damage_type: fire
      damage_scaling:
        - levels: "1-5"
          dice: "2d6"
        - levels: "6-10"
          dice: "3d6"
        - levels: "11-15"
          dice: "4d6"
        - levels: "16-20"
          dice: "5d6"

# ── FE Starting Stats (Chapter 1 / level 1 equivalent) ─────────────────────────
# Wolfram is the party wall. Highest DEF, lowest SPD. Adjust during Phase 1 playtesting.
fe_stats:
  class: Knight
  promoted_class: General
  level: 1
  HP: 20
  STR: 8                          # STR 20 → strong; second only to Braulo
  MAG: 3                          # INT 20 → Metallurgist spells and Magic Stone
  SKL: 5
  SPD: 3                          # heavy armor — defining Knight limitation
  DEF: 10                         # highest base DEF in the party; AC 26 end-state target
  RES: 2                          # WIS 9 → lowest RES in the party
  LCK: 2
  MOV: 4
  CON: 14                         # heaviest unit — can wield heavy weapons without penalty

# ── Growth Rates (% per level, FE standard) ──────────────────────────────────
growth_rates:
  HP: 60
  STR: 55
  MAG: 20
  SKL: 35
  SPD: 15                         # lowest SPD growth by design — Knight archetype
  DEF: 75                         # highest DEF growth in the party — endgame fortress
  RES: 10
  LCK: 20

# ── Inventory (Chapter 1 starting equipment) ─────────────────────────────────
inventory:
  - id: warhammer
    name: Warhammer
    damage_type: bludgeoning
    weapon_dice: "1d8"            # PDF confirmed 1d8 (not 1d10)
    ability_mod: STR
    range: melee
    uses: null
  - id: iron-lance
    name: "Iron Lance"
    damage_type: piercing
    weapon_dice: "1d6"
    ability_mod: STR
    range: melee
    uses: null
  - id: magic-stone
    name: "Magic Stone"
    # One of Wolfram's ranged options. Pact of the Tome cantrip.
    # INT-based: +11 to hit at end-state (+5 INT mod + 6 prof); 1d6+5 bludgeoning.
    damage_type: bludgeoning
    weapon_dice: "1d6"
    ability_mod: INT              # INT-based (Metallurgist spellcasting modifier)
    range: 2                      # 60 ft → ~2-3 FE tiles
    uses: null                    # cantrip — infinite uses
    notes: "+11 to hit at end-state (INT 20 + prof 6). Deals +5 bludgeoning on hit."
  - id: fire-bolt
    name: "Fire Bolt"
    # Pact of the Tome cantrip — Wolfram's main ranged fire option for flyers and
    # distant enemies. Scales: 1d10 (lv1) → 2d10 (5) → 3d10 (11) → 4d10 (17).
    # Pairs with breath weapon's Fire identity. INT-based per PDF (+6 to hit, 4d10 at 20).
    damage_type: fire
    weapon_dice: "1d10"           # ch1 equivalent; scales to 4d10 at end-state
    ability_mod: INT
    range: 3                      # 120 ft → ~3 FE tiles
    uses: null                    # cantrip — infinite uses
  - id: vulnerary
    name: "Healing Potion"
    uses: 2

# ── D&D-Derived Stat Overrides ───────────────────────────────────────────────
d20_fields:
  AC: 18                          # Chapter 1: heavy armor + shield + level 1 Upgrade Armor
                                  # End-state target: 26. Scales via Upgrade Armor each chapter.
  ability_mod_atk: STR            # STR for melee; INT for Metallurgist spells and Magic Stone
  prof_bonus: 2
  spell_slots: null               # Metallurgist is a half-caster; no slots until level 3

# ── Unique Abilities ─────────────────────────────────────────────────────────
unique_abilities:
  - id: forge
    name: Forge
    flavor: "The First Forge — Wolfram reshapes living metal between battles, gifting his allies armor of his own scales."
    fe_mechanic: "Preparation-screen command (like a portable armory): permanently buff one ally's gear"
    # Between-chapter command: upgrade one ally's weapon (+1 damage die) or armor (+2 AC).
    type: between_chapter
    unlock_chapter: 1         # Upgrade Armor = Metallurgist L1 → Ch1 (MVP)
    improved_at_chapter: 3    # Improved Upgrade (Smith L3): +2 AC per application instead of +1
    uses_per_chapter: 1
    effect: upgrade_ally_gear

  - id: breath-weapon
    name: "Breath Weapon"
    flavor: "Flamethrower — Wolfram's chest-vents flare and he gouts a cone of forge-fire (his Drakeborn breath + armor's Flamethrower function)."
    fe_mechanic: "vanilla FE breath/cone attack: fire AoE on a cone of tiles, DEX save for half"
    # ACTION, 1/short rest per Mineralscale Drakeborn (PDF p3). FE = 1/chapter.
    # 30-ft cone, DEX save DC 16, fire damage. (= the Metallurgist 'Flamethrower' armor ability.)
    type: activated
    unlock_chapter: 1         # racial Drakeborn breath — available from start
    uses_per_chapter: 1
    action_cost: action
    shape: cone
    range: 2                      # 30 ft → ~2 FE tiles
    save: DEX
    save_dc: 16
    damage_type: fire
    ch1_damage_dice: "2d6"        # scales to 3d6 / 4d6 / 5d6 in later chapters

  - id: enhanced-darkvision
    name: "Enhanced Darkvision"
    # Mineralscale Drakeborn racial: darkvision to 120 ft (JSON key feature), seeing normally
    # even in magical darkness. (Was mislabeled "Devil's Sight / Metallurgist invocation" —
    # Metallurgist has no invocations; that leaked from the D&D Beyond Warlock approximation.)
    # FE implementation: passive — ignores all darkness visibility modifiers.
    type: passive
    unlock_chapter: 1
    effect: see_normally_in_darkness
    range_ft: 120

  # ── High-tier spells from Wolfram's character sheet ──
  # NOTE (2026-05-28): D&D Beyond approximated the homebrew Metallurgist as a Warlock, so
  # these appeared on his sheet via the Mystic Arcanum slots / METALLO patron grants. They
  # are REAL (listed in data/pc-sheets/wolfram.json notable_spells), so we respect them.
  # The previously-listed "Investiture of Stone", "Forcecage", and "Power Word Stun" were
  # NOT on his sheet (invented in an earlier pass) and have been removed.
  # Gated by spell level on the 1:1 chapter curve (see docs/class-progression-tables.md).

  - id: conjure-elemental
    name: "Conjure Elemental"
    # On sheet (5th-level conjuration). Was mislabeled "Minions of Chaos".
    # Summon an elemental (fire/earth/water/air) as a temporary allied unit.
    # FE implementation: activated command — spawns an elemental allied unit on the map.
    type: activated
    unlock_chapter: 9             # 5th-level spell → 5e L9 on the 1:1 curve (post-MVP)
    uses_per_chapter: 1
    effect: conjure_elemental_unit

  - id: creation
    name: "Creation"
    # On sheet (5th-level conjuration) — was missing from the YAML entirely. Added 2026-05-28.
    # Create nonliving matter (stone/metal) — terrain/cover or a temporary barrier.
    # FE implementation: activated command — place a destructible terrain/cover tile.
    type: activated
    unlock_chapter: 9             # 5th-level spell → post-MVP
    uses_per_chapter: 1
    effect: create_terrain_or_cover

  - id: imprisonment
    name: Imprisonment
    # On sheet (9th-level abjuration). Permanently trap one creature until a condition is met.
    # FE implementation: activated command — removes an enemy from the map until chapter end.
    type: activated
    unlock_chapter: 17            # 9th-level spell → 5e L17 on the 1:1 curve (deep endgame)
    uses_per_chapter: 1
    effect: remove_from_map_until_chapter_end

  - id: feral-strike-bite
    name: "Feral Strike: Bite"
    flavor: "Wolfram's iron jaws snap shut on a foe right after his weapon lands."
    fe_mechanic: "passive follow-up: melee hits tack on a small bonus bludgeoning bite"
    # Drakeborn racial: after landing a melee hit, deal 1d8 bludgeoning.
    type: passive
    unlock_chapter: 1         # racial — available from start
    follow_up_dice: "1d8"
    damage_type: bludgeoning

  - id: feral-strike-claws
    name: "Feral Strike: Claws"
    flavor: "A raking swipe of metal claws when he needs to tear rather than crush."
    fe_mechanic: "adjacent claw attack option (slashing) — folds into his action per rules-mapping §B"
    # Drakeborn racial: 1d6 + STR slashing. Alternative damage type to Bite.
    type: activated
    unlock_chapter: 1         # racial — available from start
    weapon_dice: "1d6"
    damage_type: slashing
    ability_mod: STR

  - id: shield-spell
    name: "Armor Lock (Shield)"
    flavor: "Armor Lock — Wolfram's plates slam together into a seamless shell the instant a blow lands."
    fe_mechanic: "+AC reaction proc (Barrier-style) — powered by Arcane Charges"
    # Metallurgist armor ability (1 Arcane Charge → shield). Reaction: +5 AC until his next turn.
    type: reaction
    unlock_chapter: 5         # Arcane Charges come online at Metallurgist L5 → Ch5 (MVP)
    uses_per_chapter: 3
    ac_bonus: 5

  - id: fire-resistance
    name: "Fire Resistance"
    flavor: "Forged in fire — Wolfram's metal scales shrug off heat that would melt anyone else."
    fe_mechanic: "passive: ×0.5 damage from fire-type attacks"
    # Mineralscale Drakeborn racial.
    type: passive
    unlock_chapter: 1         # racial — available from start
    damage_resistance: fire

  # ── Armor Abilities (cast via Arcane Charges = 2×prof; Wolfram picks 4, +1 at L7/11/16) ──
  # His "spells" are armor functions, not tomes. DUAL STRUCTURE: fe_mechanic + flavor.
  # Flamethrower (= Breath Weapon, above) and Armor Lock (= Shield, above) are his first picks.
  # Recharge + Explosive Burst added here in the retier. Arcane Charges online at L5 → Ch5.

  - id: recharge
    name: Recharge
    flavor: "Recharge — Wolfram channels Arcane Charges inward, re-forging his own dented plating and flesh."
    fe_mechanic: "self-heal (Heal-staff effect on himself), powered by Arcane Charges"
    # Metallurgist armor ability (2 Arcane Charges → cure wounds).
    type: activated
    unlock_chapter: 5         # Arcane Charges at Metallurgist L5 → Ch5 (MVP)
    uses_per_chapter: 2
    effect: self_restore_hp
    heal_dice: "1d8+MAG"

  - id: explosive-burst
    name: "Explosive Burst"
    flavor: "Explosive Burst — Wolfram overloads his charge vents and detonates a sphere of forge-fire."
    fe_mechanic: "fire siege tome (AoE compromised to siege-range single-target), powered by Arcane Charges"
    # Metallurgist L7 armor ability (2 Arcane Charges → fireball). His Ch7 armor-ability pick.
    type: activated
    unlock_chapter: 7         # Metallurgist L7 armor-ability slot → Ch7 (MVP cap)
    uses_per_chapter: 1
    damage_type: fire
    weapon_dice: "8d6"
    save: DEX
    range: 4

  # ── Forge Line (the smithing progression; Forge command above is the base) ──
  - id: forge-expert
    name: "Forge Expert"
    flavor: "Forge Expert — Wolfram learns to smith bludgeoning/piercing/slashing resistance straight into armor."
    fe_mechanic: "Forge upgrade tier: armor he forges also grants a physical damage resistance"
    type: between_chapter
    unlock_chapter: 7         # School of the Smith L7 → Ch7 (MVP cap)
    effect: forge_grants_physical_resistance

  - id: blade-forge
    name: "Blade Forge"
    flavor: "Blade Forge — METALLO's craft extends to weapons; Wolfram tempers an ally's blade to bite deeper."
    fe_mechanic: "Forge upgrade tier: can now upgrade weapons (+1 damage die), not just armor"
    type: between_chapter
    unlock_chapter: 11        # Metallurgist L11 → Ch11 (POST-MVP)
    effect: forge_upgrade_weapons

  - id: master-of-the-forge
    name: "Master of the Forge"
    flavor: "Master of the Forge — Wolfram forges adamantine and mithral, the metals of legend."
    fe_mechanic: "top-tier Forge: adamantine (crit-immunity) / mithral (no SPD penalty) / resist armor"
    type: between_chapter
    unlock_chapter: 15        # School of the Smith L16 → Ch15 (POST-MVP / endgame)
    effect: forge_legendary_armor

# ── Signature Moment ─────────────────────────────────────────────────────────
signature_moment:
  chapter: ch03-the-termalaine-mine
  description: >
    Snacked on ore samples in the Termalaine mine while the party cleared out the Grells.
    Also used the recovered iron ingots after Chapter 1 to forge armored siding for
    the party's sled while camping in the snow.
  dialogue_trigger: wolfram_ore_snacking

# ── Support Affinities ────────────────────────────────────────────────────────
supports:
  - partner: braulo
    affinity: fire
  - partner: prof-rbg
    affinity: thunder
