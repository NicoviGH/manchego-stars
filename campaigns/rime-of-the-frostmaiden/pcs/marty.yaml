# pcs/marty.yaml — Marty the Merry Mushroom, Druid (Circle of Spores)
# Source: data/pc-sheets/marty-the-merry-mushroom.json + References/PCs/MMM Character Sheet.pdf
# See docs/class-mapping.md and docs/PRD.md §6.7 for class mapping rationale.

id: marty
name: "Marty the Merry Mushroom"
portrait_ref: portraits/marty.png       # GBA-ready sprite pending (issue #23)
portrait_source: data/portraits/marty.jpeg
# Portrait source: https://www.dndbeyond.com/avatars/25824/431/1581111423-70515811.jpeg

# ── D&D 5e Identity ────────────────────────────────────────────────────────────
dnd:
  race: Sporemaster          # homebrew Myconid
  class: Druid
  subclass: "Circle of Spores"
  level_end_state: 20
  alignment: chaotic_neutral
  size: small                # 2–4 ft tall (Sporemaster)
  background: Sage
  backstory: >
    Part of a myconid circle in the coffee axis of Colombia. Left his community
    to become a traveling Barista and share the wonderful properties of the
    Chagaccino with the world. Takes every opportunity to brew and share it with
    anyone he can.
  ability_scores:
    STR: 10
    DEX: 18
    CON: 17
    INT: 12
    WIS: 20
    CHA: 8
  saving_throw_proficiencies: [INT, WIS]
  languages: [Common, "Deep Speech", Druidic]   # per PDF p1 (Common readable only, see speech: none)
  hp_max: 163
  ac: 17
  speech: none               # Marty CANNOT SPEAK — communicates via hum/whistle/grumble.
                             # Rapport Spores provide telepathy for anyone sharing a language.
  defenses:
    resistance: [poison]
    # Condition immunities from Fungal Body (Druid level 14 class feature, NOT racial):
    immunity_conditions: [blinded, critical_hits, deafened, frightened, poisoned]
  racial_traits:
    # Sporemaster (homebrew Myconid) — from PDF page 3
    darkvision: 60
    fungal_form:
      poison_save_advantage: true
      poison_resistance: true   # same as defenses.resistance above — listed here for clarity
    hallucination_spores:
      # Action: creature within 5 ft, CON save DC 19 — Poisoned + Incapacitated for 1 minute.
      # 1/long rest (= 1/chapter).
      uses_per_chapter: 1
      save: CON
      save_dc: 19
      effect: [poisoned, incapacitated]
    pacifying_spores:
      # Action: creature within 5 ft, CON save DC 19 — Stunned for 1 minute.
      # 1/long rest (= 1/chapter). Extremely powerful CC.
      uses_per_chapter: 1
      save: CON
      save_dc: 19
      effect: stunned
    pheromone_spores:
      # Action: mark one creature within 60 ft. For 1 minute, Marty + all spore servants
      # have advantage on attacks against that creature.
      # Uses = CON modifier (minimum 1) per long rest. CON 17 → mod +3 = 3 uses.
      uses_per_chapter: 3
      range: 4                  # 60 ft → ~4 FE tiles
    rapport_spores:
      # Telepathic communication within 30 ft with creatures sharing a language.
      # If silenced, can still communicate telepathically but cannot cast V-component spells.
      # FE implementation: Marty's dialogue uses hum/whistle flavor; no verbal speech.
      range: 2                  # ~30 ft
    distress_spores:
      # Passive: when Marty takes damage, all creatures within 240 ft are alerted.
      # FE implementation: flavor/passive — enemies in range are notified on Marty's injury.
      alert_radius: 16          # 240 ft → ~16 FE tiles
    sunlight_sensitivity:
      # Disadvantage on attack rolls and WIS (Perception) checks in direct sunlight.
      # Minor concern for an arctic campaign (little direct sun), but worth noting.
      effect: disadvantage_attacks_perception_in_sunlight

# ── FE Starting Stats (Chapter 1 / level 1 equivalent) ─────────────────────────
# Adjust during Phase 1 playtesting.
fe_stats:
  class: "Monk (Druid)"      # FE base class — Monk chassis reflavored as Druid.
                             # Moved off Shaman in 2026-05-27 audit to differentiate from Meesmickle.
                             # See docs/class-mapping.md and docs/decisions.md.
  promoted_class: Summoner   # custom promotion; standard FE8 Summoner sprite
  level: 1
  HP: 16
  STR: 2                     # not a melee fighter
  MAG: 8                     # WIS 20 → MAG is Marty's defining stat
  SKL: 5
  SPD: 6                     # DEX 18 but spore myconid moves methodically
  DEF: 3                     # fragile caster
  RES: 7                     # WIS 20 → high RES
  LCK: 4
  MOV: 4                     # speed_ft: 20 — very slow, myconid creep
  CON: 7

# ── Growth Rates (% per level, FE standard) ──────────────────────────────────
growth_rates:
  HP: 45
  STR: 10
  MAG: 65
  SKL: 40
  SPD: 45
  DEF: 20
  RES: 60
  LCK: 30

# ── Inventory (Chapter 1 starting equipment) ─────────────────────────────────
# Primary attack is Shillelagh (cantrip), not a basic staff swing.
# Shillelagh transforms Marty's Staff into a WIS-based weapon.
inventory:
  - id: shillelagh
    name: "Shillelagh (Staff)"
    damage_type: bludgeoning
    range: melee
    uses: null    # FE tome — finite uses TBD (no infinite weapons)
    locked: true               # Marty's Staff + Shillelagh cantrip, personal
    notes: "+WIS mod to damage (= +5 at ch1 equivalent). Replaces staff's STR-based attack."
  - id: chill-touch
    name: "Chill Touch"
    flavor: "Witherspore — a puff of grave-mold settles on the target; its wounds won't close."
    fe_mechanic: "Flux-tier dark tome; on hit, target can't recover HP until its next turn"
    damage_type: necrotic
    range: 3                  # 120 ft → ~3 FE tiles
    uses: null    # FE tome — finite uses TBD (no infinite weapons)
    notes: "Anti-heal proc (Chill Touch's signature). Marty's primary spore cantrip."
  - id: heal-staff
    name: "Heal Staff"
    is_staff: true
    effect: restore_hp
    staff_dice: "1d8+MAG"
    uses: 15
  - id: goodberry
    name: "Goodberry"
    flavor: "Chagaccino Berries — Marty's signature mushroom brew, pressed into restorative berries."
    fe_mechanic: "Vulnerary-style consumable; small HP restore, multiple charges per chapter"
    effect: restore_1hp
    uses: 10                  # 10 berries per casting; restocked between chapters

# ── Unique Abilities ─────────────────────────────────────────────────────────
unique_abilities:
  - id: symbiotic-entity
    name: "Symbiotic Entity"
    flavor: "Bloom — Marty's cap flares open and a lethal halo of killing spores wreathes his body."
    fe_mechanic: "Barrier/Dracoshield-style temp-HP buff item + an on-hit bonus-damage aura while active"
    # Activated (costs Wild Shape use): awaken the spores.
    # Effect: temp HP = 4 × druid level (chapter-scaled), Halo of Spores damage doubled,
    #         +1d6 necrotic on all melee attacks. Lasts the map phase or until temp HP depleted.
    type: consumable_item
    unlock_chapter: 2         # Circle of Spores L2 → Ch2 (MVP)
    uses_per_chapter: 2
    temp_hp_formula: "4 * chapter"   # 4×level on the 1:1 curve
    temp_hp_mvp_end: 28       # +28 at Ch7 (MVP cliffhanger); +80 only at Ch20 endgame
                              # (was hard-coded 80 = endgame value before this retier)
    status_effect: symbiotic_entity_status

  - id: halo-of-spores
    name: "Halo of Spores"
    flavor: "The killing haze hangs thick around Marty — anything that drifts too close just rots."
    fe_mechanic: "passive retaliation aura: adjacent enemies auto-take necrotic chip on approach"
    # Reaction: when a creature moves within 10 ft of Marty or starts its turn there, deal
    # necrotic (CON save DC 19 to negate). Once per creature per turn. Doubled under Symbiotic.
    type: reaction
    unlock_chapter: 2         # Circle of Spores L2 → Ch2 (MVP)
    damage_dice_scaling:      # Halo dice grow with druid level on the 1:1 curve
      - { chapters: "2-5", dice: "1d4" }
      - { chapters: "6-8", dice: "1d6" }
      - { chapters: "9-12", dice: "1d8" }
      - { chapters: "13-20", dice: "1d10" }
    damage_type: necrotic
    save: CON
    save_dc: 19               # 8 + prof6 + WIS5 at end-state

  - id: spreading-spores
    name: "Spreading Spores"
    flavor: "Marty flings a fistful of cap-dust; it billows into a creeping, devouring patch."
    fe_mechanic: "places a persistent hazard tile (2×2) that chips anything standing in it"
    # Bonus action (folded into the main action per rules-mapping §B) while Symbiotic is active.
    type: activated
    unlock_chapter: 9         # Circle of Spores L10 → Ch9 (POST-MVP)
    requires_status: symbiotic_entity_status
    effect: place_spore_hazard_zone

  - id: fungal-infestation
    name: "Fungal Infestation"
    flavor: "Corpse Bloom — Marty seeds a fresh kill with spores; it lurches up as a fungal thrall."
    fe_mechanic: "Summoner phantom (FE8 Summon), but spawned from a slain enemy's body"
    # Reaction: when a beast or Small/Medium humanoid dies within 10 ft, animate it as a
    # zombie thrall (1 HP, melee only) that acts on Marty's turn.
    type: reaction
    unlock_chapter: 6         # Circle of Spores L6 → Ch6 (MVP)
    uses_per_chapter: 5
    spawn_unit: zombie-fungal

  - id: crit-immunity
    name: "Crit Immunity"
    flavor: "There's nothing vital to hit — a 'killing blow' just punches through fruiting body."
    fe_mechanic: "passive: enemy crits against Marty are downgraded to normal hits"
    # From Fungal Body (Circle of Spores L14): crits count as normal hits unless incapacitated.
    type: passive
    unlock_chapter: 13        # Circle of Spores L14 → Ch13 (POST-MVP)
    effect: no_critical_hits_received
    source: fungal_body_class_feature

  - id: pacifying-spores
    name: "Pacifying Spores"
    flavor: "A breath of soporific spores; the target goes glassy-eyed and still."
    fe_mechanic: "Sleep staff (single target): enemy can't act or counter this turn"
    # Sporemaster racial: action, creature within 5 ft, CON save DC 19 — Stunned. 1/chapter.
    type: activated
    unlock_chapter: 1         # racial — available from start
    uses_per_chapter: 1
    range: 1
    save: CON
    save_dc: 19
    effect: stunned

  - id: pheromone-spores
    name: "Pheromone Spores"
    flavor: "Marty tags a foe with a scent-marker only his spores and thralls can track."
    fe_mechanic: "mark/target-buff: Marty and all his summons gain +hit (advantage) vs the marked foe"
    # Sporemaster racial: action, mark one creature within 60 ft. Uses = CON mod (3)/chapter.
    type: activated
    unlock_chapter: 1         # racial — available from start
    uses_per_chapter: 3
    range: 4
    effect: mark_target_for_advantage

  # ── Prepared Spore Spells (PREPARED list from PDF = Circle of Spores "Always Prepared") ──
  # These are the spells Marty actually walked around with prepared — entirely his subclass's
  # spore-themed list. DUAL STRUCTURE: fe_mechanic = vanilla FE8 anchor; flavor = spore reskin.
  # Spell-level → chapter: 2nd→Ch3, 3rd→Ch5, 4th→Ch7 (MVP cap), 5th→Ch9 (post-MVP).
  # This is the "spore abilities visible in-game" kit (Nicolas's ask, 2026-05-28).

  - id: blindness-deafness
    name: "Blindness/Deafness"
    flavor: "Blinding Bloom — a faceful of stinging spores; the target can't see past the cloud."
    fe_mechanic: "status proc: target attacks at heavy −hit (blinded) for a turn"
    type: spell_tome
    spell_level: 2
    unlock_chapter: 3
    uses_per_chapter: 3
    save: CON
    range: 2
    effect: blind_status

  - id: animate-dead
    name: "Animate Dead"
    flavor: "Grave Garden — Marty seeds buried corpses; they claw up sprouting with fungus."
    fe_mechanic: "Summoner phantom (FE8 Summon) — a deliberate, pre-deployed thrall (vs Fungal Infestation's reactive one)"
    type: summon
    spell_level: 3
    unlock_chapter: 5
    uses_per_chapter: 2
    spawn_unit: zombie-fungal
    max_active: 2

  - id: gaseous-form
    name: "Gaseous Form"
    flavor: "Spore Drift — Marty disperses into a low-hanging haze and seeps out of reach."
    fe_mechanic: "self untargetable for a turn (like Sclorbo's Natural Shelter) — escape/reposition utility"
    type: activated
    spell_level: 3
    unlock_chapter: 5
    uses_per_chapter: 1
    effect: self_untargetable_timed

  - id: blight
    name: "Blight"
    flavor: "Rot — Marty points, and killing spores erupt inside the target, draining it to feed him."
    fe_mechanic: "Nosferatu (dark anima nuke that heals the caster for a share of damage)"
    type: spell_tome
    spell_level: 4
    unlock_chapter: 7         # 4th-level → Ch7 (MVP cap)
    uses_per_chapter: 2
    damage_type: necrotic
    save: CON
    range: 2
    effect: damage_and_self_heal

  - id: confusion
    name: "Confusion"
    flavor: "Maddening Spores — hallucinogenic dust scrambles a cluster of foes into lashing out wildly."
    fe_mechanic: "Berserk staff (AoE): affected enemies attack whoever's nearest, friend or foe"
    type: spell_tome
    spell_level: 4
    unlock_chapter: 7         # 4th-level → Ch7 (MVP cap)
    uses_per_chapter: 1
    save: WIS
    range: 4
    aoe: "2x2"
    effect: berserk_status_aoe

  - id: cloudkill
    name: "Cloudkill"
    flavor: "Killing Cloud — a rolling bank of toxic green spores that smothers everything in its path."
    fe_mechanic: "drifting poison hazard zone — heavy chip damage to anything inside, moves each turn"
    type: spell_tome
    spell_level: 5
    unlock_chapter: 9         # 5th-level → Ch9 (POST-MVP)
    uses_per_chapter: 1
    damage_type: poison
    save: CON
    range: 4
    effect: drifting_poison_hazard

  - id: contagion
    name: "Contagion"
    flavor: "Plague Spores — Marty infects a single foe with a wasting fungal sickness."
    fe_mechanic: "Poison status (strong): lingering chip + a stat penalty until cured/chapter end"
    type: spell_tome
    spell_level: 5
    unlock_chapter: 9         # 5th-level → Ch9 (POST-MVP)
    uses_per_chapter: 1
    save: CON
    range: 1
    effect: heavy_poison_debuff

  - id: gentle-repose
    name: "Gentle Repose [R]"
    flavor: "Marty preserves a fallen ally's body in stasis spores — keeping them whole for revival."
    fe_mechanic: "no combat effect; narrative/utility — extends the window for Sclorbo's revival staves"
    type: narrative_utility
    spell_level: 2
    unlock_chapter: 3
    effect: preserve_fallen_for_revive   # ties into sclorbo's reviver kit (post-MVP)

# ── Signature Moment ─────────────────────────────────────────────────────────
signature_moment:
  chapter: ch05-the-maer-monster
  description: >
    The Messie Talk. Marty uses Talk with Animals on the plesiosaur Messie mid-fight,
    learns she was "awakened" by the frost druids and fears losing her intelligence,
    and resolves the boss peacefully — the moment that "changed everything" in the
    real campaign (PRD §7, Ch 5). Mechanically the chapter's hidden Talk
    resolution: get Marty adjacent to Messie and the Talk command appears.
  dialogue_trigger: marty_messie_talk
  # Sourced from the DM notes + PRD §7. (His earlier Lonelywood direwolf-taming,
  # Ch 4 area, is a secondary beat — see ch04 YAML.)

# ── Support Affinities ────────────────────────────────────────────────────────
supports:
  - partner: braulo
    affinity: fire
  - partner: sclorbo
    affinity: water
