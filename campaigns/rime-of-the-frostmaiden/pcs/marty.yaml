# pcs/marty.yaml — Marty the Merry Mushroom, Druid (Circle of Spores)
# Source: data/pc-sheets/marty-the-merry-mushroom.json + References/PCs/MMM Character Sheet.pdf
# See docs/class-mapping.md and docs/PRD.md §6.7 for class mapping rationale.

id: marty
name: "Marty the Merry Mushroom"
portrait_ref: portraits/marty.png       # GBA-ready sprite pending (issue #23)
portrait_source: data/portraits/marty.jpeg
# Portrait source: https://www.dndbeyond.com/avatars/25824/431/1581111423-70515811.jpeg

# ── D&D 5e Source (reference only — does NOT drive FE mechanics) ────────────────
# FE stats come verbatim from the vanilla class below, not from D&D scores.
# Raw sheet: data/pc-sheets/marty-the-merry-mushroom.json  ·  Curated flavor: lore/marty.md
dnd:
  race: Sporemaster
  class: "Druid (Circle of Spores)"
  source: data/pc-sheets/marty-the-merry-mushroom.json
  lore: lore/marty.md

# ── FE Starting Stats (Chapter 1 / level 1 equivalent) ─────────────────────────
# Adjust during Phase 1 playtesting.
fe_stats:
  class: Shaman              # FE base class — Dark mage. Marty's D&D Druid maps to Shaman→Druid
                             # (FE8 has a real Druid class, reachable only via Shaman). Differentiates
                             # from Meesmickle at PROMOTION (Marty leans Druid; Meesmickle leans Summoner),
                             # not at base. See docs/class-mapping.md and docs/decisions.md.
  level: 1
  # Vanilla FE8 Shaman stats, verbatim from data_classes.c [CLASS_SHAMAN - 1]. No D&D-derived tuning.
  # Shaman is a magic (Dark) unit: single Pow stat is the magic attack (= MAG), no STR.
  # LCK: ClassData has no base luck — set 0 until personal luck is assigned deliberately.
  HP: 16
  MAG: 2                     # FE Pow (Shaman basePow) — magic attack stat
  SKL: 1
  SPD: 2
  DEF: 2
  RES: 4
  LCK: 0                     # ClassData has no base luck
  MOV: 5                     # Shaman baseMov
  CON: 7

# ── Promotion (FE8 branched — the PLAYER chooses at the Master Seal) ──────────────
promotion:
  branch: [Druid, Summoner]  # vanilla Shaman branch (classchg-data.c [CLASS_SHAMAN])
  default: Druid             # thematic lean (Marty = D&D Druid); player may pick either.
  # Summoner grants the vanilla FE8 Summon command (CA_SUMMON) — a stock class feature, not a
  # custom ability — so the "summon creatures" fantasy is reachable the FE-pure way if chosen.

# ── Growth Rates (% per level) — vanilla Shaman growths from data_classes.c ──────
growth_rates:
  HP: 50
  MAG: 50
  SKL: 32
  SPD: 30
  DEF: 10
  RES: 30
  LCK: 20

# ── Inventory (Chapter 1 starting equipment) ─────────────────────────────────
# MVP: Marty is an unpromoted Shaman (Dark attacker). Staves come online at his promotion
# (Druid OR Summoner — both use staves), so his healing is post-MVP; Sclorbo is the MVP healer.
# Tome stats inherited from the vanilla item named in `fe_base` (no custom Might). Spore/fungal
# flavor rides on the sprite art + lore/marty.md (incl. the dropped "Witherspore" cantrip).
inventory:
  - id: shillelagh
    name: "Shillelagh"
    # Flavor name (Marty's druid cantrip); mechanically the basic Dark tome (stock 'Flux' stats).
    fe_base: flux
    fe_weapon_type: Dark       # FE Shaman weapon class (baseRanks ITYPE_DARK)
    range: 2
    damage_type: bludgeoning   # cosmetic flavor label only
  - id: heal-staff
    name: "Heal Staff"
    fe_base: heal
    fe_weapon_type: Staff
    unlock: promotion          # base Shaman is Dark-only; staves come at the Druid/Summoner promotion
    is_staff: true
  - id: goodberry
    name: "Goodberry"          # reflavored Vulnerary (consumable)
    fe_base: vulnerary
    uses: 3
# -- Unique Abilities ------------------------------------------------------
# NONE. Marty the Merry Mushroom is a stock FE8 Monk -- no per-character mechanics, even on promotion.
# Individuality comes from flavor text, portrait/sprite art, and palette -- not special
# skills (Nicolas's call, 2026-05-29: vanilla classes only, nothing extra: no timed
# buffs/debuffs, no special movement, no procs).

signature_moment:
  chapter: ch05-the-maer-monster
  description: >
    The Messie Talk. Marty uses Talk with Animals on the plesiosaur Messie mid-fight,
    learns she was "awakened" by the frost druids and fears losing her intelligence,
    and resolves the boss peacefully — the moment that "changed everything" in the
    real campaign (PRD §7, Ch 5). Mechanically the chapter's hidden Talk
    resolution: get Marty adjacent to Messie and the Talk command appears.
  dialogue_trigger: marty_messie_talk
  # Sourced from the DM notes + PRD §7. (His earlier Lonelywood direwolf-taming,
  # Ch 4 area, is a secondary beat — see ch04 YAML.)

# ── Support Affinities ────────────────────────────────────────────────────────
supports:
  - partner: braulo
    affinity: fire
  - partner: sclorbo
    affinity: water
