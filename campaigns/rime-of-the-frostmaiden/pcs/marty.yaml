# pcs/marty.yaml — Marty the Merry Mushroom, Druid (Circle of Spores)
# Source: data/pc-sheets/marty-the-merry-mushroom.json + References/PCs/MMM Character Sheet.pdf
# Class roster: docs/CLASSES.md (generated). Rationale: docs/decisions.md §Class Mapping & Promotions.

id: marty
name: "Marty the Merry Mushroom"
death_quote: "(a soft puff of spores) Don't grieve, friends... I'm only rejoining the cycle..."  # falls-in-battle quote (#6 dialogue pass; lore/marty.md)
lord_pitch: "Dark mage -- strikes resistance at range, but frail."  # lord-select card blurb (#46): plain + qualitative, FE8 class-help register (no stats); Nicolas-confirmed 2026-06-21
fe_name: Marty                            # FE8 name buffer is <=12 chars; full name overflows it
portrait_ref: portraits/marty.png       # GBA-ready sprite pending (issue #23)
portrait_source: data/portraits/marty.jpeg
# Portrait source: https://www.dndbeyond.com/avatars/25824/431/1581111423-70515811.jpeg

# ── Custom Art Brief (decided 2026-06-01 portrait walkthrough) ───────────────────
# ALL parts custom indexed-palette art. Follow the concept ref faithfully.
art:
  render:                     # exact reproduction of the shipped bust (tools/ref_to_bust.py)
    ref: "References/PCs/MartyFlat.png"   # flat/bold cel ref — survives the downscale crisper than the painterly one
    crop: [0, 35, 2222, 1887]      # ref pixels, ~1.2 aspect
    zoom: 0.74                     # headroom so the whole cap clears FE8's dead top corners (0 px clipped)
    hand_pass: portraits/marty_eye_fixup.py   # redraws the ~17px face crisp (eyes/smile), keyed off the face blob
  approach: custom
  fidelity: faithful
  must_keep:                  # tells that make the bust read as "Marty"
    - red toadstool cap with white spots
    - round grey myconid head, two big round yellow eyes, gentle mouth
    - stubby crossed arms + wooden staff with a tiny green sprout
  face: visible               # simple two-dot eyes + small mouth, easy to animate
  composition: merry          # cozy, content, harmless-looking — the "merry mushroom"
  spore_hint: true            # a few faint spores/glowing motes drift around the cap —
                              # quietly signal the Circle-of-Spores dark magic; keep it ELEGANT, not menacing
  expression: content-smile   # merry default; dark-magic surprise rides on the battle/spell anim
  palette_plan: >             # rough 16-color budget (incl. index-0 transparent)
    cap red ×2 + white spots, body greys ×3 + soft shadow, yellow eyes,
    brown staff, green sprout, pale spore-mote glow (shares white), black outline.
  map_sprite:                 # overworld idle/walk base (issue #38 art loop; Nicolas's pick 2026-06-05)
    base: Priest              # robed staff-holder — matches his twig-staff; staff is cosmetic only
    footprint: 16x16
    weapon: stock (staff)     # the SPRITE shows a staff; mechanically Marty is still a Shaman (dark tome)
    adds:
      - red white-spotted toadstool cap as the head/hood dome
      - red scarf at the neck
      - cream/grey robe recolour into the shared cast palette

# ── D&D 5e Source (reference only — does NOT drive FE mechanics) ────────────────
# FE stats come verbatim from the vanilla class below, not from D&D scores.
# Raw sheet: data/pc-sheets/marty-the-merry-mushroom.json  ·  Curated flavor: lore/marty.md
dnd:
  race: Sporemaster
  class: "Druid (Circle of Spores)"
  source: data/pc-sheets/marty-the-merry-mushroom.json
  lore: lore/marty.md

# ── FE Starting Stats (Chapter 1 / level 1 equivalent) ─────────────────────────
# Adjust during Phase 1 playtesting.
fe_stats:
  class: Shaman              # FE base class — Dark mage. Marty's D&D Druid maps to Shaman→Druid
                             # (FE8 has a real Druid class, reachable only via Shaman). Differentiates
                             # from Meesmickle at PROMOTION (Marty leans Druid; Meesmickle leans Summoner),
                             # not at base. See docs/decisions.md §Class Mapping & Promotions.
  level: 1
  # Vanilla FE8 Shaman stats, verbatim from data_classes.c [CLASS_SHAMAN - 1]. No D&D-derived tuning.
  # Shaman is a magic (Dark) unit: single Pow stat is the magic attack (= MAG), no STR.
  # LCK: ClassData has no base luck — set 0 until personal luck is assigned deliberately.
  HP: 16
  MAG: 2                     # FE Pow (Shaman basePow) — magic attack stat
  SKL: 1
  SPD: 2
  DEF: 2
  RES: 4
  LCK: 0                     # ClassData has no base luck
  MOV: 5                     # Shaman baseMov
  CON: 7

# ── Promotion (FE8 branched — the PLAYER chooses at the Master Seal) ──────────────
promotion:
  branch: [Druid, Summoner]  # vanilla Shaman branch (classchg-data.c [CLASS_SHAMAN])
  default: Druid             # thematic lean (Marty = D&D Druid); player may pick either.
  # Summoner grants the vanilla FE8 Summon command (CA_SUMMON) — a stock class feature, not a
  # custom ability — so the "summon creatures" fantasy is reachable the FE-pure way if chosen.

# ── Growth Rates (% per level) — vanilla Shaman growths from data_classes.c ──────
growth_rates:
  HP: 50
  MAG: 50
  SKL: 32
  SPD: 30
  DEF: 10
  RES: 30
  LCK: 20

# ── Inventory (Chapter 1 starting equipment) ─────────────────────────────────
# MVP: Marty is an unpromoted Shaman (Dark attacker). Staves come online at his promotion
# (Druid OR Summoner — both use staves), so his healing is post-MVP; Sclorbo is the MVP healer.
# Tome stats inherited from the vanilla item named in `fe_base` (no custom Might). Spore/fungal
# flavor rides on the sprite art + lore/marty.md (incl. the dropped "Witherspore" cantrip).
inventory:
  - id: shillelagh
    name: "Shillelagh"
    # Flavor name (Marty's druid cantrip); mechanically the basic Dark tome (stock 'Flux' stats).
    fe_base: flux
    fe_weapon_type: Dark       # FE Shaman weapon class (baseRanks ITYPE_DARK)
    range: 2
    damage_type: bludgeoning   # cosmetic flavor label only
  - id: heal-staff
    name: "Heal Staff"
    fe_base: heal
    fe_weapon_type: Staff
    unlock: promotion          # base Shaman is Dark-only; staves come at the Druid/Summoner promotion
    is_staff: true
  - id: goodberry
    name: "Goodberry"          # reflavored Vulnerary (consumable)
    fe_base: vulnerary
    uses: 3
# -- Unique Abilities ------------------------------------------------------
# NONE. Marty the Merry Mushroom is a stock FE8 Shaman -- no per-character mechanics, even on promotion.
# Individuality comes from flavor text, portrait/sprite art, and palette -- not special
# skills (Nicolas's call, 2026-05-29: vanilla classes only, nothing extra: no timed
# buffs/debuffs, no special movement, no procs).

# ── Battle Animation ──────────────────────────────────────────────────────────
# The artist authored all three poses on one canvas; retain that shared layout during
# descale. Shaman supplies the charge cadence. Marty alone tints every Dark-tome
# battle effect green; it is visual flavor, not a mechanical spell change.
battle_anim:
  clone_from: shaman
  motion: magic
  abbr: mart_sh1
  frames:
    - marty/ready.png
    - marty/windup.png
    - marty/peak.png
  spell_palette_tint:
    weapon_type: dark
    color: green
  charge_flash:               # #183: his sprite pulses green on the wind-up/charge beat
    color: green              # matches his green Flux; weapon type derived from the donor (shaman/dark)

signature_moment:
  chapter: ch06-the-maer-monster
  description: >
    The Messie Talk. Marty uses Talk with Animals on the plesiosaur Messie mid-fight,
    learns she was "awakened" by the frost druids and fears losing her intelligence,
    and resolves the boss peacefully — the moment that "changed everything" in the
    real campaign (Ch 6 — see docs/CHAPTERS.md). Mechanically the chapter's hidden Talk
    resolution: get Marty adjacent to Messie and the Talk command appears.
  dialogue_trigger: marty_messie_talk
  # Sourced from the DM notes. (His earlier Lonelywood direwolf-taming,
  # Ch 4 area, is a secondary beat — see ch04 YAML.)

# ── Support Affinities ────────────────────────────────────────────────────────
supports:
  - partner: braulo
    affinity: fire
  - partner: sclorbo
    affinity: water
