# pcs/braulo.yaml — Braulo, Barbarian (Path of the Berserker)
# Source: data/pc-sheets/braulo.json + References/PCs/Braulo Character Sheet.pdf
# See docs/class-mapping.md and docs/PRD.md §6.7 for class mapping rationale.

id: braulo
name: Braulo
portrait_ref: portraits/braulo.png       # GBA-ready sprite pending (issue #23)
portrait_source: data/portraits/braulo.jpeg
# Portrait source: https://www.dndbeyond.com/avatars/25784/526/1581111423-73827256.jpeg

# ── D&D 5e Identity ────────────────────────────────────────────────────────────
dnd:
  race: "Hermit Crab"               # homebrew Pagurian
  class: Barbarian
  subclass: "Path of the Berserker"
  level_end_state: 20
  alignment: neutral
  size: medium                      # 7 ft tall, 500 lbs
  age: 40
  height: "7 ft"
  weight: "500 lbs"
  background: "Custom Background"  # PDF p1; merchant flavor in backstory, not a standard background
  personality: "Thrifty and driven — always looking for the better deal, the better shell."
  ideal: "The Next Shell. The best one is always just over the horizon."
  bond: "Dosh — wealth and profit above all else."
  flaw: Greed
  backstory: >
    A travelling merchant from the ocean floor, searching the world for his next shell.
    Believes the perfect shell is always just over the horizon.
  languages: [Common, Aquan, "Deep Speech"]
  ability_scores:
    STR: 23
    DEX: 8
    CON: 24
    INT: 10
    WIS: 12
    CHA: 13
  saving_throw_proficiencies: [STR, CON]
  hp_max: 285
  ac: 17                            # Natural Armor: shell provides flat AC 17 (DEX not applied)
  speed_ft: 40                      # 30 base + 10 Fast Movement (no heavy armor)
  racial_traits:
    # Hermit Crab (homebrew Pagurian) — from PDF page 3
    natural_armor:
      ac: 17
      dex_applied: false            # Shell AC is flat — DEX modifier does NOT apply
    claws:
      damage_dice: "1d4"
      damage_type: slashing
      ability_mod: STR              # +6 STR at end-state (= +7 at end-state total with STR 23)
    amphibious: true                # can breathe air and water
    pagurian_telepathy:
      # Can communicate telepathically with other Pagurians within 60 ft.
      range_ft: 60
    fast_movement:
      # +10 ft speed while not wearing heavy armor (Barbarian level 5 class feature).
      bonus_ft: 10
    shell_defense:                  # full mechanics in unique_abilities
      note: "see unique_abilities.shell-defense"

# ── FE Starting Stats (Chapter 1 / level 1 equivalent) ─────────────────────────
# Hand-tuned starting values. Adjust during Phase 1 playtesting.
fe_stats:
  class: Pirate
  promoted_class: Berserker
  level: 1
  HP: 22
  STR: 7                            # high — Braulo's defining stat
  SKL: 4
  SPD: 5
  DEF: 6
  RES: 2
  LCK: 3
  MOV: 6                            # speed_ft: 40 → 6 tiles (standard 30 ft = 5 tiles)
  CON: 12                           # large unit, heavy weapons

# ── Growth Rates (% per level, FE standard) ──────────────────────────────────
growth_rates:
  HP: 75
  STR: 60
  SKL: 35
  SPD: 40
  DEF: 50
  RES: 15
  LCK: 25

# ── Inventory (Chapter 1 starting equipment) ───────────────────────────────────
inventory:
  - id: nu-shipwrecker
    name: "Nu' Shipwrecker"
    damage_type: piercing           # CORRECTED: Piercing (not Slashing — PDF confirmed)
    weapon_dice: "1d8"              # CORRECTED: 1d8 (not 1d10 — PDF confirmed); +7 STR at end-state
    ability_mod: STR
    range: melee
    uses: null
    locked: true                    # personal weapon, cannot be traded
  - id: trident
    name: Trident
    damage_type: piercing
    weapon_dice: "1d8"
    ability_mod: STR                # +6 STR at end-state; silvered
    range: 2                        # thrown: range 20/60 ft → ~2 FE tiles
    uses: null
    notes: "Silvered. Thrown (range 20/60 ft). +6 STR mod at end-state."
  - id: vulnerary
    name: "Healing Potion"
    uses: 3

# ── D&D-Derived Stat Overrides ─────────────────────────────────────────────────
d20_fields:
  AC: 14                            # Chapter 1 starting AC
                                    # End-state target: 17 (flat from shell, DEX not applied).
  ability_mod_atk: STR
  prof_bonus: 2
  spell_slots: null                 # Barbarian: no spell slots

# ── Unique Abilities ────────────────────────────────────────────────────────────
unique_abilities:
  - id: rage
    name: Rage
    # Effect: +4 melee damage, resistance to B/P/S damage (×0.5 incoming),
    #         advantage on STR checks/saves. Lasts the combat phase.
    # FE implementation: consumable item that grants rage_status.
    type: consumable_item
    uses_per_chapter: 3
    status_effect: rage_status

  - id: shell-defense
    name: "Shell Defense"
    # Command: spend action to retract into shell.
    # Effect: +4 AC, advantage on STR/CON saves, speed 0, prone,
    #         disadvantage on DEX saves, cannot take reactions.
    # Exit: costs bonus action to emerge next turn; then normal turn resumes.
    # Cannot be used while raging.
    # FE implementation: unit command applying shell_defense_status.
    type: unit_command
    effect:
      AC_bonus: 4
      STR_save_advantage: true
      CON_save_advantage: true
      DEX_save_disadvantage: true
      MOV_override: 0
      prone: true
      reactions_blocked: true
    exit: bonus_action_next_turn

  - id: relentless-rage
    name: "Relentless Rage"
    # Passive: when Braulo drops to 0 HP while raging, make a CON save (DC 10,
    # +5 per each prior use this rage). On success, drop to 1 HP instead.
    # FE implementation: passive — when reduced to 0 in rage_status, trigger CON save.
    type: passive
    trigger: zero_hp_while_raging
    save: CON
    save_dc_base: 10
    save_dc_escalation: 5           # DC increases by 5 for each successive use in same rage

  - id: brutal-critical
    name: "Brutal Critical"
    # Nat 20 → roll weapon dice THREE times instead of two.
    type: passive
    crit_extra_dice: 1              # 1 extra die on top of standard 2× crit

  - id: primal-champion
    name: "Primal Champion"
    # Level 20: STR and CON each +4 permanently (already reflected in ability_scores above).
    type: passive
    note: "Already reflected in ability_scores (STR 23 includes +4; CON 24 includes +4)."

  - id: retaliation
    name: Retaliation
    # Reaction: melee attack when hit by an adjacent creature.
    # FE implementation: free counter before the standard FE counterattack window.
    type: reaction

  - id: reckless-attack
    name: "Reckless Attack"
    # Barbarian PHB 48: on first STR melee attack of the turn, gain advantage —
    # but enemies have advantage attacking Braulo until his next turn.
    # FE implementation: activated toggle each turn — Braulo's attacks get +5 hit,
    # enemies get +5 hit vs Braulo for that round.
    type: activated
    effect: advantage_offense_and_taken

  - id: mindless-rage
    name: "Mindless Rage"
    # Barbarian PHB 49: while raging, immune to charmed and frightened.
    # FE implementation: rage_status grants immunity to charm/fear flags.
    type: passive
    requires_status: rage_status
    immunities: [charmed, frightened]

  - id: danger-sense
    name: "Danger Sense"
    # Barbarian PHB 48: advantage on DEX saves vs effects Braulo can see
    # (not blinded/deafened/incapacitated). Helps vs AoE breath weapons / spells.
    type: passive
    effect: advantage_dex_saves_visible

  - id: feral-instinct
    name: "Feral Instinct"
    # Barbarian PHB 49: advantage on initiative. If surprised, can act on first turn
    # if he enters rage before acting.
    # FE implementation: Braulo deploys with initiative bonus (+5 to turn order roll).
    type: passive
    effect: initiative_advantage

# ── Signature Moment ────────────────────────────────────────────────────────────
signature_moment:
  chapter: ch07-the-eastway-ambush
  description: >
    Turn 1 scripted event — Braulo bursts his shackles, starting the fight
    that gets the whole party captured. Triggers unique dialogue.
  dialogue_trigger: braulo_shackle_break

# ── Support Affinities ──────────────────────────────────────────────────────────
supports:
  - partner: wolfram
    affinity: fire
  - partner: marty
    affinity: wind
