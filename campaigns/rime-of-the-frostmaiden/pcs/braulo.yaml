# pcs/braulo.yaml — Braulo, Barbarian (Path of the Berserker)
# Source: data/pc-sheets/braulo.json + References/PCs/Braulo Character Sheet.pdf
# Class roster: docs/CLASSES.md (generated). Rationale: docs/decisions.md §Class Mapping & Promotions.

id: braulo
name: Braulo
portrait_ref: portraits/braulo.png       # GBA-ready sprite pending (issue #23)
portrait_source: data/portraits/braulo.jpeg
# Portrait source: https://www.dndbeyond.com/avatars/25784/526/1581111423-73827256.jpeg

# ── Custom Art Brief (decided 2026-06-01 portrait walkthrough) ───────────────────
# ALL parts custom indexed-palette art (no recolor, no vanilla-anim reuse). Follow the
# concept ref faithfully. 96×80 / 16-color portrait + custom map sprite + battle anim.
art:
  render:                     # exact reproduction of the shipped bust (tools/ref_to_bust.py)
    ref: "References/PCs/Broulo Face Clean.png"
    crop: [120, 180, 1960, 1720]   # ref pixels, ~1.2 aspect — taller "claw-crop" (more lower body)
    downscale: smooth
    zoom: 0.84                     # headroom so hat+shell shoulders clear FE8's dead top corners (26px residual)
    hand_pass: null
  approach: custom            # not recolor; follow concept art to best ability
  fidelity: faithful          # keep the crab anatomy, don't humanize
  must_keep:                  # the tells that make a bust crop read as "Braulo"
    - red crab claws (one raised into frame)
    - tan speckled carapace shoulders
    - grey-white muscle plating
    - conch shell on back (rim visible)
    - woven wicker basket-hat
  face: per-concept           # head as drawn (basket-hat'd carapace), not a human face
  expression: berserker-fury  # snarling/aggressive — matches Berserker + Ch8 shackle-break
  palette_plan: >             # rough 16-color budget (incl. index-0 transparent)
    reds ×3 (claws), tans ×3 + dark speckle (carapace/hat/shell), greys ×3 + white
    (muscle), black outline, eye + mouth-interior. Tight but fits 16.

# ── D&D 5e Source (reference only — does NOT drive FE mechanics) ────────────────
# FE stats come verbatim from the vanilla class below, not from D&D scores.
# Raw sheet: data/pc-sheets/braulo.json  ·  Curated flavor: lore/braulo.md
dnd:
  race: Hermit Crab
  class: "Barbarian (Path of the Berserker)"
  source: data/pc-sheets/braulo.json
  lore: lore/braulo.md

# ── FE Starting Stats (level 1) ────────────────────────────────────────────────
# Vanilla FE8 Pirate stats, verbatim from fireemblem8u/src/data_classes.c [CLASS_PIRATE - 1].
# No D&D-derived tuning. FE has a single Pow stat (= STR here). LCK: ClassData defines no
# base luck (it is a character-layer stat) — set 0 until personal luck is assigned deliberately.
fe_stats:
  class: Pirate
  level: 1
  HP: 19
  STR: 4                            # FE Pow (Pirate basePow)
  SKL: 2
  SPD: 6
  DEF: 3
  RES: 0
  LCK: 0                            # ClassData has no base luck
  MOV: 5                            # Pirate baseMov
  CON: 10

# ── Promotion (FE8 branched — the PLAYER chooses at the Master Seal) ──────────────
promotion:
  branch: [Warrior, Berserker]      # vanilla Pirate branch (classchg-data.c [CLASS_PIRATE])
  default: Berserker                # thematic lean; player may pick either.

# ── Growth Rates (% per level) — vanilla Pirate growths from data_classes.c ──────
growth_rates:
  HP: 75
  STR: 50
  SKL: 35
  SPD: 25
  DEF: 10
  RES: 13
  LCK: 15

# ── Inventory (Chapter 1 starting equipment) ───────────────────────────────────
# MVP: stock FE weapon economy — stats inherited from the vanilla item named in `fe_base`
# (no custom Might). Braulo's personal-weapon flavor (Nu' Shipwrecker, Trident) is parked in
# lore/braulo.md as a POST-MVP story-progression item; visual identity rides on the sprite art.
inventory:
  - id: iron-axe
    name: "Iron Axe"
    fe_base: iron-axe               # vanilla FE8 stats (Mt/Hit/Crit/Wt/uses); no custom tuning
    fe_weapon_type: Axe
    damage_type: slashing           # cosmetic flavor label only
  - id: hand-axe
    name: "Hand Axe"
    fe_base: hand-axe               # 1–2 range throwing axe; vanilla stats
    fe_weapon_type: Axe
    range: 2
    damage_type: slashing
  - id: vulnerary
    name: "Healing Potion"          # reflavored Vulnerary (consumable)
    fe_base: vulnerary
    uses: 3
# -- Unique Abilities ------------------------------------------------------
# NONE. Braulo is a stock FE8 Pirate -- no per-character mechanics, even on promotion.
# Individuality comes from flavor text, portrait/sprite art, and palette -- not special
# skills (Nicolas's call, 2026-05-29: vanilla classes only, nothing extra: no timed
# buffs/debuffs, no special movement, no procs).

signature_moment:
  chapter: ch08-the-eastway-ambush
  description: >
    Turn 1 scripted event — Braulo bursts his shackles, starting the fight
    that gets the whole party captured. Triggers unique dialogue.
  dialogue_trigger: braulo_shackle_break

# ── Support Affinities ──────────────────────────────────────────────────────────
supports:
  - partner: wolfram
    affinity: fire
  - partner: marty
    affinity: wind
