# pcs/braulo.yaml — Braulo, Barbarian (Path of the Berserker)
# Source: data/pc-sheets/braulo.json + References/PCs/Braulo Character Sheet.pdf
# See docs/class-mapping.md and docs/PRD.md §6.7 for class mapping rationale.

id: braulo
name: Braulo
portrait_ref: portraits/braulo.png       # GBA-ready sprite pending (issue #23)
portrait_source: data/portraits/braulo.jpeg
# Portrait source: https://www.dndbeyond.com/avatars/25784/526/1581111423-73827256.jpeg

# ── D&D 5e Identity ────────────────────────────────────────────────────────────
dnd:
  race: "Hermit Crab"               # homebrew Pagurian
  class: Barbarian
  subclass: "Path of the Berserker"
  level_end_state: 20
  alignment: neutral
  size: medium                      # 7 ft tall, 500 lbs
  age: 40
  height: "7 ft"
  weight: "500 lbs"
  background: "Custom Background"  # PDF p1; merchant flavor in backstory, not a standard background
  personality: "Thrifty and driven — always looking for the better deal, the better shell."
  ideal: "The Next Shell. The best one is always just over the horizon."
  bond: "Dosh — wealth and profit above all else."
  flaw: Greed
  backstory: >
    A travelling merchant from the ocean floor, searching the world for his next shell.
    Believes the perfect shell is always just over the horizon.
  languages: [Common, Aquan, "Deep Speech"]
  ability_scores:
    STR: 23
    DEX: 8
    CON: 24
    INT: 10
    WIS: 12
    CHA: 13
  saving_throw_proficiencies: [STR, CON]
  hp_max: 285
  ac: 17                            # Natural Armor: shell provides flat AC 17 (DEX not applied)
  speed_ft: 40                      # 30 base + 10 Fast Movement (no heavy armor)
  racial_traits:
    # Hermit Crab (homebrew Pagurian) — from PDF page 3
    natural_armor:
      ac: 17
      dex_applied: false            # Shell AC is flat — DEX modifier does NOT apply
    claws:
      damage_dice: "1d4"
      damage_type: slashing
    amphibious: true                # can breathe air and water
    pagurian_telepathy:
      # Can communicate telepathically with other Pagurians within 60 ft.
      range_ft: 60
    fast_movement:
      # +10 ft speed while not wearing heavy armor (Barbarian level 5 class feature).
      bonus_ft: 10
    shell_defense:                  # D&D flavor only — no FE mechanic (stock Pirate class)
      note: "narrative/flavor; not represented as a gameplay ability"

# ── FE Starting Stats (level 1) ────────────────────────────────────────────────
# Vanilla FE8 Pirate stats, verbatim from fireemblem8u/src/data_classes.c [CLASS_PIRATE - 1].
# No D&D-derived tuning. FE has a single Pow stat (= STR here). LCK: ClassData defines no
# base luck (it is a character-layer stat) — set 0 until personal luck is assigned deliberately.
fe_stats:
  class: Pirate
  promoted_class: Berserker
  level: 1
  HP: 19
  STR: 4                            # FE Pow (Pirate basePow)
  SKL: 2
  SPD: 6
  DEF: 3
  RES: 0
  LCK: 0                            # ClassData has no base luck
  MOV: 5                            # Pirate baseMov
  CON: 10

# ── Growth Rates (% per level) — vanilla Pirate growths from data_classes.c ──────
growth_rates:
  HP: 75
  STR: 50
  SKL: 35
  SPD: 25
  DEF: 10
  RES: 13
  LCK: 15

# ── Inventory (Chapter 1 starting equipment) ───────────────────────────────────
inventory:
  - id: nu-shipwrecker
    name: "Nu' Shipwrecker"
    fe_weapon_type: Axe             # FE Pirate weapon class (data_classes.c baseRanks ITYPE_AXE)
    damage_type: piercing           # D&D flavor only; CORRECTED: Piercing (not Slashing — PDF confirmed)
    range: melee
    uses: null    # FE tome — finite uses TBD (no infinite weapons)
    locked: true                    # personal weapon, cannot be traded
  - id: trident
    name: Trident
    fe_weapon_type: Axe             # FE: thrown axe = Hand Axe (Axe class, 1–2 range)
    damage_type: piercing           # D&D flavor only
    range: 2                        # thrown: 1–2 tiles (Hand Axe)
    uses: null    # FE tome — finite uses TBD (no infinite weapons)
    notes: "Hand-Axe analogue (1–2 range)."
  - id: vulnerary
    name: "Healing Potion"
    uses: 3
# -- Unique Abilities ------------------------------------------------------
# NONE. Braulo is a stock FE8 Pirate -- no per-character mechanics, even on promotion.
# Individuality comes from flavor text, portrait/sprite art, and palette -- not special
# skills (Nicolas's call, 2026-05-29: vanilla classes only, nothing extra: no timed
# buffs/debuffs, no special movement, no procs).

signature_moment:
  chapter: ch07-the-eastway-ambush
  description: >
    Turn 1 scripted event — Braulo bursts his shackles, starting the fight
    that gets the whole party captured. Triggers unique dialogue.
  dialogue_trigger: braulo_shackle_break

# ── Support Affinities ──────────────────────────────────────────────────────────
supports:
  - partner: wolfram
    affinity: fire
  - partner: marty
    affinity: wind
