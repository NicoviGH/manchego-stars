# pcs/prof-rbg.yaml — Prof. R.B. Geenius, Artificer (Artillerist)
# Source: data/pc-sheets/prof-r-b-geenius.json + References/PCs/RBG Character Sheet.pdf
# Class roster: docs/CLASSES.md (generated). Rationale: docs/decisions.md §Class Mapping & Promotions.

id: prof-rbg
name: "Prof. R.B. Geenius"
portrait_ref: portraits/prof-rbg.png     # GBA-ready sprite pending (issue #23)
portrait_source: data/portraits/prof-rbg.jpg
# Portrait source: https://www.dndbeyond.com/avatars/34221/708/1581111423-57759993.jpeg

# ── Custom Art Brief (decided 2026-06-01 portrait walkthrough) ───────────────────
# ALL parts custom indexed-palette art. Follow the concept ref faithfully.
art:
  render:                     # exact reproduction of the shipped bust (tools/ref_to_bust.py)
    ref: "References/PCs/RBG Landscape.png"
    crop: [14, 17, 2258, 1887]     # ref pixels, ~1.2 aspect
    downscale: smooth
    hand_pass: null
  approach: custom
  fidelity: faithful
  must_keep:                  # tells that make the bust read as "Geenius"
    - green ratfolk face — manic toothy grin, fangs, pink nose
    - purple top hat with gold buckle band
    - yellow longcoat collar + purple gold-buttoned waistcoat & gold cravat
    - big rat ears flanking the hat
  face: visible               # ref shows the face clearly; render the manic grin straight
  composition: face-forward   # NO gun in the bust — pistols/magitech ride on map+battle sprites
  expression: manic-grin      # wild-eyed mad-scientist glee (matches gunpoint signature beat)
  palette_plan: >             # rough 16-color budget (incl. index-0 transparent)
    greens ×3 (fur), purples ×3 (hat/vest), yellow ×2 (coat/collar), gold trim
    (shares yellow), pink (nose/mouth), white (fang/eye highlight), black outline.

# ── D&D 5e Source (reference only — does NOT drive FE mechanics) ────────────────
# FE stats come verbatim from the vanilla class below, not from D&D scores.
# Raw sheet: data/pc-sheets/prof-r-b-geenius.json  ·  Curated flavor: lore/prof-rbg.md
dnd:
  race: Underfolk
  class: "Artificer (Artillerist)"
  source: data/pc-sheets/prof-r-b-geenius.json
  lore: lore/prof-rbg.md

# ── FE Starting Stats (level 1) ────────────────────────────────────────────────
# Vanilla FE8 Archer stats, verbatim from data_classes.c [CLASS_ARCHER - 1]. No D&D-derived
# tuning. A real FE8 Archer is a physical Bow unit: single Pow stat (= STR), no MAG.
# RBG follows the vanilla Archer promotion line (-> Sniper). His "Artillerist" cannon fantasy is
# NOT a custom class — it is Pepperjack, a separately RECRUITABLE unit (flavor: RBG built it).
# LCK: ClassData has no base luck — set 0 until personal luck is assigned deliberately.
fe_stats:
  class: Archer              # FE base class
  level: 1
  HP: 18
  STR: 4                     # FE Pow (Archer basePow) — bows compute damage off Pow
  SKL: 3
  SPD: 3
  DEF: 3
  RES: 0
  LCK: 0                     # ClassData has no base luck
  MOV: 5                     # Archer baseMov
  CON: 7

# ── Promotion (FE8 branched — the PLAYER chooses at the Master Seal) ──────────────
promotion:
  branch: [Sniper, Ranger]   # vanilla Archer branch (classchg-data.c [CLASS_ARCHER])
  default: Sniper            # thematic lean; player may pick either.

# ── Growth Rates (% per level) — vanilla Archer growths from data_classes.c ──────
growth_rates:
  HP: 70
  STR: 35
  SKL: 40
  SPD: 32
  DEF: 15
  RES: 15
  LCK: 35

# ── Inventory (Chapter 1 starting equipment) ─────────────────────────────────
# MVP: stock FE weapons — stats inherited from the vanilla item in `fe_base` (no custom Might).
# RBG's personal-weapon flavor (Fonduedler) is parked in lore/prof-rbg.md as a POST-MVP item;
# his firearm/cannon look rides on the sprite art. Luck E. Cheese stays as a story-only Wish item.
inventory:
  - id: iron-bow
    name: "Iron Bow"
    fe_base: iron-bow         # vanilla FE8 stats (Mt/Hit/Crit/Wt/uses); no custom tuning
    fe_weapon_type: Bow       # FE Archer weapon class (baseRanks ITYPE_BOW)
    range: 2                  # FE bows are 2-range (no melee counter)
    damage_type: piercing     # cosmetic flavor label only
  - id: luck-e-cheese
    name: "Luck E. Cheese"
    flavor: "Luck Blade shortsword — a wedge-shaped blade humming with two charges of raw Wish."
    # FE-legal resolution: a vanilla Archer has no Sword rank and no melee weapon. This is NOT a
    # combat weapon — it is a STORY-ONLY item (the Wish). It is never wielded in battle, so there is
    # no FE weapon type. (Nicolas's call, 2026-05-28: the Wish is narrative payoff, not a tool.)
    is_combat_weapon: false   # story item only — RBG never attacks with it
    # The Wish fires once, as a scripted endgame beat: RBG spends a charge to turn PINKY (his
    # homunculus "son", the army's flier — see `recruits` block / npcs/pinky.yaml) into a living being.
    story_only:
      wish_charges: 2
      endgame_event: "RBG wishes Pinky into a living being (campaign finale)"
  # NOTE: the former "Shocking Grasp" lightning tome is removed — Archer/Sniper is a Bow-only line in
  # FE8 and has no tome rank. The cannon/lightning fantasy lives in Pepperjack (a recruitable unit).
  - id: vulnerary
    name: "Healing Potion"    # reflavored Vulnerary (consumable)
    fe_base: vulnerary
    uses: 2
# -- Unique Abilities ------------------------------------------------------
# NONE. Prof. R.B. Geenius is a stock FE8 Archer -- no per-character mechanics, even on promotion.
# Individuality comes from flavor text, portrait/sprite art, and palette -- not special
# skills (Nicolas's call, 2026-05-29: vanilla classes only, nothing extra: no timed
# buffs/debuffs, no special movement, no procs).

# ── Recruit Pointers ──────────────────────────────────────────────────────────
# RBG is the in-story builder/parent of three separate recruitable units. They are NOT his
# abilities, summons, or equipment — each joins the army as an ordinary FE8 recruit with its own
# unit file. Full mechanics live in npcs/; full flavor lives in lore/. Lean pointers only here.
recruits:
  - id: pepperjack
    unit: npcs/pepperjack.yaml
    recruited_via: "story — RBG builds Pepperjack"
  - id: brie
    unit: npcs/brie.yaml
    recruited_via: "story — RBG builds Brie (a later chapter)"
  - id: pinky
    unit: npcs/pinky.yaml        # RBG's homunculus 'son' — the army's flier (Pegasus Knight)
    recruited_via: "available from Chapter 1"
    # Scripted finale beat (not a gameplay mechanic): RBG spends a Wish charge from Luck E. Cheese
    # (see inventory `story_only`) to turn Pinky from a homunculus into a true living being.
    endgame_beat: "RBG wishes Pinky into a living being (campaign finale)"

# ── Signature Moment ─────────────────────────────────────────────────────────
signature_moment:
  chapter: ch03-the-termalaine-mine
  description: >
    Executed a kobold at gunpoint during the "good cop, bad cop" interrogation
    inside the Termalaine mine.
  dialogue_trigger: rbg_kobold_execution

# ── Support Affinities ────────────────────────────────────────────────────────
supports:
  - partner: wolfram
    affinity: fire
  - partner: meesmickle
    affinity: dark
