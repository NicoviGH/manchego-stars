# pcs/prof-rbg.yaml — Prof. R.B. Geenius, Artificer (Artillerist)
# Source: data/pc-sheets/prof-r-b-geenius.json + References/PCs/RBG Character Sheet.pdf
# See docs/class-mapping.md and docs/PRD.md §6.7 for class mapping rationale.

id: prof-rbg
name: "Prof. R.B. Geenius"
portrait_ref: portraits/prof-rbg.png     # GBA-ready sprite pending (issue #23)
portrait_source: data/portraits/prof-rbg.jpg
# Portrait source: https://www.dndbeyond.com/avatars/34221/708/1581111423-57759993.jpeg

# ── D&D 5e Identity ────────────────────────────────────────────────────────────
dnd:
  race: Underfolk            # homebrew Ratfolk
  class: Artificer
  subclass: Artillerist
  level_end_state: 20
  alignment: lawful_evil
  size: small                # 3 ft tall, 40 lbs, green fur
  background: "Criminal / Spy"
  personality: "Always uses cheese in his phrases — e.g. 'You have left me quite discheesed'"
  backstory: >
    Grew up as a slave in a wealthy aristocrat's mansion. Lived by thieving until his genius
    was recognized. Conned his patron into surrendering his entire fortune and status, then
    studied Artificery to enact evil while maintaining a spotless public record.
  ability_scores:
    STR: 8
    DEX: 19
    CON: 16
    INT: 20
    WIS: 10
    CHA: 12
  saving_throw_proficiencies: [CON, INT]
  languages: [Common, Undercommon]   # per PDF p1
  hp_max: 163
  ac: 16
  speed_ft: 35               # Underfolk base speed (35 ft, above standard 30 ft)
  racial_traits:
    # Underfolk (Ratfolk) — from PDF page 3
    nimble_escape: true      # can Disengage or Hide as a bonus action every turn
    claws: true              # proficient with claws (1d4-1 slashing unarmed strike)
    climber: true            # climbing does not halve speed
    darkvision: 60
    underfoot: true          # can move through spaces of larger creatures

# ── FE Starting Stats (level 1) ────────────────────────────────────────────────
# Vanilla FE8 Archer stats, verbatim from data_classes.c [CLASS_ARCHER - 1]. No D&D-derived
# tuning. A real FE8 Archer is a physical Bow unit: single Pow stat (= STR), no MAG.
# RBG follows the vanilla Archer promotion line (-> Sniper). His "Artillerist" cannon fantasy is
# NOT a custom class — it is Pepperjack, a separately RECRUITABLE unit (flavor: RBG built it).
# LCK: ClassData has no base luck — set 0 until personal luck is assigned deliberately.
fe_stats:
  class: Archer              # FE base class
  promoted_class: Sniper     # vanilla FE8 Archer promotion (data_classes.c [CLASS_ARCHER].promotion)
  level: 1
  HP: 18
  STR: 4                     # FE Pow (Archer basePow) — bows compute damage off Pow
  SKL: 3
  SPD: 3
  DEF: 3
  RES: 0
  LCK: 0                     # ClassData has no base luck
  MOV: 5                     # Archer baseMov
  CON: 7

# ── Growth Rates (% per level) — vanilla Archer growths from data_classes.c ──────
growth_rates:
  HP: 70
  STR: 35
  SKL: 40
  SPD: 32
  DEF: 15
  RES: 15
  LCK: 35

# ── Inventory (Chapter 1 starting equipment) ─────────────────────────────────
inventory:
  - id: fonduedler
    name: Fonduedler
    fe_weapon_type: Bow       # FE Archer weapon class (baseRanks ITYPE_BOW)
    damage_type: piercing     # D&D flavor only; ranged Artificer firearm/crossbow
    range: 2                  # FE bows are 2-range (no melee counter)
    uses: null    # FE tome — finite uses TBD (no infinite weapons)
    locked: true              # personal weapon
  - id: luck-e-cheese
    name: "Luck E. Cheese"
    flavor: "Luck Blade shortsword — a wedge-shaped blade humming with two charges of raw Wish."
    # FE-legal resolution: a vanilla Archer has no Sword rank and no melee weapon. This is NOT a
    # combat weapon — it is a STORY-ONLY item (the Wish). It is never wielded in battle, so there is
    # no FE weapon type. (Nicolas's call, 2026-05-28: the Wish is narrative payoff, not a tool.)
    is_combat_weapon: false   # story item only — RBG never attacks with it
    # The Wish fires once, as a scripted endgame beat: RBG spends a charge to turn PINKY (his
    # homunculus "son", the Pegasus Knight companion — see `companion` block) into a living being.
    story_only:
      wish_charges: 2
      endgame_event: "RBG wishes Pinky into a living being (campaign finale)"
  # NOTE: the former "Shocking Grasp" lightning tome is removed — Archer/Sniper is a Bow-only line in
  # FE8 and has no tome rank. The cannon/lightning fantasy lives in Pepperjack (a recruitable unit).
  - id: vulnerary
    name: "Healing Potion"
    uses: 2

# ── Unique Abilities ─────────────────────────────────────────────────────────
unique_abilities:
  # Pepperjack & Brie are NOT an RBG ability — they are separate RECRUITABLE units (flavor: RBG
  # built them). Mechanically they join the army like any FE8 recruit and are authored as their own
  # FE-legal units (their own class/stats/weapon) in npcs/ — NOT a summon, AoE turret, or custom kit.
  # The data below is flavor/recruitment metadata only; no combat mechanics live on RBG for them.
  - id: pepperjack
    name: "Pepperjack"
    type: recruitable_unit_ref
    unit_ref: pepperjack          # full FE-legal unit defined in npcs/ (post-MVP)
    recruited_via: "story — RBG builds Pepperjack"
    # Flavor: sentient automaton, chili-pepper mustache, red star, single fierce eye (grey chassis).
    # SPEECH: Pokemon-style — only says "Pepperjack!". RELATIONSHIP: dating Brie.
    canonical_name: Pepperjack
    speech_mode: pokemon_self_name
    paired_with: brie
    portrait_ref: data/portraits/pepperjack-and-brie.jpeg
    portrait_source_ref: "References/PCs/Pepperjack and Brie Portrait.jpeg"

  - id: brie
    name: "Brie"
    type: recruitable_unit_ref
    unit_ref: brie                # full FE-legal unit defined in npcs/ (post-MVP)
    recruited_via: "story — RBG builds Brie (a later chapter)"
    # Flavor: sentient automaton, pink chassis, cyan star, glamorous purple eye, ribbon-curled horn.
    # SPEECH: Pokemon-style — only says "Brie!". RELATIONSHIP: dating Pepperjack.
    canonical_name: Brie
    speech_mode: pokemon_self_name
    paired_with: pepperjack
    portrait_ref: data/portraits/pepperjack-and-brie.jpeg
    portrait_source_ref: "References/PCs/Pepperjack and Brie Portrait.jpeg"

  - id: flash-of-genius
    name: "Flash of Genius"
    # Reaction: when an ally within 2 tiles makes a save or check, add INT mod (+5)
    # to their roll. Can flip a failed save to a success.
    # FE implementation: reaction skill — adds +5 to adjacent ally's avoid or save.
    # 5 USES per chapter (confirmed from PDF — regain all on long rest).
    flavor: "RBG barks a mid-fight correction — 'No no no, hold it like THIS, you fool of brie!'"
    fe_mechanic: "auto-proc support: +INT to a nearby ally's avoid/save (can flip a failed save)"
    type: reaction
    unlock_chapter: 7         # Artificer L7 → Ch7 (MVP cap)
    uses_per_chapter: 5       # confirmed from PDF (not 1 — was wrong in first pass)
    range: 2
    bonus: 5                  # INT mod at level 1 equivalent; scales with level

  - id: arcane-firearm
    name: "Arcane Firearm"
    # CORRECTED 2026-05-27 per PDF p2: when casting an artificer spell through the
    # Fonduedler (the arcane firearm focus), roll 1d8 and add it to ONE damage roll
    # of that spell. Once per spell cast, not "once per turn".
    # FE implementation: passive — any artificer-tome attack rolls +1d8 bonus once per cast.
    type: passive
    unlock_chapter: 5         # Artillerist Arcane Firearm = Artificer L5 → Ch5 (MVP)
    effect: plus_1d8_per_spell_cast_via_firearm

  - id: infuse-item
    name: "Infuse Item"
    # Between-chapter: infuse up to 6 nonmagical objects simultaneously with magical properties.
    # Each infusion persists until end of next chapter (or RBG dies or exceeds 6 infusions).
    # FE implementation: Preparation screen — select up to 6 allied items to buff (+1 ATK or +1 AC).
    # This is persistent across the chapter, not a single-use per chapter.
    type: between_chapter
    unlock_chapter: 2         # Artificer L2 → Ch2 (MVP). Infusion count grows with level.
    simultaneous_infusions: 6
    effect: infuse_ally_gear

  - id: nimble-escape
    name: "Nimble Escape"
    # Underfolk racial: can Disengage or Hide as a bonus action on each turn.
    # In FE: after attacking or using an item, RBG may immediately reposition without
    #   provoking enemy reactions (models the Disengage bonus action).
    # FE implementation: passive — RBG can always move away from enemies after acting.
    type: passive
    unlock_chapter: 1         # racial — available from start
    effect: bonus_action_disengage_or_hide

  # ── Prepared Artillery Kit (PREPARED list from PDF = Artillerist "Always Prepared") ──
  # RBG's prepared spells are entirely his subclass's bonus list — a pure ARTILLERY BLASTER,
  # not a healer (corrects the earlier Cure Wounds guess). DUAL STRUCTURE: fe_mechanic =
  # vanilla FE8 anchor; flavor = RBG's mad-inventor gadget reskin. All cast through the
  # Fonduedler (his Arcane Firearm focus → +1d8, Ch5+). Gated by Artillerist grant level:
  #   Shield/Thunderwave (L3→Ch3), Scorching Ray/Shatter (L5→Ch5), Fireball/Wind Wall (L9→Ch9),
  #   Ice Storm/Wall of Fire (L13→Ch13), Cone of Cold/Wall of Force (L17→Ch17).
  # AoE NOTE: FE tomes are single-target; D&D AoE compromises to siege-range single-target.

  - id: shield-spell
    name: "Shield"
    flavor: "Reactive Plating — panels snap up off RBG's coat the instant something swings at him."
    fe_mechanic: "Barrier-style +AC reaction proc on self for one incoming attack"
    type: reaction
    spell_level: 1
    unlock_chapter: 3
    uses_per_chapter: 3
    ac_bonus: 5

  - id: thunderwave
    name: "Thunderwave"
    flavor: "Concussion Charge — a short, flat WHUMP of pressure that bowls foes back."
    fe_mechanic: "short-range thunder burst that damages + shoves adjacent enemies 1 tile"
    type: spell_tome
    spell_level: 1
    unlock_chapter: 3
    uses_per_chapter: 2
    damage_type: thunder
    save: CON
    range: 1
    effect: damage_and_push

  - id: scorching-ray
    name: "Scorching Ray"
    flavor: "Triple-Barrel Burn — three fat darts of fire spit out of the Fonduedler in sequence."
    fe_mechanic: "brave-weapon-style multi-bolt fire tome: 3 separate fire hits, each rolled"
    type: spell_tome
    spell_level: 2
    unlock_chapter: 5
    uses_per_chapter: 2
    damage_type: fire
    bolts: 3
    range: 4

  - id: shatter
    name: "Shatter"
    flavor: "Resonance Bomb — a marble-sized charge that detonates into a skull-rattling chord."
    fe_mechanic: "thunder siege tome (AoE compromised to siege-range single-target)"
    type: spell_tome
    spell_level: 2
    unlock_chapter: 5
    uses_per_chapter: 1
    damage_type: thunder
    save: CON
    range: 4

  - id: fireball
    name: "Fireball"
    flavor: "Big Boom™ (patent pending) — RBG's pride and joy. 'Say cheese.'"
    fe_mechanic: "Bolganone/fire siege tome (AoE compromised to siege-range single-target)"
    type: spell_tome
    spell_level: 3
    unlock_chapter: 9         # POST-MVP
    uses_per_chapter: 2
    damage_type: fire
    save: DEX
    range: 5

  - id: wind-wall
    name: "Wind Wall"
    flavor: "Turbine Fence — a roaring updraft that swats arrows and bolts out of the air."
    fe_mechanic: "places a temporary impassable line that also blocks ranged attacks"
    type: spell_tome
    spell_level: 3
    unlock_chapter: 9         # POST-MVP
    uses_per_chapter: 1
    effect: blocking_wall_line
    duration_turns: 3

  - id: ice-storm
    name: "Ice Storm"
    flavor: "Cryo Shells — a volley of supercooled rounds that burst into a hail of shrapnel-ice."
    fe_mechanic: "cold siege tome (AoE compromised to siege-range single-target)"
    type: spell_tome
    spell_level: 4
    unlock_chapter: 13        # POST-MVP
    uses_per_chapter: 1
    damage_type: [cold, bludgeoning]
    save: DEX
    range: 5

  - id: wall-of-fire
    name: "Wall of Fire"
    flavor: "Napalm Line — RBG lays down a strip of accelerant and lights it with a grin."
    fe_mechanic: "line of fire hazard tiles that chip anything ending its turn adjacent"
    type: spell_tome
    spell_level: 4
    unlock_chapter: 13        # POST-MVP
    uses_per_chapter: 1
    damage_type: fire
    effect: fire_hazard_wall
    duration_turns: 3

  - id: cone-of-cold
    name: "Cone of Cold"
    flavor: "Liquid-Nitrogen Sprayer — a wide-mouthed nozzle that flash-freezes a whole arc."
    fe_mechanic: "Fimbulvetr-tier cold siege tome (AoE compromised to siege-range single-target)"
    type: spell_tome
    spell_level: 5
    unlock_chapter: 17        # POST-MVP / endgame
    uses_per_chapter: 1
    damage_type: cold
    save: CON
    range: 4

  - id: wall-of-force
    name: "Wall of Force"
    flavor: "Forcefield Emitter — a humming pane of pure force; nothing gets through it."
    fe_mechanic: "places a fully impassable barrier (blocks movement AND attacks) for a few turns"
    type: spell_tome
    spell_level: 5
    unlock_chapter: 17        # POST-MVP / endgame
    uses_per_chapter: 1
    effect: impassable_force_barrier
    duration_turns: 3

# ── Companion ────────────────────────────────────────────────────────────────
companion:
  id: pinky
  description: >
    RBG's homunculus 'son' — available as a Pegasus Knight unit from Chapter 1.
    Pinky is a separate unit entry (see npcs/ when created).
  endgame_beat: >
    At the campaign's finale, RBG spends a Wish charge from Luck E. Cheese (see inventory
    `story_only`) to turn Pinky from a homunculus into a true living being. Scripted story
    event, not a gameplay mechanic.

# ── Signature Moment ─────────────────────────────────────────────────────────
signature_moment:
  chapter: ch03-the-termalaine-mine
  description: >
    Executed a kobold at gunpoint during the "good cop, bad cop" interrogation
    inside the Termalaine mine.
  dialogue_trigger: rbg_kobold_execution

# ── Support Affinities ────────────────────────────────────────────────────────
supports:
  - partner: wolfram
    affinity: fire
  - partner: meesmickle
    affinity: dark
