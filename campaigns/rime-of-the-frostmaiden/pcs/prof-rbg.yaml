# pcs/prof-rbg.yaml — Prof. R.B. Geenius, Artificer (Artillerist)
# Source: data/pc-sheets/prof-r-b-geenius.json + References/PCs/RBG Character Sheet.pdf
# See docs/class-mapping.md and docs/PRD.md §6.7 for class mapping rationale.

id: prof-rbg
name: "Prof. R.B. Geenius"
portrait_ref: portraits/prof-rbg.png     # GBA-ready sprite pending (issue #23)
portrait_source: data/portraits/prof-rbg.jpg
# Portrait source: https://www.dndbeyond.com/avatars/34221/708/1581111423-57759993.jpeg

# ── D&D 5e Identity ────────────────────────────────────────────────────────────
dnd:
  race: Underfolk            # homebrew Ratfolk
  class: Artificer
  subclass: Artillerist
  level_end_state: 20
  alignment: lawful_evil
  size: small                # 3 ft tall, 40 lbs, green fur
  background: "Criminal / Spy"
  personality: "Always uses cheese in his phrases — e.g. 'You have left me quite discheesed'"
  backstory: >
    Grew up as a slave in a wealthy aristocrat's mansion. Lived by thieving until his genius
    was recognized. Conned his patron into surrendering his entire fortune and status, then
    studied Artificery to enact evil while maintaining a spotless public record.
  ability_scores:
    STR: 8
    DEX: 19
    CON: 16
    INT: 20
    WIS: 10
    CHA: 12
  saving_throw_proficiencies: [CON, INT]
  languages: [Common, Undercommon]   # per PDF p1
  hp_max: 163
  ac: 16
  speed_ft: 35               # Underfolk base speed (35 ft, above standard 30 ft)
  racial_traits:
    # Underfolk (Ratfolk) — from PDF page 3
    nimble_escape: true      # can Disengage or Hide as a bonus action every turn
    claws: true              # proficient with claws (1d4-1 slashing unarmed strike)
    climber: true            # climbing does not halve speed
    darkvision: 60
    underfoot: true          # can move through spaces of larger creatures

# ── FE Starting Stats (Chapter 1 / level 1 equivalent) ─────────────────────────
# Adjust during Phase 1 playtesting.
fe_stats:
  class: Archer              # FE base class — custom Artillerist at promotion
  promoted_class: Artillerist  # custom class: deployable cannon, INT-based
  level: 1
  HP: 16
  STR: 2                     # weak melee
  MAG: 5                     # INT 20 → cannon and infusion damage
  SKL: 8                     # INT 20 → highest base SKL in party (accuracy is his identity)
  SPD: 5
  DEF: 3
  RES: 3
  LCK: 4
  MOV: 6                     # speed_ft: 35 → above standard (standard = 5, 35 ft = 6 tiles)
  CON: 7

# ── Growth Rates (% per level, FE standard) ──────────────────────────────────
growth_rates:
  HP: 50
  STR: 10
  MAG: 45
  SKL: 65                    # highest SKL growth in party — defining stat
  SPD: 40
  DEF: 25
  RES: 30
  LCK: 35

# ── Inventory (Chapter 1 starting equipment) ─────────────────────────────────
inventory:
  - id: fonduedler
    name: Fonduedler
    damage_type: piercing     # ranged weapon — custom Artificer firearm/crossbow
    weapon_dice: "1d10"
    ability_mod: DEX
    range: 3                  # range 30/90 ft → ~3 FE tiles
    uses: null
    locked: true              # personal weapon
  - id: luck-e-cheese
    name: "Luck E. Cheese"
    damage_type: piercing     # PDF confirms Piercing (not Slashing — corrected from JSON)
    weapon_dice: "1d6"
    ability_mod: DEX
    range: melee
    uses: null
    locked: true              # personal weapon; has 2 Wish spell charges (Phase 1)
    notes: "Luck Blade Shortsword reskin: 2 Wish charges (PDF spell page p8). Hold to invoke 9th-level Wish."
  - id: shocking-grasp
    name: "Shocking Grasp"
    # Artificer cantrip (PDF p1 weapons). 4d8 Lightning at level 20, +12 to hit (INT-based).
    # Touch range — RBG's melee/adjacency cantrip option. Negates target's reactions on hit.
    damage_type: lightning
    weapon_dice: "1d8"        # ch1; scales to 4d8 at level 20
    ability_mod: INT
    range: melee              # touch range
    uses: null                # cantrip — infinite uses
    notes: "Target with metal armor: advantage on attack. On hit: target loses reactions until end of next turn."
  - id: vulnerary
    name: "Healing Potion"
    uses: 2

# ── D&D-Derived Stat Overrides ───────────────────────────────────────────────
d20_fields:
  AC: 14                     # Chapter 1: medium armor (Enhanced Scale Mail end-state)
                             # End-state target: 16. Tune per chapter.
  ability_mod_atk: INT       # INT for cannon/spell attacks; DEX for Fonduedler physical
  prof_bonus: 2
  spell_slots: "2"           # 2×1st-level (Artificer half-caster, level 2)

# ── Unique Abilities ─────────────────────────────────────────────────────────
unique_abilities:
  - id: pepperjack
    name: "Pepperjack"
    # RBG's canonical first Eldritch Cannon — sentient automaton with a chili-pepper
    # mustache, red star, and fierce single eye (grey chassis).
    # Renamed from "Eldritch Cannon" → "Pepperjack" on 2026-05-27 to reflect canon.
    #
    # SPEECH: Pokemon-style — Pepperjack can only say his own name ("Pepperjack!").
    # All combat barks, deployment dialogue, and death lines render as variants of
    # "Pepperjack!" in the UI.
    #
    # RELATIONSHIP: Pepperjack is dating Brie (the second cannon). Adjacency dialogue
    # / support triggers between the two should reflect this.
    #
    # 1/chapter (or spend a 1st-level spell slot): deploy Pepperjack at an adjacent
    # empty tile. Pepperjack acts as an allied NPC unit with its own action.
    # Modes (Artificer Artillerist): Flamethrower (fire AoE), Force Ballista (1d8 force ranged 3),
    # Protector (defensive aura — half cover for allies within 2 tiles).
    # Stats at ch1: HP 20, DEF 8, RES 0, cannot move, auto-removed at chapter end.
    # End-state (Artificer 15+): paired with Brie for 2 simultaneous cannons, AC 18, 100 HP each.
    # Explosive Cannon: detonate for 3d8 force AoE (2-tile radius) as an action if within 4 tiles.
    type: activated
    uses_per_chapter: 1
    spawn_unit: pepperjack-cannon
    canonical_name: Pepperjack
    speech_mode: pokemon_self_name      # only says "Pepperjack!"
    paired_with: brie
    portrait_ref: data/portraits/pepperjack-and-brie.jpeg
    portrait_source_ref: "References/PCs/Pepperjack and Brie Portrait.jpeg"

  - id: brie
    name: "Brie"
    # RBG's second Eldritch Cannon, unlocked at a later chapter (TBD — likely Ch 4-5
    # when Artificer 9+ "Arcane Jolt" / second-cannon feature would trigger).
    # Sentient automaton: pink chassis, cyan star, glamorous purple eye with eyeshadow,
    # ribbon-curled horn. Pepperjack's girlfriend.
    #
    # SPEECH: Pokemon-style — Brie can only say her own name ("Brie!").
    #
    # RELATIONSHIP: dating Pepperjack. Cute adjacency dialogue between the two when both
    # are deployed (e.g., they say each other's names back and forth).
    #
    # Same mechanical kit as Pepperjack (Flamethrower / Force Ballista / Protector modes).
    # When both deployed: RBG fields TWO simultaneous cannons, fulfilling the Artificer
    # Artillerist endgame fantasy (level 15+ feature in 5e).
    type: activated
    uses_per_chapter: 1
    unlock_chapter: tbd                  # Nicolas to confirm; placeholder Ch 4
    requires_unlock: pepperjack-already-known
    spawn_unit: brie-cannon
    canonical_name: Brie
    speech_mode: pokemon_self_name      # only says "Brie!"
    paired_with: pepperjack
    portrait_ref: data/portraits/pepperjack-and-brie.jpeg
    portrait_source_ref: "References/PCs/Pepperjack and Brie Portrait.jpeg"

  - id: flash-of-genius
    name: "Flash of Genius"
    # Reaction: when an ally within 2 tiles makes a save or check, add INT mod (+5)
    # to their roll. Can flip a failed save to a success.
    # FE implementation: reaction skill — adds +5 to adjacent ally's avoid or save.
    # 5 USES per chapter (confirmed from PDF — regain all on long rest).
    type: reaction
    uses_per_chapter: 5       # confirmed from PDF (not 1 — was wrong in first pass)
    range: 2
    bonus: 5                  # INT mod at level 1 equivalent; scales with level

  - id: arcane-firearm
    name: "Arcane Firearm"
    # CORRECTED 2026-05-27 per PDF p2: when casting an artificer spell through the
    # Fonduedler (the arcane firearm focus), roll 1d8 and add it to ONE damage roll
    # of that spell. Once per spell cast, not "once per turn".
    # FE implementation: passive — any artificer-tome attack rolls +1d8 bonus once per cast.
    type: passive
    effect: plus_1d8_per_spell_cast_via_firearm

  - id: infuse-item
    name: "Infuse Item"
    # Between-chapter: infuse up to 6 nonmagical objects simultaneously with magical properties.
    # Each infusion persists until end of next chapter (or RBG dies or exceeds 6 infusions).
    # FE implementation: Preparation screen — select up to 6 allied items to buff (+1 ATK or +1 AC).
    # This is persistent across the chapter, not a single-use per chapter.
    type: between_chapter
    simultaneous_infusions: 6
    effect: infuse_ally_gear

  - id: nimble-escape
    name: "Nimble Escape"
    # Underfolk racial: can Disengage or Hide as a bonus action on each turn.
    # In FE: after attacking or using an item, RBG may immediately reposition without
    #   provoking enemy reactions (models the Disengage bonus action).
    # FE implementation: passive — RBG can always move away from enemies after acting.
    type: passive
    effect: bonus_action_disengage_or_hide

# ── Companion ────────────────────────────────────────────────────────────────
companion:
  id: pinky
  description: >
    RBG's homunculus 'son' — available as a Pegasus Knight unit from Chapter 1.
    Pinky is a separate unit entry (see npcs/ when created).

# ── Signature Moment ─────────────────────────────────────────────────────────
signature_moment:
  chapter: ch03-the-termalaine-mine
  description: >
    Executed a kobold at gunpoint during the "good cop, bad cop" interrogation
    inside the Termalaine mine.
  dialogue_trigger: rbg_kobold_execution

# ── Support Affinities ────────────────────────────────────────────────────────
supports:
  - partner: wolfram
    affinity: fire
  - partner: meesmickle
    affinity: dark
