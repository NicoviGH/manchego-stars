  deploy_slots:
    - [5, 2]
    - [7, 3]
    - [5, 1]
    - [4, 0]
    - [4, 2]
    - [3, 3]
    - [3, 1]
    - [6, 1]
    - [2, 2]
  note: >
    Pick Units fields 9 of the 10 available units; the chosen lord is force-deployed.
    Marty SHOULD be deployed because his Talk parleys the Mauthe Doog pack.

# ── Enemy Units — mirror of vanilla FE8 Ch4 "Ancient Horrors" ────────────────────
# REALIGNED 2026-07-21 to the twin, verified against fireemblem8u events_udefs.c
# (UnitDef_088B4A80 line + 088B4C24 Revenant pack + 088B4C88 Bonewalker pack): vanilla Ch4 =
#   Mogall×4 · Revenant×12 · Bonewalker×6 (MELEE, iron sword/lance) · Entombed×1  = 23.
# The prior roster had DRIFTED — it picked classes to match the D&D monsters (bonewalker-BOW
# "phantom wraiths", no Revenants at all) instead of Ch4's FE8 classes. Corrected: FE is the
# spine (decisions.md); we mirror the twin's classes/levels/weapons. The ONE deliberate
# divergence is narrative — 6 of the twin's melee Revenants become the convertible Mauthe Doog
# pack (the Marty parley). Levels/counts confirmed with `make difficulty CH=ch04`.
enemy_units:
  # ══ TURN-1 LINE (monsters only, 10) — the reveal opens on these ═══════════════
  # ── Mogalls ×4 (ranged magic) — clustered = the crossfire pocket (chapter's difficulty) ──
  - id: mogall
    name: "Mogall"
    fe_name: "Mogall"
    count: 4
    positions: [[11,6],[13,7],[12,8],[13,11]]
    class: mogall               # CLASS_MOGALL — floating eye; Evil Eye = ranged magic (hits RES)
    level: 1                    # vanilla Ch4 Mogalls: L1×3 + L2×1 → L1 representative
    autolevel: true
    inventory:
      - id: evil-eye
        fe_base: evil-eye
    damage_type: dark           # flavor label only
    ai_pattern: defensive
  # ── Revenants ×2 (melee zombies) — vanilla Ch4's core fodder; the tough end of the line ──
  - id: revenant
    name: "Revenant"
    fe_name: "Revenant"
    count: 2
    positions: [[9,9],[10,10]]
    class: revenant             # CLASS_REVENANT — the FE8 melee zombie (vanilla Ch4's staple)
    level: 3                    # the 2 highest-level line Revenants (twin has L1..3)
    autolevel: true
    inventory:
      - id: rotten-claw
        fe_base: rotten-claw    # ITEM_MONSTER_ROTTENCLW — vanilla Revenant claw
    damage_type: bludgeoning    # flavor label only
    ai_pattern: aggressive
  # ── Bonewalkers ×3 (MELEE, iron sword) — vanilla Ch4 Bonewalkers are melee, not bows ──
  - id: bonewalker
    name: "Bonewalker"
    fe_name: "Bonewalker"
    count: 3
    positions: [[1,14],[5,13],[8,14]]
    class: bonewalker           # CLASS_BONEWALKER — MELEE skeleton (iron sword/lance), per the twin
    level: 3                    # vanilla line Bonewalkers L2/3/3 → L3 representative
    autolevel: true
    inventory:
      - id: iron-sword
        fe_base: iron-sword     # ITEM_SWORD_IRON — vanilla Ch4 line Bonewalker weapon
    damage_type: slashing       # flavor label only
    ai_pattern: aggressive
  # ── Entombed ×1 (tanky melee brute) — vanilla Ch4 DOES field one Entombed (L1) ──
  - id: entoumbed
    name: "Entombed"
    fe_name: "Entombed"
    count: 1
    positions: [[13,13]]
    class: entoumbed            # CLASS_ENTOUMBED — armored zombie; tanky melee anchor (twin: 1× L1)
    level: 1                    # matches the twin's lone Entombed
    autolevel: true
    inventory:
      - id: fetid-claw
        fe_base: fetid-claw     # ITEM_MONSTER_FETIDCLW — vanilla Entombed claw
    damage_type: bludgeoning    # flavor label only
    ai_pattern: defensive
  # ══ TURN-2 REVEAL: the convertible wolf pack (6) ═════════════════════════════
  # Flow (Nicolas 2026-07-21): ch04 OPENS monsters-only (above); on turn 2 the pack bursts from the
  # NW fog beside the party — Lupin commands them (intelligence shown by ACTION), Marty reads it
  # cross-field and flags the parley. The reveal cutscene IS the teaching. These 6 are the fiction
  # swap for 6 of the twin's melee Revenants (same role: weak melee fodder), retimed to the reveal
  # and made convertible. NW spawn keeps Marty able to reach Lupin (the valve); parley-path
  # clear-load is verified against the twin via `make difficulty`.
  - id: mauthedoog
    name: "Mauthe Doog"
    fe_name: "Mauthe Doog"
    count: 6                    # canon pack (1d4+4); Marty's Talk flips the WHOLE pack (→ green Lycanrocs)
    positions: [[0,0],[2,0],[0,2],[2,1],[1,0],[0,1]]   # NW fog edge, beside the party's deploy flank
    class: mauthedoog           # CLASS_MAUTHEDOOG — the FE8 wolf/dog beast (Ravisin's awakened pack)
    level: 2
    autolevel: true
    arrives_turn: 2             # the reveal wave — monsters-only until the pack drops (turn 2)
    inventory:
      - id: beast-bite
        fe_base: rotten-claw    # modeled beast bite (same claw class as the Revenants they replace)
    damage_type: piercing       # flavor label only
    ai_pattern: aggressive
    convertible: true           # #171 — the pack parley (Marty). Convertible REINFORCEMENT: arrives
                                # turn 2 then recruited rather than ground down (the clear-load discount).
    parley:
      by: marty                 # Marty's Talk flips the whole pack to allied (green Lycanrocs)
      result: become_allied
      recruits_npc: lupin       # the bespectacled leader; joins the sled, deployable in ch05
  # ══ TURN-3 REINFORCEMENTS (7) — mirror the twin's two packs ══════════════════
  # ── Revenant pack ×4 (melee) — vanilla Ch4's area-triggered Revenant wave (one drops a Vulnerary) ──
  - id: revenant-reinf
    name: "Revenant"
    fe_name: "Revenant"
    count: 4
    positions: [[13,9],[14,8],[10,12],[11,14]]
    class: revenant
    level: 2                    # vanilla Revenant pack: all L2
    autolevel: true
    arrives_turn: 3
    inventory:
      - id: rotten-claw
        fe_base: rotten-claw
    item_drop: vulnerary        # the twin's dropping Revenant (ITEM_VULNERARY, last-slot drop)
    damage_type: bludgeoning
    ai_pattern: aggressive
  # ── Bonewalker pack ×3 (MELEE, iron lance) — vanilla Ch4's turn-2 Bonewalker pack ──
  - id: bonewalker-reinf
    name: "Bonewalker"
    fe_name: "Bonewalker"
    count: 3
    positions: [[14,6],[13,5],[14,11]]
    class: bonewalker
    level: 2                    # vanilla Bonewalker pack: L1/1/2 → L2 representative
    autolevel: true
    arrives_turn: 3
    inventory:
      - id: iron-lance
        fe_base: iron-lance     # ITEM_LANCE_IRON — vanilla Ch4 pack Bonewalker weapon
    damage_type: piercing
    ai_pattern: aggressive

