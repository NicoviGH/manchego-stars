# ── Narrative ──────────────────────────────────────────────────────────────────
narrative: >
  The party rolls west toward Targos in the Rolling Cheddar — their home on runners —
  and is ambushed on the open road by a raider band preying on Ten-Towns traffic. In Targos they find a frozen body
  — the town reads it as a sacrifice the frost druids demand to appease Auril, but
  Rootis recognizes the dagger-of-ice kill as Sephek Kaltro's, the ch00 killer who
  was meant to be dead. Rumor of the Maer Monster off Bremen surfaces at the inn;
  the druids' trail runs north, and the party follows it toward Lonelywood.

# ── Map ────────────────────────────────────────────────────────────────────────
map:
  file: maps/ch02-cold-welcome.mar     # hand-authored on the snow metatiles (ch01 flow)
  tileset: snowy-bern                  # shared winter tileset (#41)
  base_layout: Ch2Map                  # vanilla 15×15 "The Protected", winter-reskinned
  size: "15×15"                 # compact, mirrors FE8 Ch2 (coords top out ~14×14)
  description: >
    Compact snowy road into Targos. The party rolls in aboard the Rolling Cheddar (their
    home on runners, a narrative vehicle — not an on-map unit), and three green chwinga
    are caught on the road just ahead when the raid hits; the chardalyn band holds the far
    edges and converges on them. Tree lines and snowdrifts give terrain-avoid cover on the
    flanks. Reskin of FE8 Ch2: same choke points and spawn geography, arctic palette.
    Terrain types map 1:1 (FE forest → snowy pines, fort → ice cairn, village → Ten-Towns hut).

# ── Objective ──────────────────────────────────────────────────────────────────
# Mirrors FE8 Ch2 "The Protected": DefeatAll with a protect layer. FE8's "protect" is a
# SOFT fail — you lose the green ally/village if too slow, not a game over (Ross/Garcia
# are green allies you shield, not a hard escort). Ours: three GREEN chwinga (harmless
# snow-spirits, lightly armed) are the protected allies. The signature beat is PER-UNIT
# soft-fail: a chwinga that dies forfeits ITS OWN charm-gift only (a flag is set on its
# death and checked at chapter end), never a game over. Hard lose = party wiped (lord rule).
objective:
  type: defeat_all
  description: "Defeat the raider band; keep the chwinga alive to claim their charms"
  constraint:
    type: protect_green_allies
    units: [chwinga-mote, chwinga-rime, chwinga-glimmer]
    description: "Each chwinga that survives gifts a charm at chapter end (per-unit soft-fail)"
    fail_is_soft: true          # a fallen chwinga forfeits only its own gift, not the chapter

win_condition: all_enemies_defeated
lose_condition: all_player_units_defeated         # FE8 lord rule; chwinga loss is a per-unit soft penalty
soft_penalty_on_chwinga_loss:
  description: "Each chwinga that dies forfeits its own charm-gift; surviving chwinga still gift theirs."

# ── Difficulty ─────────────────────────────────────────────────────────────────
difficulty_note: >
  Teaches protect-the-vulnerable: three green chwinga sit where the raid converges, so
  the party must hold a perimeter around them rather than rush forward. The chwinga ride
  the Pegasus chassis (verified balance match to vanilla's Ross+Garcia green help), and
  the single enemy ARCHER hard-counters fliers (iron bow vs three pegasi) — that bow IS
  the protect tension. All-physical roster (axe + one bow) keeps the weapon triangle
  readable — no enemy magic yet (FE8 fields no enemy casters until ~Ch5–6; our first is
  the Ch4 frost druid). Comfortable vanilla-FE hit rates (~75%). One reinforcement pair
  enters turn 3 from the edge OPPOSITE the boss to flank a party that has pushed forward
  (FE8's pattern). Parity bar: vanilla enemies + 3 green chwinga ≈ vanilla Ch2 (5 raiders
  + green Ross/Garcia) — the chwinga are the swing factor, not enemy-level inflation.

# ── Deployment ──────────────────────────────────────────────────────────────────
# Field parity (decisions.md §"Field parity", 2026-06-10): deploy_limit = vanilla Ch2's
# player deploy-slot count = 5 (Eirika/Seth/Franz/Gilliam/Moulder). Our 8-strong cast does
# NOT widen the field — the prep screen (Pick Units) chooses which 5 take it; the chosen
# lord (#42) is force-deployed. This models our difficulty to vanilla's despite the bigger cast.
deployment:
  deploy_limit: 5
  # [col, row] — the NW entry corner, ringing the parked sled. FIRST PASS (parity intent
  # only): vanilla Ch2's ally tiles land on walls/peaks in Nicolas's hand-retiled paint, so
  # these are authored against THIS map's actual walkable tiles (plains/forest), not vanilla
  # coords. The party rolls in NW; the raid converges from the E/SE. Nicolas to adjust on the paint.
  deploy_slots:
    - [0, 3]
    - [0, 4]
    - [0, 5]
    - [1, 5]
    - [2, 4]
  note: "Pick Units fields 5 of {7 PCs + Baxby} (vanilla Ch2 fields 5). The party rolls in NW; 3 green chwinga sit just ahead, in the raid's path."
  # ── Protected: 3 GREEN chwinga (replaces the dropped sled) ──────────────────────
  # Harmless gift-spirits (book: "Starting Quest: Nature Spirits", p25–26) on the
  # Pegasus chassis (CLASS_PEGASUS_KNIGHT 0x48) — the verified balance match to vanilla's
  # green Ross+Garcia (3 pegs ≈ 9–11 output vs 12; Mage over-shoots Res≈0 brigands,
  # Myrmidon wildly over). Armed light (Slim Lance) so they defend themselves like the
  # vanilla greens, who aren't defenseless. Cautious green AI (defend, don't suicide).
  # They sit just ahead of the NW deploy ring, in the raid's converging path → the party
  # must shield them. Repurposes vanilla Ch3's Colm GREEN table (UnitDef_088B4718).
  green_allies:
    - id: chwinga-mote
      name: "Snow Mote"
      fe_name: "Mote"             # ≤12 — name buffer safety
      class: pegasus_knight
      level: 1
      position: [3, 4]
      inventory: [slim-lance]
      ai_pattern: cautious        # defend, don't charge into the raid
      gift: hand-axe              # DEVIATION (ch02↔ch03 swap, ADR in decisions.md): vanilla Ch2's Red Gem
                                  # moves to ch03's gem-mine chest; this slot takes ch03's Hand Axe instead.
                                  # Net wealth + item set across ch02+ch03 = vanilla. (Useful to Braulo; a
                                  # chwinga scavenging a discarded hatchet in Icewind Dale reads fine.)
    - id: chwinga-rime
      name: "Rime Spark"
      fe_name: "Rime"
      class: pegasus_knight
      level: 1
      position: [3, 5]
      inventory: [slim-lance]
      ai_pattern: cautious
      gift: elixir                # ITEM_ELIXIR 0x6D
    - id: chwinga-glimmer
      name: "Glimmerfrost"
      fe_name: "Glimmer"
      class: pegasus_knight
      level: 1
      position: [2, 6]
      inventory: [slim-lance]
      ai_pattern: cautious
      gift: pure-water            # ITEM_PUREWATER 0x6E

