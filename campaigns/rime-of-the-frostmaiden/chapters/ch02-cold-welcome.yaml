      three-hander: Vellynne / RBG / Braulo, with a Meesmickle button. Voice grounding:
      lore/vellynne-harpell.md (register B — icy-formal, no contractions) +
      lore/frostmaiden-voices.md; FE8 cadence per fireemblem8u/texts/texts.txt.
      LOCKED dialogue-pass text below (co-written with Nicolas 2026-06-19). PENDING (not
      this commit): ch02 host wiring + the eventscript that consumes this script, Vellynne's
      cutscene portrait (#19), and the in-game motion review.
