# ── Post-Chapter ─────────────────────────────────────────────────────────────────
post_chapter:
  gold_reward: 250                 # forfeited if the sled was destroyed
  available_shops: [targos]
  units_available_to_recruit: []   # Baxby is ch01; no new recruit here
  unlocks_chapter: ch03-the-termalaine-mine

# ── Design Notes ─────────────────────────────────────────────────────────────────
design_notes: >
  FE8 base: "The Protected" (DefeatAll + defend-in-place). The frost druid is a
  cutscene seed only — FE8 withholds enemy casters until mid-game, and our first
  enemy caster is the Ch4 frost-druid boss; introducing one here would break the
  early physical-triangle teaching ramp. Wolfram's metal-craft is his secondary
  signature beat: the ch01 ending already armored the Rolling Cheddar (his forge-night),
  so the Ch2 inn payoff is him re-plating the raid's battle-damage — and it plays only
  if the sled survived. Losing the sled forfeits the chest + reward: that is the
  chapter's "protect" stake.
  Snow wolves and road bandits are the same axe-brigand chassis so balance is
  identical; the variety is sprite + flavor, with the single bow-user adding a ranged
  threat exactly as FE8 Ch2 does.
