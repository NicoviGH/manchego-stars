# ── Design Notes ─────────────────────────────────────────────────────────────────
design_notes: >
  FE8 base: "The Protected" (DefeatAll + protect-the-green-ally). No enemy caster on the
  field — FE8 withholds casters until mid-game and our first is the ch05 frost-druid boss
  (Ravisin); an early one would break the physical-triangle teaching ramp. The protect
  layer is three GREEN chwinga (snow-spirits) on the Pegasus chassis — the verified balance
  match to vanilla's green Ross+Garcia — with the chapter's SIGNATURE beat being per-unit
  soft-fail: a chwinga that dies forfeits only its own charm-gift (Red Gem / Elixir / Pure
  Water, vanilla Ch2's three village gifts 1:1), never a game over. The single enemy archer
  hard-counters the fliers, so the bow IS the protect tension. The ending's frozen body is a
  *story* seed only (no combat here): the town blames the druids' sacrifice rumor, while Rootis
  clocks it as Sephek's dagger-of-ice kill — a breadcrumb for his Act-II reckoning, distinct
  from Ravisin (see docs/decisions.md §Story → Sephek arc). The chardalyn berserkers are
  Auril-maddened humans — real axes/bow, zero reskin stretch, so balance is exactly vanilla
  Ch2's; the variety is sprite + flavor, with the single bow-user adding a ranged threat
  exactly as FE8 Ch2 does.
