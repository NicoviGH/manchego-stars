# chapters/ch02-cold-welcome.yaml
# Chapter index: docs/CHAPTERS.md (generated from this file). Rationale: docs/decisions.md.
# Combat is vanilla FE (see docs/decisions.md §Combat). damage_type labels are cosmetic.

id: ch02-cold-welcome
title: "Cold Welcome"
chapter_number: 2
milestone: M3
cadence: breather_defend          # see docs/CHAPTERS.md — 🟦

# Tactical base map this chapter reskins. We keep FE8's tuned layout (spawn edges,
# choke points, terrain bonuses) and repaint it to the arctic/Icewind Dale theme.
fe8_base_map: "FE8 Ch2 — The Protected"   # DefeatAll + defend-in-place; src/events/ch2-eventinfo.h
parity_reference: "FE8 Ch2"   # #48 enemy-pressure parity bar — The Protected — defend-in-place breather

# ── Narrative ──────────────────────────────────────────────────────────────────
narrative: >
  The party escorts the sled west toward Targos and is ambushed on the open road
  by a raider band preying on Ten-Towns traffic. In Targos they find a frozen body
  — a human sacrifice to Auril — and glimpse a frost druid slipping through the
  crowd, spreading word that Ten-Towners must appease the Frostmaiden. Rumor of the
  Maer Monster off Bremen surfaces at the inn.

# ── Map ────────────────────────────────────────────────────────────────────────
map:
  file: maps/ch02-cold-welcome.tmx
  tileset: snow-road
  size: "15×15"                 # compact, mirrors FE8 Ch2 (coords top out ~14×14)
  description: >
    Compact snowy road into Targos. Party enters from one corner with the parked
    Rolling Cheddar sled; the raider band holds the far edges and converges. Tree
    lines and snowdrifts give terrain-avoid cover on the flanks. Reskin of FE8 Ch2:
    same choke points and spawn geography, arctic palette. Terrain types map 1:1
    (FE forest → snowy pines, fort → ice cairn, village → Ten-Towns hut).

# ── Objective ──────────────────────────────────────────────────────────────────
# Mirrors FE8 Ch2 "The Protected": DefeatAll with a defend-in-place layer. FE8's
# "protect" is a SOFT fail (you lose the recruit/village if too slow, not a game
# over). Ours: lose the sled and you forfeit the convoy supplies + reward, but the
# chapter is not lost. Hard lose = party wiped (lord rule).
objective:
  type: defeat_all
  description: "Defeat the entire raider band"
  constraint:
    type: defend_in_place
    unit: rolling-cheddar
    description: "Keep the parked Rolling Cheddar sled alive through the raid"
    fail_is_soft: true          # losing the sled forfeits the reward, not the chapter

win_condition: all_enemies_defeated
lose_condition: all_player_units_defeated         # FE8 lord rule; sled loss is a soft penalty
soft_penalty_on_sled_loss:
  description: "Forfeit the chapter chest + the post-chapter gold reward."

# ── Difficulty ─────────────────────────────────────────────────────────────────
difficulty_note: >
  Teaches defend-in-place: the sled is a stationary objective the raid converges on,
  so the party must hold a perimeter rather than rush forward. All-physical roster
  (axe + one bow) keeps the weapon triangle readable — no enemy magic yet (FE8 fields
  no enemy casters until ~Ch5–6; our first enemy caster is the Ch4 frost druid).
  Comfortable vanilla-FE hit rates (~75%). One reinforcement pair enters turn 3 from
  the edge OPPOSITE the boss to flank a party that has pushed forward (FE8's pattern).

# ── Deployment ──────────────────────────────────────────────────────────────────
deployment:
  note: "All 7 PCs + Baxby (if purchased in ch01) + the Rolling Cheddar sled. Positions set in Tiled."
  defend_unit:
    id: rolling-cheddar
    type: sled
    behavior: stationary        # parked; the raid comes to it (FE8 defend-in-place)
    must_survive: soft          # destruction = soft penalty, not game over

# ── Enemy Units (vanilla FE) ─────────────────────────────────────────────────────
# Mirrors FE8 Ch2 structure: ~6 trash + 1 named miniboss + 1 boss + 2 turn-3
# reinforcements. Almost mono-chassis (axe-brigand) plus a single ranged unit, all
# Iron-tier except the boss's Steel weapon — exactly how FE8 keeps a breather clean.
# Wolves and bandits are the SAME chassis under the hood (axe-brigand); only the
# sprite + flavor differ. The weapon-triangle arrow shows because the weapon TYPE
# is axe (src/bmbattle.c sWeaponTriangleRules) — claws are flavor, not a monster weapon.
enemy_units:
  - id: snow-wolf
    name: "Snow Wolf"
    count: 3
    fe_mechanic: axe-brigand    # Brigand class, axe-type weapon → in the weapon triangle
    flavor: "rends with frost-rimed claws"
    class: brigand
    level: 3
    weapon: iron-axe            # mechanically an axe; reskinned as claws in animation
    damage_type: slashing       # cosmetic label only
    ai_pattern: aggressive
  - id: road-bandit
    name: "Road Bandit"
    count: 2
    fe_mechanic: axe-brigand
    flavor: "Ten-Towns road raider"
    class: brigand
    level: 3
    weapon: iron-axe
    damage_type: slashing
    ai_pattern: aggressive
    item_drop: vulnerary        # one dropper, mirrors FE8's Ch2 vulnerary drop
  - id: frost-hunter
    name: "Frost Hunter"
    count: 1
    fe_mechanic: archer         # single ranged unit for variety, as FE8 Ch2 does
    flavor: "looses ice-fletched arrows from the drifts"
    class: archer
    level: 2
    weapon: iron-bow
    damage_type: piercing
    ai_pattern: aggressive
  - id: raider-bruiser
    name: "Grukk the Bruiser"
    is_miniboss: true
    count: 1
    fe_mechanic: axe-brigand    # named mid-tier, guards near the boss (FE8 "Bone")
    flavor: "the captain's right hand"
    class: brigand
    level: 4
    weapon: iron-axe
    damage_type: slashing
    ai_pattern: hold_position
  - id: raider-captain
    name: "Halvar the Raider Captain"
    is_boss: true
    count: 1
    fe_mechanic: steel-axe-brigand   # the one real threat = FE8's Steel-Axe Bazba mirror
    flavor: "leads the band that's been bleeding the Targos road"
    class: brigand
    level: 5
    weapon: steel-axe
    damage_type: slashing
    ai_pattern: hold_position        # stationary guard, not a fleeing caster
    death_quote: "Should've… paid the toll…"

reinforcements:
  - id: rear-wolves
    name: "Snow Wolf"
    count: 2
    fe_mechanic: axe-brigand
    class: brigand
    level: 3
    weapon: iron-axe
    damage_type: slashing
    trigger_turn: 3
    spawn_edge: opposite_boss        # flanks a party pushed toward the boss (FE8 pattern)
    ai_pattern: aggressive

# ── Chests / Village ─────────────────────────────────────────────────────────────
chests:
  - position: tbd
    contents:
      - id: vulnerary
        count: 1
      - id: gold
        amount: 120

