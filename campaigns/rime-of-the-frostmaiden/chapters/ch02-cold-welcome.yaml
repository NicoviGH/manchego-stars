  - concept: fliers-vs-bows      # bows are effective vs fliers — DEBUT (player flier Pinky + the green chwinga)
    coverage: dialogue           # C-hybrid: in-voice threat call-out (RBG→Pinky, turn 1), not a vanilla tutorial box
