# chapters/ch04-the-elven-tomb.yaml
# See docs/PRD.md §7 and docs/chapter-outline.md for the narrative + cadence.
# Combat is vanilla FE (see docs/decisions.md §Combat). damage_type labels are cosmetic.

id: ch04-the-elven-tomb
title: "The Elven Tomb"
chapter_number: 4
milestone: M3
cadence: first_boss             # docs/chapter-outline.md — 🟥
fe8_base_map: "FE8 Ch4 — Ancient Horrors"           # DefeatAll, monster/boss-debut base

# ── Narrative ──────────────────────────────────────────────────────────────────
narrative: >
  Through Lonelywood the party tracks a white moose terrorizing the loggers into
  the forest, where they meet a pack of hungry direwolves led by a bespectacled,
  speaking wolf. Marty reasons with them — a steady diet of raw meat in exchange
  for help. Reined in, the party reaches an elven tomb. A frost druid fights to
  the death for Auril. The party finds Basil (a sentient goodberry shrub), solves
  a moonlight puzzle, and awakens a friendly mummy.

# ── Map ────────────────────────────────────────────────────────────────────────
map:
  file: maps/ch04-elven-tomb.tmx
  tileset: forest-to-tomb       # forest path → temple interior; FEUniverse temple tileset
  size: "26×20"
  description: >
    Forest path (direwolf encounter) leading into the tomb interior with a boss
    arena. Glowing moonlight tiles for the mid-map puzzle.

# ── Objective ──────────────────────────────────────────────────────────────────
objective:
  type: defeat_all                       # mirrors FE8 Ch4 "Ancient Horrors" = DefeatAll (monster debut)
  description: "Clear the tomb — the frost druid is the last and toughest to fall"
  secondary:
    - type: puzzle
      description: "Moonlight puzzle: move 3 units onto the glowing tiles simultaneously to open the sarcophagus chamber"

win_condition: all_enemies_defeated
lose_condition: all_player_units_defeated

difficulty_note: >
  First real boss fight. The frost druid hits hard with magic (vanilla FE MAG vs
  RES) and has nature-themed minions. The moonlight puzzle tests positioning, not
  combat — a mid-map breather inside the boss map.

# ── Deployment ──────────────────────────────────────────────────────────────────
deployment:
  note: "All 7 PCs + Baxby + Trex. Positions set in Tiled."

# ── Enemy Units (vanilla FE) ─────────────────────────────────────────────────────
enemy_units:
  - id: vine-blight
    name: "Vine Blight"
    count: 4
    class: custom-blight
    level: 5
    damage_type: bludgeoning    # flavor label only
    ai_pattern: defensive
  - id: tomb-wolf
    name: "Feral Wolf"
    count: 3
    class: wolf
    level: 5
    damage_type: piercing
    ai_pattern: aggressive
  - id: frost-druid
    name: "Frost Druid"
    is_boss: true
    count: 1
    class: druid
    level: 7
    weapon: elwind-tome         # nature magic flavor
    damage_type: cold           # flavor label only
    ai_pattern: hold_position
    death_quote: "Auril… I gave you everything…"
    drops:
      - id: crest-of-cold-iron  # FORESHADOW: locked promotion relic (see chapter-outline.md seam)
        is_key_item: true
        locked: true            # unusable in MVP; pays off at the Ch7→8 promotion seam

# ── Villages ─────────────────────────────────────────────────────────────────────
villages:
  - id: lonelywood
    visit_reward:
      - id: gold
        amount: 150
    note: "The hard-of-hearing old Speaker shelters the party overnight (pre-map cutscene)."

# ── Events (pacing / cutscene placement) ─────────────────────────────────────────
events:
  - trigger: chapter_start
    type: cutscene
    ea_file: events/ch04-lonelywood.ea
    description: "Lonelywood inn stay; the white-moose problem; into the forest."
  - trigger: unit_reaches_zone
    zone: forest_clearing
    type: dialogue
    ea_file: events/ch04-direwolf-parley.ea
    description: >
      Marty parleys with the bespectacled direwolf leader (marty_direwolf_parley —
      his SECONDARY signature beat; primary is the Ch5 Messie Talk). Pack agrees
      after conferring; party reins them.
  - trigger: midmap
    type: puzzle_event
    ea_file: events/ch04-moonlight-puzzle.ea
    description: "Move 3 units onto glowing tiles simultaneously → sarcophagus chamber opens."
  - trigger: chapter_end
    type: cutscene
    ea_file: events/ch04-ending.ea
    description: "Frost druid falls; Basil found and named; the Mummy awakens and joins, asking to learn about modern druids."

# ── Post-Chapter ─────────────────────────────────────────────────────────────────
post_chapter:
  gold_reward: 350
  available_shops: [lonelywood]
  units_available_to_recruit:
    - id: basil
      description: "Basil, the sentient goodberry shrub (support/healing utility)"
    - id: the-mummy
      description: "The reawakened mummy ally"
  unlocks_chapter: ch05-the-maer-monster

design_notes: >
  First boss + first puzzle. The frost druid drops the LOCKED 'crest of cold iron'
  — the promotion Chekhov's gun foreshadowed for the Ch7→8 seam (docs/chapter-
  outline.md). Two recruits post-map (Basil + Mummy). Marty's direwolf parley is
  his secondary beat, setting up the Ch5 Messie Talk payoff.
