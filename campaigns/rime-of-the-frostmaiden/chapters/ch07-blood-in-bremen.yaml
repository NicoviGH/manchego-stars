# chapters/ch07-blood-in-bremen.yaml
# Chapter index: docs/CHAPTERS.md (generated from this file). Rationale: docs/decisions.md.
# Combat is vanilla FE (see docs/decisions.md §Combat). damage_type labels are cosmetic.

id: ch07-blood-in-bremen
title: "Blood in Bremen"
chapter_number: 7
milestone: M3
cadence: big_battle_gray        # see docs/CHAPTERS.md — 🟥 (morally gray)
fe8_base_map: "FE8 Ch6 — Victims of War"            # DefeatBoss base
parity_reference: "FE8 Ch6"   # #48 enemy-pressure parity bar — Victims of War — DefeatBoss

# ── Narrative ──────────────────────────────────────────────────────────────────
narrative: >
  The party reports to Speaker Dorbulgruf Shalescar — an old shield-dwarf whose
  failing memory has curdled into paranoid greed. He refuses to pay, snarling that
  nothing was ever promised (he may not even remember), and all but accuses the
  party of trying to fleece a confused old man. Tensions boil over and Braulo swings
  first. Mid-fight, Wolfram bites a chunk clean out of the Speaker's steel axe in
  open defiance — and the old dwarf, formidable despite his years, keeps swinging the
  ruined haft. After a bloody battle through the Town Hall, the party installs Messie
  as the new Speaker of Bremen and leaves town in a trail of blood to mixed reception.

# ── Map ────────────────────────────────────────────────────────────────────────
map:
  file: maps/ch07-blood-in-bremen.tmx
  tileset: town-interior        # Speaker's hall + streets
  size: "22×18"
  description: >
    Bremen's Town Hall and the surrounding Five-Tavern Center — five taverns in a
    semicircle around a central yard (book layout, Bremen p.27). The party fights up
    through the tavern yard to the Town Hall dais where Dorbulgruf holds court.
    Civilian NPC units mill in the streets and hall; guards defend the dais. Tavern
    doorways, fences, and furniture as cover.

# ── Objective ──────────────────────────────────────────────────────────────────
objective:
  type: defeat_boss                      # mirrors FE8 Ch6 "Victims of War" = DefeatBoss
  description: "Defeat Dorbulgruf (his guards needn't all fall)"
  constraint:
    type: protect_civilians
    description: "Civilians are 'don't-kill' NPC units — killing them incurs a penalty (gold/reputation)"

win_condition: boss_defeated
lose_condition: all_player_units_defeated

difficulty_note: >
  Morally gray chapter — the party is the aggressor. The civilian no-kill
  constraint adds spatial care to an otherwise straightforward fight. Dorbulgruf
  is a sturdy Warrior-class boss but not a puzzle. Dialogue should sit in the
  ambiguity, not celebrate.

# ── Deployment ──────────────────────────────────────────────────────────────────
deployment:
  note: "Deployable pool: 7 PCs + Pinky + Baxby (Cav) + Trex (Thief) + Lupin (beast-Cav) + Sahnar (Myr) + Basil (Priest), capped by deploy_limit (TBD). Only the pack direwolves stay non-combat dressing. Positions set in Tiled."

# ── Enemy Units (vanilla FE) ─────────────────────────────────────────────────────
# Grounding: Bremen "can muster up to 25 soldiers (tribal warrior stat block) and 2
# veterans" (book, Bremen p.27). FE-scaled: the 6 guards are that militia; the 2 Hall
# Knights are the book's 2 veterans.
enemy_units:
  - id: bremen-guard
    name: "Bremen Guard"        # the town militia (book: tribal warriors, FE-scaled from 25)
    count: 6
    class: soldier
    level: 7
    weapon: iron-lance
    damage_type: piercing       # flavor label only
    ai_pattern: defensive
  - id: bremen-knight
    name: "Hall Knight"         # the book's 2 Bremen veterans — the real threat besides the boss
    count: 2
    class: armor-knight         # CLASS_ARMOR_KNIGHT (no plain CLASS_KNIGHT in FE8)
    level: 8
    weapon: steel-lance
    damage_type: piercing
    ai_pattern: hold_position
  - id: dorbulgruf
    name: "Dorbulgruf Shalescar"
    is_boss: true
    count: 1
    class: warrior              # a non-combatant commoner in the book, but his old strength
    level: 9                    # outlasted his mind — still a formidable axe-Warrior boss.
    weapon: steel-axe
    damage_type: slashing
    ai_pattern: hold_position
    death_quote: "The coin's mine… I never… who are you people…?"   # greed dissolving into confusion

# ── Civilian NPCs (don't-kill) ────────────────────────────────────────────────────
npc_units:
  - id: bremen-civilian
    count: 4
    behavior: flee_from_combat
    must_not_be_killed: true
    penalty_if_killed: { gold: -100, reputation: -1 }

# ── Events (pacing / cutscene placement) ─────────────────────────────────────────
events:
  - trigger: chapter_start
    type: cutscene
    ea_file: events/ch07-opening.ea
    description: >
      Dorbulgruf refuses payment — paranoid, half-remembering, accusing the party of
      swindling him. Tensions rise. Braulo swings first (braulo_first_swing) — combat
      begins. Branches on the ch06 messie_spared flag.
  - trigger: unit_engages_boss
    unit: wolfram
    target: dorbulgruf
    type: battle_quote
    ea_file: events/ch07-wolfram-axe-bite.ea
    description: >
      Wolfram's secondary signature beat: when he engages Dorbulgruf, he bites a chunk
      out of the Speaker's steel axe in defiance (he eats ore and metal — see his Ch3
      primary). Defiant flavor; the formidable old dwarf keeps swinging the ruined haft.
  - trigger: chapter_end
    type: cutscene
    ea_file: events/ch07-ending.ea
    description: >
      If messie_spared: Messie installed as Speaker; uneasy but hopeful town.
      If Messie was slain in ch06: a colder installation scene / different
      Speaker outcome. Either way the party leaves in a trail of blood, mixed
      reception. Foreshadow: a town crier mentions Easthaven heard of Bremen.

# ── Post-Chapter ─────────────────────────────────────────────────────────────────
post_chapter:
  gold_reward: 450
  available_shops: [bremen]
  units_available_to_recruit: []
  unlocks_chapter: ch08-the-eastway-ambush

# ── Signature Moment anchored here ───────────────────────────────────────────────
signature_moments:
  - pc: wolfram
    trigger: wolfram_axe_bite       # SECONDARY — see pcs/wolfram.yaml (primary = ch03 ore-snacking)

design_notes: >
  The party's darkest MVP choice. Lean dialogue into ambiguity: Dorbulgruf is a
  genuinely greedy old miser AND a sick old man whose dementia has sharpened the
  bitterness — the party isn't wrong that he's stiffing them, but they still cut down
  a confused, dying elder. Don't resolve which he is. Civilian no-kill constraint is
  the design hook. Ending branches on messie_spared. The town crier's Easthaven line
  seeds the ch08 ambush (word of Bremen traveled).
