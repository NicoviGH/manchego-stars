      road-north stage direction tees ch04's druid thread without a line. Voice:
      lore/{prof-rbg,trex,meesmickle}.md. LOCKED 2026-06-26 (dialogue-pass, co-written
      with Nicolas). BG DECIDED 2026-07-04 (Nicolas): REUSE bg_TargosWinter (same slot
      as the opening; the two mid-map beats play ON-MAP, no BG). PENDING: eventscript +
      Masthew generic mug + motion review.
    script:                     # LOCKED 2026-06-26 (dialogue pass, co-written with Nicolas)
      - location_card: "Termalaine"
      # ── A: bounty + gems (RBG's avarice payoff from the ch02 seed) ──
      # (Termalaine square, the mine cleared. Speaker Masthew counts the bounty into RBG's glove;
      #  Wolfram's pack clinks with raw tourmaline. Masthew = Oarus Masthew, book p.93 town speaker → generic mug.)
      - prof-rbg: "Always a pleasure to serve. ...The gems, we'll call a gratuity."
      - beat_break: B
      # ── B: the grell's death opens the town to the kobolds → frees Trex to leave ──
      # (Across the square, Trex stands with his kobolds before the wary townsfolk — the grell's
      #  carcass behind him making his case. He negotiates them in; the dead monster is his leverage.)
      - trex: >-
          Not us. That was your monster — we only hid from it, same as you. Let us work the
          mine. You've seen what's worse.
      # (The deal struck, his kobolds filing in. Trex turns to the party instead of following —
      #  his people finally safe without him, the bookish striver free for the first time.)
      - trex: >-
          They have walls now. They don't need me to keep them. ...And I've a world I've only
          read about. If you'll have a thief?
      - beat_break: C
      # ── C: Meesmickle's deadpan button — his only line of the chapter (lore/meesmickle.md).
      #  Road north resumes the druid thread (ch04) by staging, not a line. ──
      # (The company back on the lakeshore road north, Trex falling in at the back.)
      - meesmickle: "Taught himself to read, then talked his way onto the payroll. Most qualified hire so far."

# ── Post-Chapter ─────────────────────────────────────────────────────────────────
post_chapter:
  # No raw gold (vanilla gives none before FE8 Ch8); the chapter's wealth is the in-map
  # Tourmaline chest (= Red Gem, sell for 2,500g). The town "bounty" is narrative flavor.
  available_shops: [termalaine] # gems / mining equipment / unusual items (campaign.yaml; unlocks after ch03)
  units_recruited_in_chapter:
    - id: trex
      where: "mid-map cutscene (rbg-execution beat) — defects, then thieves for the party"
  unlocks_chapter: ch04-the-white-moose

# ── Signature Moments anchored here ──────────────────────────────────────────────
signature_moments:
  - pc: prof-rbg
    trigger: rbg_kobold_execution
  - pc: wolfram
    trigger: wolfram_ore_snacking

design_notes: >
  Identity: the thief/chests/doors dungeon-seize (vanilla Ch3 "big battle / recruit"),
  reskinned as Termalaine's gem mine. Teaching goal = the thief utility, carried by Trex
  (our Colm), made meaningful by door/chest-gated rooms. ALSO the monster foe-type debut
  (moved here from ch04): the Grell is a real FE Mogall and chronologically the party's
  first monster. FE8 has no multi-level maps, so the book's 3-level mine is one flat walled
  interior + one "open the way down" map-change. Two PC signature beats (RBG execution +
  Wolfram ore-snacking) land in the mid-map cutscene. Enemy/reward footprints both mirror
  vanilla FE8 Ch3; the only deviations (grell=monster boss, the ch02↔ch03 gem/hand-axe swap,
  the monster-debut move) are recorded in decisions.md and net-neutral to parity.


  Narrative reframe (2026-07-06, PENDING a dialogue-pass on the #97-locked beats — decisions
  captured here so nothing is lost; fiction only, roster/positions unchanged = still plays like
  Bandits of Borgo): (1) the enemy kobolds are a FERAL SPLINTER — the ones who drove the miners
  out and are blood-drawn by the grell in the deep — NOT Trex's disciplined warren; staged as
  his broken-Common foil (trex.md "let the gap characterize"). (2) Trex's motive to fight them =
  purge the feral ones + kill the grell to clear his people's name and win Termalaine's trust
  (his established goal), resolving "why would he help us fight kobolds." (3) The kobold RBG
  executes is one of the FERAL ones (retires trex.md's "he is only frightened" calibration line;
  his entrance pivots from protect-my-kin to distinguish-myself-and-pitch-the-deal). (4) The
  grell is VISIBLE from turn 1 (like vanilla Bazba); Pinky's shaft-scout folds into the OPENING
  cutscene (player sees the mogall up top) — revealed_by:pinky_scout dropped from the grell.
  (5) The vanilla enemy-thief slot is a SVIRFNEBLIN SKULK (deep-gnome gem-looter, Underdark tie
  to the grell), not a giant rat (RBG & Pinky are the party's rats). Dialogue-pass scope = the
  opening beat + the RBG-execution/Trex-recruit beat; grounds in trex.md + the book.
