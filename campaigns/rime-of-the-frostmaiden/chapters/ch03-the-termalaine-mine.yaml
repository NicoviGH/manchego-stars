    ai_pattern: defensive
  - id: kobold-keykeep-chest
    name: "Icewind Kobold"
    count: 1
    positions: [[7, 11]]
    class: brigand
    level: 3
    autolevel: true
    inventory:
      - id: iron-axe
    item_drop: chest-key        # backup chest access (Trex is the intended opener)
    ai_pattern: defensive

