# ── Post-Chapter ──────────────────────────────────────────────────────────────
# Economy follows vanilla FE8: NO flat per-chapter clear bonus -- gold comes only from
# in-map sources (gold-giving villages, sellable drops/gems, chests, arena). See
# docs/decisions.md "Economy". ch01 is a net wash, like vanilla Ch1 (~0 gold): the
# company's ~200g job payment for recovering the iron is immediately spent winning over
# Baxby, so nothing is added or subtracted in-game (Nicolas, 2026-06-17). The "two
# hundred gold" in the ending dialogue is flavor only.
post_chapter:
  net_gold: 0                   # job pay (~200g) == Baxby's keep; no in-game add/subtract
  available_shops: [bryn-shander]
  units_available_to_recruit:   # Baxby = FREE story-recruit, won over in the ending
    - id: baxby                 # cutscene; joins as a ch02 starting unit. FE8 shops sell
      via: story                # items, not units, so this is recruitment, not a purchase.
      joins: ch02-cold-welcome
  unlocks_chapter: ch02-cold-welcome

# ── Design Notes ───────────────────────────────────────────────────────────────
design_notes: >
  Vanilla-Ch1-parity breather Seize. Teaches: basic movement, attack (vanilla FE
  combat with the cosmetic D&D damage-type reskin + crit flourish), forest cover,
  and the weapon triangle as our cast actually experiences it — no PC wields a
  sword, so the lesson is Braulo's axe over enemy spears (and over the spear
  chief: the boss-matchup edge vanilla gave Eirika's rapier) plus Wolfram
  feeling axe pressure on his lance. Magic ignoring the chief's armor (def→res)
  is our armorslayer moment. Braulo should use the Rage consumable at least
  once naturally. The +3 west-edge reinforcements are vanilla's own pressure
  beat. No archers, no chests, no ridge-crossers — those lessons start ch02+.

  TODO (deferred — after the Ch1 vertical slice): enrich from the book's
  "Foaming Mugs" quest (book pp.34-35), which this chapter adapts. Candidate
  canon to LAYER ON (do not replace the DM-notes beats): boss → Izobai the
  one-eared goblin boss atop a 20-ft wagon pulled by two polar bears (a
  "free-the-bears-to-turn-them" gimmick); the yeti-killed dwarf Oobok's
  remains + two sets of tracks as an environmental mystery; questgivers
  Hruna/Korux/Storn; reward = gemstones (50gp ea) + 10% Blackiron Blades
  discount; Clan Battlehammer / Kelvin's Cairn / Karkolohk ties. The DM notes'
  version (three dwarves, iron ingots, dismembered body, goblins) stays the
  spine — the book complements it, doesn't overwrite it.
