# chapters/ch01-the-iron-trail.yaml
# Chapter index: docs/CHAPTERS.md (generated from this file). Rationale: docs/decisions.md.
# Combat is vanilla FE (see docs/decisions.md §Combat). damage_type labels are cosmetic.
#
# FIELD PARITY (decisions.md §Field parity, 2026-06-10): this chapter mirrors vanilla
# FE8 Ch1 "Escape!" 1:1 on the field — 4 player units fielded, 7 initial enemies + 3
# reinforcements, lv1 line enemies + lv4 boss, Seize, lose = lord falls. Vanilla data
# decoded from fireemblem8u git HEAD src/events/ch1-eventudefs.h.

id: ch01-the-iron-trail
title: "The Iron Trail"
chapter_number: 1
milestone: M3
cadence: full_party_intro       # story-wise: whole cast meets at the Northlook (opening
                                # scene); the FIELD is 4 units (vanilla Ch1 parity)
fe8_base_map: "FE8 Ch13a — Fluorspar's Oath (layout only)"  # cadence base = FE8 Ch1
fe8_cadence_base: "FE8 Ch1 — Escape! (Seize breather; field counts mirrored 1:1)"
parity_reference: "FE8 Ch1"   # #48 enemy-pressure parity bar — Escape! — field counts mirrored 1:1 (cadence base, not the Ch13a layout)

# ── Narrative ──────────────────────────────────────────────────────────────────
narrative: >
  The party meets at The Northlook tavern in Bryn Shander. Three dwarves hire
  them to track a missing shipment of iron ingots. Four of the company take the
  job into the snow (the rest stay in town); they follow the trail past a
  dismembered body and find the goblin thieves encamped at the old waystation.

# ── Map ────────────────────────────────────────────────────────────────────────
map:
  file: maps/ch01-the-iron-trail.mar     # painted in the HTML editor (ch00 flow)
  tileset: snowy-bern                    # shared winter tileset (#41)
  base_layout: Ch13EirikaMap             # vanilla 25×16 layout, winter-reskinned
  size: "25x16"
  description: >
    Linear snowy trail between peak ridges: Bryn Shander outskirts at the left
    edge, goblin camp (fort cluster) at the right edge. Forest tiles line the
    trail for cover (+20 avoid). Peaks are corridor walls only in this chapter —
    no enemy crosses them (the brigand ridge lesson is ch02's, like vanilla Ch2).

# ── Objective ──────────────────────────────────────────────────────────────────
objective:
  type: seize                            # vanilla Ch1 parity (Seize the gate)
  description: "Seize the goblin camp — the chief holds it and the ingots are there"
  seize_tile: [21, 7]                    # the camp's castle-gate tile (snowy-bern metatile 938,
                                         # TERRAIN_GATE_CASTLE) — camp center, the chief's tile.
                                         # Reads unmistakably as a Seize point (#57 legibility
                                         # checkpoint, decisions.md §Combat); the gate carries
                                         # vanilla Breguet's +20avo/+3def — full vanilla-Ch1
                                         # "Seize the gate" parity (the earlier bonus-free ruins
                                         # tile was the deviation; restored 2026-06-20).
  seize_by: lord                         # the player-chosen lord (#42); engine patches
                                         # CanUnitSeize to the chosen pid

# ── Win / Lose Conditions ──────────────────────────────────────────────────────
win_condition: seize                     # lord seizes the camp tile (chief must die first)
lose_condition: lord_defeated            # the chosen lord falls = game over (vanilla rule);
                                         # other PCs get flag-less "retreat" defeat quotes

# ── Difficulty ─────────────────────────────────────────────────────────────────
difficulty_note: >
  Vanilla Ch1 parity: 4 fielded PCs vs 7 initial enemies (+3 reinforcements).
  Line goblins are lv1 autoleveled with iron weapons; the chief is lv4 on the
  seize tile. Enemy mix (3 spears / 3 axes) carries the triangle lesson our
  lordless cast can actually have: Braulo's axe beats the spear goblins and the
  spear chief; Wolfram tanks the axe goblins on the wrong end of the triangle;
  bows/magic are the neutral ranged answer. Comfortable vanilla-FE hit rates
  (~75%) via forest cover. Clear in ~8-10 turns.

# ── Player Units ──────────────────────────────────────────────────────────────
# Whole cast is RECRUITED (Northlook scene); the field obeys vanilla Ch1: 4 slots.
# Pick Units (prep flow) chooses which 4; the chosen lord (#42) is force-deployed.
deploy_limit: 4                          # vanilla Ch1: Eirika+Seth + Franz+Gilliam = 4
deploy_slots:                            # [col, row] — west edge, trail mouth
  - [3, 8]
  - [3, 9]
  - [2, 8]
  - [2, 9]
# Vanilla fields these 4 as 2 starters + 2 turn-2 arrivals (Franz/Gilliam). We field
# all 4 from turn 1: the staggered arrival was a story beat for fixed characters and
# doesn't survive a player-picked party; 4-at-start is the gentler read of the same
# total (lean generous, feedback_fe-level-design).

# ── Enemy Units ────────────────────────────────────────────────────────────────
# Vanilla Ch1 enemy table, goblin-skinned: 3 Soldiers (lances) + 3 Fighters (axes)
# + Breguet (Armor Knight lv4, iron lance, on the objective). Fighters (not
# brigands) so nothing pathfinds over the peaks.
enemy_units:
  - id: goblin-spear
    name: "Goblin Spear"
    count: 3
    positions: [[19,7],[19,9],[20,10]]   # holding the camp approach
    class: soldier
    level: 1
    autolevel: true
    inventory:
      - id: iron-lance
        damage_type: piercing   # cosmetic flavor label
    ai_pattern: hold_then_attack  # vanilla gate-guard posture: attack in range, don't chase

  - id: goblin-axe
    name: "Goblin Raider"
    count: 3
    positions: [[14,8],[13,6],[15,10]]   # mid-trail pursuers ((15,6) became peak in the paint)
    class: fighter
    level: 1
    autolevel: true
    inventory:
      - id: iron-axe
        damage_type: slashing   # cosmetic flavor label
    ai_pattern: aggressive      # vanilla pursue AI {0x0,0x0A,0x0,0x0}

  - id: goblin-chief
    name: "Izobai"               # the Foaming Mugs goblin boss (book canon); a female
                                  # Karkolohk warlord. Custom green-goblin bust dresses
                                  # the Breguet slot (GUEST_PORTRAIT_MAP izobai->Breguet).
    is_boss: true
    count: 1
    position: [21, 7]           # ON the seize tile (castle-gate, metatile 938) — full Breguet
                                #   mirror, incl. the gate's +20avo/+3def (kill boss -> the gate
                                #   tile is the obvious empty Seize square; #57 criterion b)
    class: armor-knight         # Breguet's class; magic (def→res) is our "rapier"
    level: 4
    inventory:
      - id: iron-lance
        damage_type: piercing   # cosmetic flavor label
      - id: iron-ingots         # drops on death → the job's MacGuffin
        is_key_item: true
    ai_pattern: hold_position   # Breguet AI {0x3,0x3,0x9,0x20}: attack in place, never move
    # Voice: cunning, mocking, mercenary bandit-warlord (lore/izobai.md). LOCKED 2026-06-17.
    taunt: "The iron's right here, under my boots. Come and take it."
    death_quote: "Should've taken the gold... and run..."

  - id: goblin-reinforcements
    name: "Goblin Raider"
    count: 3                    # vanilla: 2 Fighters + 1 Soldier from the player-start side
    composition: [fighter, fighter, soldier]
    level: 1
    autolevel: true
    spawn_turn: 3
    spawn_edge: west            # behind the party, same side as vanilla
    positions: [[0,8],[0,9],[0,10]]   # (0,7) is the painted compound wall
    inventory_by_class:
      fighter: [iron-axe]
      soldier: [iron-lance]
    ai_pattern: aggressive

# ── Events ────────────────────────────────────────────────────────────────────
events:
  # Opening cutscene (before player control)
  - trigger: chapter_start
    type: cutscene
    ea_file: events/ch01-opening.ea
    description: >
      The Northlook, Bryn Shander. Hlin and Scramsax come in from the cold, talking of
      hiring adventurers; the seven are already in the taproom, each for their own
      reasons, and reveal themselves one by one as Hlin works the room. Hlin lays out the
      campaign's stakes — the unnatural endless winter and its agents — then puts the
      company to a first test: she brings the dwarf Hruna over with the stolen iron-ingot
      job (RBG haggles the price to 200 GP; Braulo calls it fair and commits). She asks
      for one voice to lead, handing into lord-select (#42) and Pick Units; four take the
      trail.
      LOCKED dialogue-pass text below (Beat 1, co-written with Nicolas 2026-06-16).
      PENDING (not done by this commit): slot-2 eventscript wiring that consumes this
      script, the tavern background art (Fireplace-base reskin or custom Northlook
      interior; show-before-commit), the Hruna portrait, and the in-game motion review.
    script:                       # LOCKED 2026-06-16 (dialogue pass, co-written with Nicolas)
      - location_card: "The Northlook"
      # ── A — Hlin & Scramsax come in from the cold ──
      # (Scramsax stamps snow off his boots, surveys his crowded taproom; nods at the mounted fish)
      - scramsax: >-
          Ngh. Walk to the Eastway and back, and the place fills with strangers.
          Mind Ol' Bitey, the lot of you — he's stuffed, but he still bites the
          ones who don't pay their tab.
      # (Hlin lowers herself onto a stool, pipe unlit)
      - hlin: >-
          Strangers with steel, Scramsax. That's what I came back for. I can't
          walk that road again — not alone. Not at my age.
      # (Scramsax prices the room with one unimpressed sweep)
      - scramsax: >-
          Steel. I've got a mushroom, a snowman, a cat in the corner, and whatever
          that one's licking off my bar rail. Take your pick, Trollbane.
      # ── B — the cast, one by one (drawn out as Hlin looks the room over) ──
      - beat_break: B            # build splits the scene here -> its own message (REMA pause + fresh face budget)
      # (Wolfram straightens from the bar rail, unembarrassed) — plants the iron
      - wolfram: >-
          Your rail's pig iron, friend. But the brackets? Good Clan Battlehammer
          steel. Haven't tasted ore this clean since I came north.
      # (Marty coughs a soft puff of spores in Hlin's face, pours from a battered thermos,
      #  taps in a measure of powder labelled "CHAGACCINO"; he never acknowledges the spores)
      # Rendered as a parenthetical stage-direction page (FE8 cutscenes have no particle FX).
      - marty: >-
          (A soft puff of spores drifts off him as he leans in, pouring coffee
          from a battered thermos into a cup marked CHAGACCINO.)
      - marty: "You look cold. Mushroom coffee?"
      # (Scramsax, deadpan — trimmable)
      - scramsax: "He does that to everyone. Drink's better than it sounds."
      # (Rootis waves from his seat)
      - rootis: "Don't mind me — just enjoying the weather."
      # (Meesmickle: a cat watching from the shadows, not moving)
      - meesmickle: >-
          A talking mushroom, a snowman, and a scale-less dragonborn buying
          drinks. Wonderful. I was worried tonight would be dull.
      # Sclorbo never speaks — impression/gesture text, rendered in parentheses
      - sclorbo: >-
          (A tiny chwinga hops onto the table and beams pure welcome at Hlin —
          sit, rest, you're among friends.)
      # (RBG sweeps off his hat) — the businessman arrives
      - prof-rbg: >-
          Cheesed to make your acquaintance, madam. Professor R.B. Geenius —
          inventor, problem-solver, the one sensible mind in the room. You did
          say... coin?
      # (RBG steps aside; his son Pinky has been hiding behind his coat the whole time)
      - prof-rbg: "Oh — and this is my boy, Pinky. Say hello, Pinky."
      - pinky: >-
          (Pinky pokes his head out from behind his father and gives a small,
          shy wave.)
      # ── C — Braulo cuts to business, then Hlin's story (the campaign's stakes) ──
      # Beat B ends on the RBG+Pinky two-shot; this break's REMA clears them so Braulo
      # starts on a fresh stage (otherwise shy Pinky lingered far-left behind Braulo).
      - beat_break: C
      # (Braulo sets down his tankard; a small isopod peeks from the lip of his shell,
      #  watching the mushroom) — he speaks only for himself, then settles in for Hlin's tale
      - braulo: "Name the job and the price. If it's fair, I'm in."
      # (Hlin lights her pipe at last)
      - hlin: >-
          Most of you aren't from the Dale, so I'll keep it simple. This winter
          doesn't end. Two years now — no thaw, no spring, the sun giving up a
          little more of the sky each week.
      - hlin: >-
          A cold this long stops behaving like cold. It seems to have a will of
          its own — and whatever it wants, it doesn't work the snow alone.
      - hlin: >-
          I met one of its agents this winter — a man the cold wouldn't touch,
          wielding a dagger made of ice. Town by town, he hunted down those who'd
          cheated the sacrifices, and made certain the cold got its due. I cut him
          down myself... and he got up and walked off into the storm.
      # (a dry pull on the pipe)
      - hlin: >-
          Whatever's got hold of this Dale, it'll take more hands than mine. Hands
          like yours — if you've the stomach for the work.
      # ── D — the test → Hruna's iron job ──
      - beat_break: D
      # (Hlin raises a hand toward the bar — she brings Hruna over)
      - hlin: >-
          But I don't hire on a handshake. There's a job that wants doing tonight.
          Do it, and we'll talk about the rest. Hruna?
      # (Hruna, a dwarf with a frost-scarred ear, leans in; voice like gravel)
      - hruna: >-
          A sled of our iron went out for Blackiron's forge three days back. Forty
          Battlehammer ingots. It never came.
      - hruna: >-
          We found sled-tracks off the high trail. And worse. Bring our iron home,
          and there's good coin in it — and three dwarves who don't forget a debt.
      # ── E — the price, the leader's word → lord-select ──
      - beat_break: E
      # (RBG produces a small abacus) — does the haggling
      - prof-rbg: >-
          "Good coin" is wonderfully vague, madam. Allow me — say two hundred gold,
          and a discount at this Blackiron's forge? Then we'd have a most Gouda
          arrangement.
      # (Braulo nods once) — judges the price fair; he speaks only for himself, the
      #  company's "yes" is the lord-select that follows (Nicolas, 2026-06-17)
      - braulo: "Fair price for honest work."
      # (Hlin looks them over) — this final line is the LAST script entry; the build
      # pops it from the scenic scene and renders it as the over-map lord-select
      # prompt (msg 0x957, with Hlin's face), so the question lands once, right
      # before the Pick-a-leader menu (#42).
      - hlin: >-
          Then it's settled. But a job needs one voice to answer for it. Who leads
          them up the trail?

  # Post-map cutscene (after seize)
  - trigger: chapter_end
    type: cutscene
    ea_file: events/ch01-ending.ea
    description: >
      "The Rolling Cheddar." Back inside the Bryn Shander gate with the recovered
      iron, the party is met by Speaker Duvessa Shane. She thanks them, hands them a
      standing Council commission for Ten-Towns trouble, and grants them the wrecked
      trail sled (the dwarves wrote it off). Wolfram asks Hruna for some of the
      returned iron to armor it; RBG over-engineers the repair and dubs the sled the
      "Rolling Cheddar" — the party's mobile home. Duvessa points to an axe-beak at
      the market; Marty speaks to it (rapport spores) and wins it over with a promise
      of food and shelter — Baxby, the first recruit. She sends them west to Targos.
      LOCKED dialogue-pass text below (co-written with Nicolas 2026-06-17). The
      ch02 cold-open spends the held Velynne stolen-orb hook ("as the party leave
      town"). WIRED in-game (inject_ch01 → EventScr_Ch2_EndingScene): scenic BACG +
      "Bryn Shander" card + one Text() per beat (A–F), Duvessa/Wolfram/Hruna/RBG/
      Meesmickle/Marty/Baxby faces staged with the 4-face budget (Duvessa hosts mid-
      right; Baxby's cutscene face rides the Forde slot, GUEST_PORTRAIT_MAP). PENDING:
      Baxby's recruit UNIT + axe-beak map-sprite injection (his bust + face are done);
      the ending plays over vanilla BG_NORMAL_VILLAGE (winterize attempts washed it out;
      using it as-is per Nicolas 2026-06-17);
      ch02 host (MNC2(0x3) drops to vanilla Ch3 until then); in-game motion review.
      Baxby base class = Cavalier, Franz donor (npcs/baxby.yaml).
    script:                       # LOCKED 2026-06-17 (dialogue pass, co-written with Nicolas)
      - location_card: "Bryn Shander"
      # ── A — Duvessa thanks the company, hires them, grants the sled, points west ──
      # (one continuous Duvessa beat -- NO beat_break inside it, so her face never fades
      #  out and back in mid-speech. The build splits the scene into separate messages,
      #  each with a face-clearing REMA, ONLY where the on-screen cast actually changes.)
      - duvessa: >-
          I'm Duvessa Shane — I speak for Bryn Shander. You brought our iron home,
          and the truth of what happened to the driver. Thank you.
      - duvessa: >-
          That job was a test, and you passed it. I've trouble in every town and too
          few I trust to send — take a standing commission from the Council.
      - duvessa: >-
          That wrecked sled you found on the trail? The dwarves have written it off.
          Mend it, and it's yours. Then go west, to Targos — frost druids in the
          streets, and folk starting to listen.
      # ── C — Wolfram asks Hruna for the iron to armor the sled ──
      - beat_break: C
      # (Wolfram crouches by the returned iron and bites a corner off an ingot)
      - wolfram: >-
          ...Battlehammer iron. Clean all the way through. Hruna — could you spare a
          few? Give me the iron and a forge-night, and nothing on the road dents this sled.
      - hruna: >-
          Spare them? Lad, you brought the whole load home. Take what you need. Clan
          Battlehammer doesn't forget who walked that trail.
      # ── D — RBG over-engineers the repair and names the sled ──
      - beat_break: D
      - prof-rbg: >-
          Um, actually — you'll want an expert's eye on the mountings. Reinforced
          runners, a strongbox under the bench... a rolling fortress.
      - prof-rbg: >-
          And every fortress wants a name. Gentlemen — the Rolling Cheddar. Sharp,
          well-aged, and utterly impenetrable.
      # (Meesmickle, dry, claims the warm corner -- makes the sled "home" without
      #  repeating RBG's mod list; his quip is the beat's box button)
      - meesmickle: "As long as there's a dry corner in it for me... I'll allow it."
      # ── E — Baxby the axe-beak: Marty wins him over → first recruit ──
      - beat_break: E
      - duvessa: >-
          A sled's no use without something to pull it. There's an axe-beak at the
          market — two hundred gold. Strong old bird; he's outlasted three owners.
      # ── E2 — Marty approaches the bird; Baxby answers (split so Duvessa clears out
      #         at the REMA boundary instead of swapping to Baxby on the same podium) ──
      - beat_break: E2
      # Marty's spore-cough, shown as a faceless stage-business box (no portrait) so the
      # action reads in-game (Nicolas 2026-06-17), then he speaks.
      - narration: >-
          Marty leans in close and breathes a soft puff of spores over the
          old bird, so that it might hear him.
      # Split so the faceless narration above gets its OWN opaque SOLOTEXTBOXSTART box
      # (#58: asides must never render boxless over the scene art); Marty's faced
      # dialogue below resumes in the normal talk window.
      - beat_break: E2b
      - marty: "Hello, friend. Do you have a name?"
      - baxby: >-
          ...Baxby. I've hauled freight over this ice longer than most of you have
          breathed. I don't pull for just anyone.
      - marty: >-
          Then pull for us. You'll be fed when we eat, sheltered when there's shelter,
          and never worked past your strength. You have my word.
      - baxby: "...Hm. Honest terms. Hitch me up, then — let's see this road of yours."
      # ── Closing box button → sends them west (ch02 opens on the road + Velynne hook) ──
      - beat_break: F
      - duvessa: "Then it's settled. Targos is expecting weather. Better hurry."

