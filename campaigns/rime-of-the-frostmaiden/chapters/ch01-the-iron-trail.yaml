# chapters/ch01-the-iron-trail.yaml
# Chapter index: docs/CHAPTERS.md (generated from this file). Rationale: docs/decisions.md.
# Combat is vanilla FE (see docs/decisions.md §Combat). damage_type labels are cosmetic.
#
# FIELD PARITY (decisions.md §Field parity, 2026-06-10): this chapter mirrors vanilla
# FE8 Ch1 "Escape!" 1:1 on the field — 4 player units fielded, 7 initial enemies + 3
# reinforcements, lv1 line enemies + lv4 boss, Seize, lose = lord falls. Vanilla data
# decoded from fireemblem8u git HEAD src/events/ch1-eventudefs.h.

id: ch01-the-iron-trail
title: "The Iron Trail"
chapter_number: 1
milestone: M3
cadence: full_party_intro       # story-wise: whole cast meets at the Northlook (opening
                                # scene); the FIELD is 4 units (vanilla Ch1 parity)
fe8_base_map: "FE8 Ch13a — Fluorspar's Oath (layout only)"  # cadence base = FE8 Ch1
fe8_cadence_base: "FE8 Ch1 — Escape! (Seize breather; field counts mirrored 1:1)"

# ── Narrative ──────────────────────────────────────────────────────────────────
narrative: >
  The party meets at The Northlook tavern in Bryn Shander. Three dwarves hire
  them to track a missing shipment of iron ingots. Four of the company take the
  job into the snow (the rest stay in town); they follow the trail past a
  dismembered body and find the goblin thieves encamped at the old waystation.

# ── Map ────────────────────────────────────────────────────────────────────────
map:
  file: maps/ch01-the-iron-trail.mar     # painted in the HTML editor (ch00 flow)
  tileset: snowy-bern                    # shared winter tileset (#41)
  base_layout: Ch13EirikaMap             # vanilla 25×16 layout, winter-reskinned
  size: "25x16"
  description: >
    Linear snowy trail between peak ridges: Bryn Shander outskirts at the left
    edge, goblin camp (fort cluster) at the right edge. Forest tiles line the
    trail for cover (+20 avoid). Peaks are corridor walls only in this chapter —
    no enemy crosses them (the brigand ridge lesson is ch02's, like vanilla Ch2).

# ── Objective ──────────────────────────────────────────────────────────────────
objective:
  type: seize                            # vanilla Ch1 parity (Seize the gate)
  description: "Seize the goblin camp — the chief holds it and the ingots are there"
  seize_tile: [21, 7]                    # the painted ruins arch (editor V8) — camp center,
                                         # the chief's tile. Ruins = no terrain bonus (vanilla
                                         # Breguet's gate gave +20avo/+3def; gentler here)
  seize_by: lord                         # the player-chosen lord (#42); engine patches
                                         # CanUnitSeize to the chosen pid

# ── Win / Lose Conditions ──────────────────────────────────────────────────────
win_condition: seize                     # lord seizes the camp tile (chief must die first)
lose_condition: lord_defeated            # the chosen lord falls = game over (vanilla rule);
                                         # other PCs get flag-less "retreat" defeat quotes

# ── Difficulty ─────────────────────────────────────────────────────────────────
difficulty_note: >
  Vanilla Ch1 parity: 4 fielded PCs vs 7 initial enemies (+3 reinforcements).
  Line goblins are lv1 autoleveled with iron weapons; the chief is lv4 on the
  seize tile. Enemy mix (3 spears / 3 axes) carries the triangle lesson our
  lordless cast can actually have: Braulo's axe beats the spear goblins and the
  spear chief; Wolfram tanks the axe goblins on the wrong end of the triangle;
  bows/magic are the neutral ranged answer. Comfortable vanilla-FE hit rates
  (~75%) via forest cover. Clear in ~8-10 turns.

# ── Player Units ──────────────────────────────────────────────────────────────
# Whole cast is RECRUITED (Northlook scene); the field obeys vanilla Ch1: 4 slots.
# Pick Units (prep flow) chooses which 4; the chosen lord (#42) is force-deployed.
deploy_limit: 4                          # vanilla Ch1: Eirika+Seth + Franz+Gilliam = 4
deploy_slots:                            # [col, row] — west edge, trail mouth
  - [3, 8]
  - [3, 9]
  - [2, 8]
  - [2, 9]
# Vanilla fields these 4 as 2 starters + 2 turn-2 arrivals (Franz/Gilliam). We field
# all 4 from turn 1: the staggered arrival was a story beat for fixed characters and
# doesn't survive a player-picked party; 4-at-start is the gentler read of the same
# total (lean generous, feedback_fe-level-design).

# ── Enemy Units ────────────────────────────────────────────────────────────────
# Vanilla Ch1 enemy table, goblin-skinned: 3 Soldiers (lances) + 3 Fighters (axes)
# + Breguet (Armor Knight lv4, iron lance, on the objective). Fighters (not
# brigands) so nothing pathfinds over the peaks.
enemy_units:
  - id: goblin-spear
    name: "Goblin Spear"
    count: 3
    positions: [[19,7],[19,9],[20,10]]   # holding the camp approach
    class: soldier
    level: 1
    autolevel: true
    inventory:
      - id: iron-lance
        damage_type: piercing   # cosmetic flavor label
    ai_pattern: hold_then_attack  # vanilla gate-guard posture: attack in range, don't chase

  - id: goblin-axe
    name: "Goblin Raider"
    count: 3
    positions: [[14,8],[13,6],[15,10]]   # mid-trail pursuers ((15,6) became peak in the paint)
    class: fighter
    level: 1
    autolevel: true
    inventory:
      - id: iron-axe
        damage_type: slashing   # cosmetic flavor label
    ai_pattern: aggressive      # vanilla pursue AI {0x0,0x0A,0x0,0x0}

  - id: goblin-chief
    name: "Izobai"               # the Foaming Mugs goblin boss (book canon); a female
                                  # Karkolohk warlord. Custom green-goblin bust dresses
                                  # the Breguet slot (GUEST_PORTRAIT_MAP izobai->Breguet).
    is_boss: true
    count: 1
    position: [21, 7]           # the seize tile (painted ruins arch) — full Breguet mirror
    class: armor-knight         # Breguet's class; magic (def→res) is our "rapier"
    level: 4
    inventory:
      - id: iron-lance
        damage_type: piercing   # cosmetic flavor label
      - id: iron-ingots         # drops on death → the job's MacGuffin
        is_key_item: true
    ai_pattern: hold_position   # Breguet AI {0x3,0x3,0x9,0x20}: attack in place, never move
    death_quote: "Gah! The ironses were ours!"

  - id: goblin-reinforcements
    name: "Goblin Raider"
    count: 3                    # vanilla: 2 Fighters + 1 Soldier from the player-start side
    composition: [fighter, fighter, soldier]
    level: 1
    autolevel: true
    spawn_turn: 3
    spawn_edge: west            # behind the party, same side as vanilla
    positions: [[0,8],[0,9],[0,10]]   # (0,7) is the painted compound wall
    inventory_by_class:
      fighter: [iron-axe]
      soldier: [iron-lance]
    ai_pattern: aggressive

# ── Events ────────────────────────────────────────────────────────────────────
events:
  # Opening cutscene (before player control)
  - trigger: chapter_start
    type: cutscene
    ea_file: events/ch01-opening.ea
    description: >
      The Northlook tavern — opens on the ch00 hand-off (moved here from the prologue
      ending, 2026-06-09, vanilla-style): Hlin and Scramsax, fresh off Sephek's
      escape, and Hlin retains the seven — Ten-Towns needs more hands than hers.
      Then the three dwarves approach and explain the missing ingot shipment; they
      offer 200 GP for recovery. The lord choice (#42) and Pick Units happen here:
      four take the trail. Cut to: the trail. A dismembered body in the snow.

  # Post-map cutscene (after seize)
  - trigger: chapter_end
    type: cutscene
    ea_file: events/ch01-ending.ea
    description: >
      The party recovers the iron ingots. Duvessa Shane arrives with a pair of
      town guards. She thanks the party and offers them a retainer for ongoing
      Ten-Towns security work. She mentions other towns having trouble.
      Braulo asks about the sled dog situation. Baxby (an axe-beak) is for sale.

  # Flavor trigger on the trail
  - trigger: unit_on_tile
    unit: any
    tile: [8, 8]
    type: dialogue
    ea_file: events/ch01-road-sign.ea
    description: >
      A battered sign: "BRYN SHANDER — 2 MILES. WATCH FOR WOLVES."

  # Hint houses — vanilla Ch1 parity (two House visits, NO items; msgs 0x93B/0x93C
  # are pure tactical hints). Dialogue written in the dialogue pass.
  - trigger: visit
    tile: [1, 7]                # the compound door at the Bryn Shander outskirts (B8)
    type: house
    ea_file: events/ch01-house-compound.ea
    description: >
      TERRAIN HINT (vanilla house 1 analogue): a Ten-Towner warns the goblins have
      dug into the old waystation — the fort mounds shrug off blows and the snow
      heals them up (fort terrain: +20 avoid, +2 def, heals).
  - trigger: visit
    tile: [13, 2]               # the north house off the mid-trail (N3)
    type: house
    ea_file: events/ch01-house-north.ea
    description: >
      BOSS HINT (vanilla house 2 analogue, the "rapier/armorslayer" hint re-cast):
      the chief wears scrap-plate that turns blades — but magic doesn't care about
      plate (def→res), and an axe has the edge over his spear.

# ── Post-Chapter ──────────────────────────────────────────────────────────────
post_chapter:
  gold_reward: 300              # base reward (+ enemy drops)
  available_shops: [bryn-shander]
  units_available_to_recruit:
    - id: baxby
      cost_gp: 200
      description: "Purchase Baxby the axe-beak at the Bryn Shander market"
  unlocks_chapter: ch02-cold-welcome

# ── Design Notes ───────────────────────────────────────────────────────────────
design_notes: >
  Vanilla-Ch1-parity breather Seize. Teaches: basic movement, attack (vanilla FE
  combat with the cosmetic D&D damage-type reskin + crit flourish), forest cover,
  and the weapon triangle as our cast actually experiences it — no PC wields a
  sword, so the lesson is Braulo's axe over enemy spears (and over the spear
  chief: the boss-matchup edge vanilla gave Eirika's rapier) plus Wolfram
  feeling axe pressure on his lance. Magic ignoring the chief's armor (def→res)
  is our armorslayer moment. Braulo should use the Rage consumable at least
  once naturally. The +3 west-edge reinforcements are vanilla's own pressure
  beat. No archers, no chests, no ridge-crossers — those lessons start ch02+.

