# chapters/ch05-the-elven-tomb.yaml
# Chapter index: docs/CHAPTERS.md (generated from this file). Rationale: docs/decisions.md.
# Combat is vanilla FE (see docs/decisions.md §Combat). damage_type labels are cosmetic.
# Canon: Rime of the Frostmaiden pp.80-83 (the Elven Tomb, Ravisin, Sahnar the mummy).
# This is our FE8 Ch5 "The Empire's Reach" 1:1 (ch04 is our FE8 Ch4). See decisions.md
# "ch04 and ch05 each map 1:1 to their numeric FE8 twin": we retile Ch5's spread-village
# field as an open-air elven-tomb depression and emulate its two set-pieces — the
# Natasha→Joshua escort (here: Basil→Sahnar) and the village-raid race (here: the eruption).

id: ch05-the-elven-tomb
title: "The Elven Tomb"
chapter_number: 5
status: planned                # brainstorm SEED, NOT authoritative: enemy roster/levels/beats are
                               # re-grounded against vanilla + party data when the slice is reached
                               # (brainstorming skill digests this). Exempt from the parity gate until then.
milestone: M3
cadence: first_boss             # see docs/CHAPTERS.md — 🟥
fe8_base_map: "FE8 Ch5 — The Empire's Reach"        # retiled: Ch5's spread field → open-air tomb depression
parity_reference: "FE8 Ch5"   # #48 enemy-pressure + reward parity bar — The Empire's Reach (1:1)
                              # (first chapter at the FE8-Ch5 reward tier: stat-boosters + a promotion item unlock here)

# ── Narrative ──────────────────────────────────────────────────────────────────
narrative: >
  The white moose's trail ends at an ancient elven tomb on a wooded slope — the
  refuge of Ravisin, the frost druid who has been awakening beasts to terrorize
  the loggers in Auril's name (the same druid who awakened Messie out in Maer
  Dualdon). Cornered at last, the moose makes its stand beside her. Ravisin fights
  to the death for her goddess. Among the crystal pillars the party finds a
  sealed sarcophagus, kindles the gazebo brazier to open it, and frees Sahnar — a
  chaotic-good moon-elf mummy who joins them, eager to learn about modern druids.
  They also rescue a sentient goodberry shrub, repot it, and name it Basil.

# ── Map ────────────────────────────────────────────────────────────────────────
map:
  file: maps/ch05-elven-tomb.tmx
  tileset: tomb-interior        # elven temple/tomb; FEUniverse temple tileset, arctic palette
  size: "~15×20"                # retile of FE8 Ch5's field (TBD at slice build) — NOT a corridor
  # DESIGN CONSTRAINT (decisions.md): retile Ch5's OPEN spread-village field, not an enclosed
  # ship/corridor. Keep the two features that make Ch5 play like Ch5:
  #  (1) reward-sites SPREAD to the corners (Ch5 villages sat at ~(5,1)(5,6)(12,10)(12,19)) so the
  #      party must SPLIT and race — here they're elven reliquary niches the eruption raids;
  #  (2) OPEN lanes so our mounted units (Baxby, Lupin) matter (a corridor neuters cavalry).
  description: >
    An open-air elven tomb — a snowy sunken depression ringed by crystal pillars and
    statues (cover/chokepoints), NOT a claustrophobic crypt. The moon dial sits at
    center, the gazebo brazier to one side, the sarcophagus on the eastern berm.
    Ravisin holds the central depression with the cornered white moose; risen elven
    tomb-guardians (spear-guards, sentinels) clog the approaches. Elven reliquary niches are
    spread to the map's edges (the reward-sites the eruption's dead race to desecrate). Open
    lanes between the pillars keep cavalry relevant.

# ── Objective ──────────────────────────────────────────────────────────────────
objective:
  type: defeat_boss                      # our FIRST clean boss kill (objective rotation — see decisions.md)
  description: "Defeat Ravisin, the frost druid (her guardians and the moose needn't all fall)"
  secondary:
    - type: talk_recruit
      description: >
        Recruit Sahnar the Joshua way (this IS Ch5's memorable beat). Sahnar rises as
        a HOSTILE guardian — a fast, crit-threat Myrmidon mummy (killing-edge, Joshua's
        exact donor) — and the only way to flip him is to walk fragile BASIL up to him
        to Talk (Basil is our Natasha: her exact donor, a frail Priest). So you must
        chaperone a weak healer across the depression to the deadly duelist, clearing a
        safe pocket first — the escort-recruit that defines how you play Ch5. Optional;
        flip him and he fights the back half (recruit swing ~+0.9 kills/round, #171).
    - type: brazier_flavor
      description: >
        The gazebo brazier (silver flame) is the narrative beat that WAKES Sahnar from
        the sarcophagus at the eruption — optional atmosphere, not the recruit gate
        (superseded by the chaperone Talk above; see decisions.md).

win_condition: boss_defeated
lose_condition: all_player_units_defeated

difficulty_note: >
  Our first real boss. Roster GROUNDED (rev.2, 2026-07-23, #25) to the FE8 Ch5 bar — verdict
  PARITY (within band): threat/slot 12.5 (x1.21) · clear-load/slot 5.0 (x0.97, ≈ vanilla's
  5.2), on a force that mirrors the twin's structure (line 16 · reinf 6 · convertible 1). The
  force is RISEN ELVEN GUARDIANS on the vanilla FE8 infantry classes (Soldier/Fighter/Mercenary/
  Archer/Armor-Knight/Myrmidon), skinned undead — the ch01 "vanilla class, our skin" pattern.
  Because the stats ARE living-class stats, clear-load parity comes for free: the earlier
  glassy problem (undead monster classes get doubled → die in 1 round; decisions.md) doesn't
  arise, and the Armor-Knight Frost-Sentinels are the Def-sink the monster palette couldn't
  produce. Threat sits a touch hot (x1.21) — fine for "our first real boss," and the DYNAMICS
  below pay the static bar down. Ravisin is a vanilla FE8 Druid — heavy dark-magic (FE MAG vs
  RES) at 1-2 range — so squishy/low-RES units must respect her threat range; the pillars give
  cover to bait her out. Two Ch5 dynamics do the real work and pay the STATIC bar DOWN:
    - CONVERTIBLE Sahnar (the Joshua flip): a hostile crit-Myrmidon until Basil Talks
      him, then a +1.0 kills/round ally for the back half. Self-balancing risk→advantage.
    - REINFORCEMENT eruption: the dead arrive over turns (arrives_turn), not a turn-1 alpha —
      so the turn-1 threat reads 9.9 (≈ vanilla's 8.1), below the static 12.5.
    - Untapped headroom: Lupin (+1.0) is a clean all-chapter combatant the static party
      number (6.27) omits; Basil is the fragile recruiter, not a fighter.
  No fog — the tension is the escort + the eruption race, not obscured vision. Keep it a
  clean DefeatBoss so Ravisin is the climax. (Playtest remains the arbiter; the static bar
  is a proxy — spatial check + `--ch05-boot` playtest still owed at the build slice.)

# ── Deployment ──────────────────────────────────────────────────────────────────
deployment:
  note: >
    Deployable pool by Ch5: 7 PCs + Pinky + Baxby (Cav) + Trex (Thief) + Lupin
    (beast-Cav, won in ch04 — a clean all-chapter combatant, +1.0 kills/round the static
    party number omits). Basil (Priest) is present from the start as the fragile RECRUITER
    (must be fielded and protected to Talk Sahnar — the Natasha role), NOT a fighter.
    Sahnar is NOT in the starting field — he rises mid-combat as a HOSTILE convertible
    (the Joshua flip) and joins only once Basil Talks him. deploy_limit caps the field to
    FE8-Ch5 parity (TBD this pass). Positions set in Tiled.

# ── Enemy Units (vanilla FE — grounded to FE8-Ch5 parity, #25) ────────────────────
# Grounding pass rev.2 (2026-07-23): the force is now RISEN ELVEN TOMB-GUARDIANS on the
# vanilla FE8 infantry classes (Soldier/Fighter/Mercenary/Archer/Armor-Knight/Myrmidon) —
# the same "vanilla class, our skin" pattern ch01 uses (goblin-skinned Soldiers/Fighters,
# campaign.yaml `enemy_class_reskins`). Two payoffs:
#   1. PARITY BY CONSTRUCTION — living-class stats ARE the vanilla Ch5 twin's stats, so the
#      glassy monster-class problem (mogall/revenant get doubled → die in 1 round; decisions.md
#      "undead reskins read glassy") simply doesn't arise. The Armor-Knight is the Def-sink the
#      undead palette couldn't produce.
#   2. STORY SEPARATION FROM CH04 — ch04 is the BEAST chapter (the wolf hunt, Marty's parley).
#      ch05 is the TOMB: the dead, not more wolves. Ravisin awakened the living in ch04; here she
#      has raised the DEAD (an escalation). Wolves are CUT (2026-07-23, Nicolas). The lone beast
#      is the White Moose — the ch04 quarry finally cornered (payoff, not a repeat).
# Structure preserved: 16 line + 6 eruption reinf + 1 convertible (Sahnar) = vanilla's line 16 ·
# reinf 6 · convertible 1. Weapons modeled via `inventory.fe_base`; eruption tagged
# `arrives_turn` (#177); Sahnar `convertible` (#171). No item drops — the Ch5 twin carries none.
# Per-unit `skin:` = the intended reskin for the ART track (build-slice: rides
# `enemy_class_reskins` in campaign.yaml + inject_enemy_class_battle_anims). `source:
# palette_swap` = frost/pale recolour of the vanilla frame (no FE-Repo undead anim in that
# weapon mode); a "FE-Repo: …" source = a borrowable custom anim (all [U] free-to-use).
enemy_units:
  # ── The boss: Ravisin, frost druid (holds the central depression) ───────────
  - id: ravisin
    name: "Ravisin"
    is_boss: true
    count: 1
    class: druid                # vanilla FE8 Druid (baseRanks: Anima D, Dark C, Staff E)
    level: 7
    weapon: flux-tome           # FE8 Flux (Dark) — the Druid's class-native tome; flavored "Killing Frost"
    inventory:
      - id: killing-frost
        fe_base: flux           # FE8 Flux — dark magic (FE MAG vs RES) at 1-2 range
    damage_type: cold           # flavor label only
    ai_pattern: hold_position
    death_quote: "Auril… I gave you everything…"
    skin:                       # Ravisin has authored boss art already; frost-druid palette
      look: "Ravisin, frost druid (existing boss portrait + Druid class art)"
      source: authored
    drops:
      - id: crest-of-cold-iron  # FORESHADOW: locked promotion relic (see decisions.md — the promotion seam)
        is_key_item: true
        locked: true            # unusable in MVP; pays off at the Ch8→9 promotion seam
  # ── The cornered white moose (the LONE beast — ch04 quarry, cornered boss) ───
  - id: white-moose
    name: "The White Moose"
    is_boss: true               # awakened beast-boss, cornered here (canon: tomb area E6)
    count: 1
    class: gwyllgi              # CLASS_GWYLLGI (FE8 beast) stand-in quadruped
    level: 6
    inventory:
      - id: antlers-and-hooves
        fe_base: rotten-claw    # modeled beast attack (vanilla monster weapon)
    damage_type: bludgeoning    # flavor label only ("antlers/hooves")
    ai_pattern: aggressive
    death_quote: "*a final, almost-human bellow*"
    skin:                       # the one beast; closes YAML TODO #38/#39 (read as elk, not wolf)
      look: "the White Moose — a great pale elk"
      source: "FE-Repo: Battle Animations/Monsters - Basic Types/[Wolf-Base] [U] Gwyllgi Vanilla (frost repal → elk)"
  # ── Risen spear-guard (SOLDIER, lance) — the tomb's rank-and-file dead ───────
  - id: risen-spear
    name: "Risen Spear-Guard"
    count: 5
    class: soldier              # CLASS_SOLDIER (vanilla Ch5's core infantry) — parity backbone
    level: 5
    autolevel: true
    inventory:
      - id: elven-spear
        fe_base: iron-lance
    damage_type: piercing       # flavor label only
    ai_pattern: defensive       # hold the approaches to the depression
    skin:
      look: "skeletal elven spear-guard"
      source: "FE-Repo: Battle Animations/Infantry - (Lnc) Soldiers, Halberdiers/[Custom Halb] [U] Skeleberdier (skeleton lance; frost-repal)"
      fallback: palette_swap    # if the import slips: frost-pale vanilla Soldier frame
  # ── Tomb-reavers (FIGHTER, axe) — the heavier risen dead ─────────────────────
  - id: tomb-reaver
    name: "Tomb Reaver"
    count: 3
    class: fighter              # CLASS_FIGHTER (axe infantry; Fighters not Brigands — no peak pathing)
    level: 5
    autolevel: true
    inventory:
      - id: rusted-greataxe
        fe_base: iron-axe
    damage_type: slashing       # flavor label only
    ai_pattern: aggressive
    skin:
      look: "risen elven axe-reaver, frost-pale"
      source: palette_swap      # vanilla Fighter frame, frost/pale palette
  # ── Crypt-blades (MERCENARY, sword) — the elite risen swordsmen (real skeleton anim) ─
  - id: crypt-blade
    name: "Crypt Blade"
    count: 2
    class: mercenary            # CLASS_MERCENARY (sword) — Spd ~5-6, a clean non-doubled threat
    level: 6
    autolevel: true
    inventory:
      - id: bone-sword
        fe_base: iron-sword
    damage_type: slashing       # flavor label only
    ai_pattern: aggressive
    skin:
      look: "skeletal elven blade"
      source: "FE-Repo: Battle Animations/Monsters - Basic Types/[Skeleton-Base] [U] Bonewalker (one arm, sword) by Alexsplode"
  # ── Bone-archers (ARCHER, bow) — ranged skeletons (real skeleton-bow anim) ────
  - id: bone-archer
    name: "Bone Archer"
    count: 2
    class: archer               # CLASS_ARCHER (bow) — punishes units caught out of cover
    level: 5
    autolevel: true
    inventory:
      - id: elven-longbow
        fe_base: iron-bow
    damage_type: piercing       # flavor label only
    ai_pattern: defensive
    skin:
      look: "skeletal elven archer"
      source: "FE-Repo: Battle Animations/Monsters - Basic Types/[Skeleton-Reskin] [U] Wight Sniper by DATonDemand"
  # ── Frost-sentinels (ARMOR-KNIGHT, lance) — the DEF-SINK vanilla had, we lacked ─
  - id: frost-sentinel
    name: "Frost Sentinel"
    count: 2
    class: armor-knight         # CLASS_ARMOR_KNIGHT — high Def/HP; the ice-locked guardian anchor
    level: 6
    autolevel: true
    inventory:
      - id: frostbound-lance
        fe_base: iron-lance
    damage_type: piercing       # flavor label only
    ai_pattern: hold_position   # ancient sentinels; hold the pillars, never chase
    skin:
      look: "ice-locked elven sentinel (frozen armor, not a skeleton)"
      source: palette_swap      # vanilla Armor-Knight frame, frost palette — reads better than bone here
  # ── ERUPTION reinforcements (#177): the dead erupt over turns 2/3/5 and race the ─
  #    spread reliquary reward-sites (the Ch5 village-raid, in undead dress) ──────
  - id: risen-spear-reinf
    name: "Risen Spear-Guard"
    count: 2
    class: soldier
    level: 5
    autolevel: true
    arrives_turn: 2             # the eruption's first wave, not a turn-1 alpha
    inventory:
      - id: elven-spear
        fe_base: iron-lance
    damage_type: piercing       # flavor label only
    ai_pattern: aggressive
    skin:
      look: "skeletal elven spear-guard"
      source: "FE-Repo: Battle Animations/Infantry - (Lnc) Soldiers, Halberdiers/[Custom Halb] [U] Skeleberdier (skeleton lance; frost-repal)"
      fallback: palette_swap
  - id: tomb-reaver-reinf
    name: "Tomb Reaver"
    count: 2
    class: fighter
    level: 5
    autolevel: true
    arrives_turn: 3
    inventory:
      - id: rusted-greataxe
        fe_base: iron-axe
    damage_type: slashing       # flavor label only
    ai_pattern: aggressive
    skin:
      look: "risen elven axe-reaver, frost-pale"
      source: palette_swap
  - id: bone-archer-reinf
    name: "Bone Archer"
    count: 2
    class: archer
    level: 5
    autolevel: true
    arrives_turn: 5             # the last wave races the far reliquary reward-sites
    inventory:
      - id: elven-longbow
        fe_base: iron-bow
    damage_type: piercing       # flavor label only
    ai_pattern: aggressive
    skin:
      look: "skeletal elven archer"
      source: "FE-Repo: Battle Animations/Monsters - Basic Types/[Skeleton-Reskin] [U] Wight Sniper by DATonDemand"
  # ── CONVERTIBLE (#171): Sahnar rises HOSTILE at the eruption; Basil's Talk flips him ─
  - id: sahnar
    name: "Sahnar"
    count: 1
    class: myrmidon             # Joshua's exact class/donor — a fast, crit-threat sword duelist
    level: 6
    arrives_turn: 2             # rises when the quake cracks the sarcophagus (the eruption WAKE)
    inventory:
      - id: killing-edge
        fe_base: killing-edge   # Joshua's killing-edge (30 crit) — the fragile-escort tension
    damage_type: slashing       # flavor label only
    ai_pattern: aggressive
    convertible: true           # #171 — the Joshua flip. Hostile crit-Myrmidon until fragile BASIL
                                # chaperones across to Talk him; then a +~0.9 kills/round back-half ally.
    parley:
      by: basil                 # the Natasha-donor Priest, walked up under escort to Talk him
      result: become_allied
      recruits_npc: sahnar      # joins as a playable Myrmidon (npcs/sahnar.yaml)
    skin:                       # the moon-elf mummy; already art-planned (#25 issue thread)
      look: "Sahnar, hooded spectral moon-elf mummy"
      source: "FE-Repo: Battle Animations/Monsters - Basic Types/[Skeleton-Custom] [U] Specter by Alexsplode (native palette)"
    # roster grounded 2026-07-23 (rev.2) to FE8-Ch5 parity: 16 line + 6 eruption reinf + 1 convertible
    # (supersedes the 2026-06-06 boss-chapter 6→9 bump and the 2026-07-22 undead-monster-class rev.1).

# ── Sahnar's sarcophagus (RETIRED the 3-offering fetch-puzzle) ────────────────────
# Superseded 2026-07-15: the recruit is now the Basil→Sahnar chaperone Talk (the Joshua beat,
# above), which "affects how you play the level" the way vanilla Ch5's Natasha→Joshua does — a
# stronger hook than a fetch-quest that competes for turns. The brazier survives only as the
# narrative WAKE beat: the eruption cracks the sarcophagus and Sahnar rises HOSTILE (a silver
# flame flavor moment), then Basil must reach him to flip him. Canon RotFM p.82-83's offerings
# (twig/pinecone/feather; we already dropped the severed hand) become set-dressing, not a gate.

# ── Events (pacing / cutscene placement) ─────────────────────────────────────────
events:
  - trigger: chapter_start
    type: cutscene
    ea_file: events/ch05-opening.ea
    description: >
      The trail ends at the tomb; Ravisin reveals herself and raises the tomb's elven
      dead, naming Auril. The cornered white moose snorts at her side. Battle begins.
  - trigger: eruption_turn        # scripted turn (~2/3/5, the Ch5 wave cadence) — EARTHQUAKE/TILECHANGE
    type: scripted_event
    ea_file: events/ch05-eruption.ea
    description: >
      The tomb floor breaks (Phantom-Ship EARTHQUAKE + sequential TILECHANGE): undead
      REINFORCEMENTS erupt over turns and race the party for the spread reliquary
      reward-sites (the Ch5 village-raid, in undead dress). The same quake cracks the
      sarcophagus — Sahnar the moon-elf mummy rises, HOSTILE, a fast crit-Myrmidon
      guardian (smells faintly of pumpkin spice). He flips only when Basil reaches him.
  - trigger: sahnar_talk          # Basil (Natasha-donor) Talks the risen Sahnar (Joshua-donor)
    type: dialogue
    ea_file: events/ch05-sahnar-recruit.ea
    description: >
      Basil chaperoned safely to Sahnar → he flips to the party, curious about modern
      druids and eager to serve his liberators. The escort-recruit (Ch5's Joshua beat).
  - trigger: chapter_end
    type: cutscene
    ea_file: events/ch05-ending.ea
    description: >
      Ravisin falls; her hold on the moose breaks. The party finds the goodberry
      shrub, repots it, and names it Basil. With Sahnar in tow they turn down the
      coast toward Bremen — where, Ravisin's dying words hint, another of her
      awakened beasts still terrorizes a town.

# ── Economy (FE8 Ch5 parity — the party's power-spike chapter) ────────────────────
# Ch5's real economy (verified from HEAD via the #170 extractor): ~27,760g across 4 village
# gifts + 2 shops — Guiding Ring 10,000 + Dracoshield 8,000 (Def) + Secret Book 8,000 (Skl)
# + Armorslayer 1,260 + Torch 500, plus an Armory + Vendor. We MATCH the magnitude and the
# delivery channels (this is the first chapter at the FE8-Ch5 reward tier — §Reward budget):
economy:
  reward_sites:                  # the "villages" of Ch5, retiled as elven reliquary niches spread to the
                                 # map edges; the eruption's undead race to desecrate them (save-all bonus).
    - gift: booster-def          # ≈ Ch5 Dracoshield (+Def) — first stat-booster in the campaign
    - gift: booster-skl          # ≈ Ch5 Secret Book (+Skl)
    - gift: armorslayer          # ≈ Ch5 Armorslayer (now doubly apt — effective vs the Armor-Knight Frost-Sentinels)
    - gift: torch                # ≈ Ch5 Torch (flavored an elven everburning lamp)
  elven_store:                   # ≈ Ch5's Armory + Vendor — an ancient elven quartermaster's reliquary
    armory: true                 #   the party requisitions (narrative: the tomb kept its stores)
    vendor: true
  save_all_bonus: crest-of-cold-iron   # ≈ Ch5's Guiding Ring (save-all-villages reward). NOTE: the crest
                                 # is ALSO Ravisin's narrative drop (Chekhov's promo relic) — keep the drop;
                                 # the save-all bonus is the mechanical echo of the Guiding-Ring condition.

# ── Post-Chapter ─────────────────────────────────────────────────────────────────
post_chapter:
  gold_reward: 350
  available_shops: [elven-reliquary]   # the in-tomb elven store (Armory + Vendor); see economy block
  units_available_to_recruit:
    - id: sahnar                         # Myrmidon (sword duelist); see npcs/sahnar.yaml
      description: "Sahnar, the reawakened moon-elf mummy (recruited by lighting the brazier). Playable Myrmidon."
    - id: basil                          # Priest — 2nd healer (LOCKED 2026-06-20); see npcs/basil.yaml
      description: >
        Basil, the sentient goodberry shrub — now a PLAYABLE healer (Priest). His
        Goodberries are the cosmetic skin on a vanilla heal staff; he is also the
        in-fiction source of the party's reflavored Vulneraries in the shop.
  unlocks_chapter: ch06-the-maer-monster

design_notes: >
  Our FE8 Ch5 (The Empire's Reach) 1:1 — DefeatBoss, retiling Ch5's open spread field as an
  elven-tomb depression and emulating its two memorable set-pieces (decisions.md 2026-07-15):
    - The Natasha→Joshua escort → BASIL (Natasha-donor Priest) chaperoned to Talk SAHNAR
      (Joshua-donor Myrmidon), who rises as a hostile crit-threat and flips on the Talk. The
      donors were chosen for exactly this; the escort defines how you play the map.
    - The village-raid race → the Phantom-Ship ERUPTION (injected EARTHQUAKE/TILECHANGE)
      spawns undead over turns that raid the spread elven-reliquary reward-sites; securing all
      earns the crest (our Guiding-Ring save-all echo).
  Ravisin is the canonical frost druid and the villain thread tying the white moose (ch04) →
  this tomb → Messie (ch06): she awakened them all. She still DROPS the LOCKED 'crest of cold
  iron' (the promotion Chekhov's gun for the Ch8→9 seam) — its narrative role; the save-all
  bonus is the mechanical echo, not a replacement. Basil joins as our second healer (Priest) —
  the goodberry shrub as a literal heal-staff unit (LOCKED 2026-06-20). No fog: the tension is
  the escort + eruption race, not vision. Map + roster build at the slice; targets checked via
  `make difficulty` (economy #170 + convertible/reinforcement dynamics #171).
  ENEMY IDENTITY (rev.2, 2026-07-23): the force is RISEN ELVEN TOMB-GUARDIANS on vanilla FE8
  infantry classes, skinned undead (the ch01 "vanilla class, our skin" pattern via
  enemy_class_reskins). This keeps ch05 the TOMB (the dead) and OFF ch04's turf (the wolf hunt):
  wolves are CUT, the lone beast is the cornered White Moose (ch04 payoff). Living-class stats
  also mean clear-load parity is free (no glassy monster-class doubling; decisions.md). Per-unit
  `skin:` names the intended FE-Repo asset (sword/bow guardians = real skeleton anims; lance/axe/
  armor = frost palette-swaps) for the build-slice art track. The wolf ANIMS I scouted (Gwyllgi
  repals, Hellhounds) are logged for CH04's beast pack — see issue #24.
