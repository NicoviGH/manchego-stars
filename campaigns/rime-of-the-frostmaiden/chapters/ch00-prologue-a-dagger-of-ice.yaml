# chapters/ch00-prologue-a-dagger-of-ice.yaml
# Combat is vanilla FE (see docs/decisions.md §Combat). damage_type labels are cosmetic.
# COLD OPEN — an NPC-led tutorial prologue mirroring FE8's Prologue (DefeatBoss, 2 units).
# Scramsax (strong Jagen) protects a frail Hlin (our Eirika-analog "lord") as they cut
# Sephek down — but the ending cutscene reveals he escapes (undead, misty-steps away).
# That gut-punch motivates Hlin hiring the party at The Northlook -> ch01 ("Foaming Mugs").
# Source: Rime of the Frostmaiden "Cold Open" (book p.20) + starting quest "Cold-Hearted
#   Killer" (book pp. 21-24, incl. Torrga Icevein's caravan); Scramsax = The Northlook's
#   proprietor (book p.33). Sephek's escape seeds a recurring villain (payoff TBD by story).

id: ch00-prologue-a-dagger-of-ice
title: "A Dagger of Ice"
chapter_number: 0
milestone: M3
cadence: tutorial               # see docs/CHAPTERS.md — DefeatBoss, basics only
fe8_base_map: "FE8 Prologue — The Fall of Renais"   # DefeatBoss tutorial base
is_prologue: true

# ── Narrative ──────────────────────────────────────────────────────────────────
narrative: >
  Cold open, before our seven ever meet. Ten-Towns has gone two years without a
  sunrise — Auril the Frostmaiden's Everlasting Rime. The towns appease her with
  sacrifice lotteries, and lately a killer has been leaving Ten-Towners dead with a
  dagger of ice through the heart. Hlin Trollbane — a dwarf bounty hunter, old and
  frail now — has tracked the suspect, Sephek Kaltro, to a frozen-river crossing on
  the snowbound caravan road. Too worn to take him alone, she's brought Scramsax, the
  veteran sellsword who runs The Northlook, to do the fighting. They corner Sephek and
  cut him down… and his body rimes over and is gone. The Frostmaiden's servant cannot
  be killed by two tired mortals. Shaken, Hlin realizes this is bigger than one bounty
  — Ten-Towns will need more hands than hers.

# ── Map ────────────────────────────────────────────────────────────────────────
map:
  file: maps/ch00-prologue.mar     # compiled winter layout (authored in map-review/editor.html)
  tileset: snowy-bern              # community winter tileset (#41)
  size: "15×10"                    # vanilla Prologue scale
  description: >
    A snowbound mountain pass: a frozen river crossed by a single ice bridge (the one
    chokepoint), framed by impassable peaks, opening to a snow basin in the SE where the
    fight plays out. Built as a winter RESKIN of the vanilla FE8 Prologue layout ("The
    Fall of Renais") — same proven shape, snow-graphiced — then hand-tuned in the browser
    tile editor (map-review/editor.html). See [[manchego-stars-winter-reskin]].

# ── Objective ──────────────────────────────────────────────────────────────────
objective:
  type: defeat_boss              # mirrors FE8 Prologue = DefeatBoss
  description: "Defeat Sephek Kaltro"

win_condition: boss_defeated     # you WIN the fight on the field…
lose_condition: hlin_defeated    # Hlin is our "lord": the frail must-survive lead (see Difficulty)
# NOTE 1: defeating Sephek triggers the ending cutscene, which reveals he ESCAPES (undead,
#   misty-steps away). Mechanically a clean DefeatBoss win; narratively he survives to become
#   a recurring threat. Standard FE "beat-the-boss-then-he-flees-in-cutscene" beat.
# NOTE 2: "lord dies = game over" is per-character — a battle-quote entry flagged
#   EVFLAG_GAMEOVER (src/data_battlequotes.c; vanilla's Eirika/Duessel mechanism) which the
#   CauseGameOverIfLordDies watcher in _Misc fires on. Ch0: add that entry for HLIN's slot
#   (+ a death quote) -> her death = game over. No class-lord attribute needed. From Ch1 the
#   player CHOOSES their lord; that just applies the same flag to the chosen unit dynamically
#   (engine feature #42).

# ── Difficulty ─────────────────────────────────────────────────────────────────
difficulty_note: >
  The basics tutorial — move, attack, end-turn, switching units — FE8-Prologue style,
  and tuned to vanilla's difficulty by mirroring its strong-protects-weak shape:
  Scramsax is the strong self-sufficient veteran (our "Jeigan" = Seth) who does the
  killing; Hlin is the FRAIL must-survive lead (our Eirika — old, low stats; can chip
  but dies if exposed). Stage them like vanilla: Scramsax forward by the enemies, Hlin
  kept back. Sephek is a sturdy boss beatable with basic attacks; his Cold Regeneration
  and cold-immunity are FLAVOR ONLY here (shown in dialogue), NOT a mechanical gate.
  ~4-6 turns, comfortable hit rates. The tension is "don't let frail Hlin get swarmed."

# ── Player Units ────────────────────────────────────────────────────────────────
player_units:
  # Hlin = the FRAIL must-survive lead (our "lord" / Eirika-analog). Book p.22: old & frail.
  - id: hlin-trollbane
    name: "Hlin Trollbane"
    fe_name: "Hlin"              # FE8 name buffer is 12 chars; "Hlin Trollbane" (14) overflows
    class: fighter               # old dwarf bounty hunter, handaxe, past her prime — UNPROMOTED & frail (Eirika-analog lead; only Scramsax the "Jeigan" is a Seth-justified prepromote). Female Fighter map sprite (community repo) so she reads as a woman, distinct from the male Fighter guards
    is_npc: true                 # not one of the 7 PCs; a cold-open guest unit
    required: true               # lose if she dies (our lord-death condition)
    level: 3                     # low / frail — the weak lead (cf. Eirika Lv1)
    position: [8, 5]             # I6 — central & back (Eirika's vanilla spot)
    inventory:
      - id: hand-axe             # weak, throwable (range 1-2) so she can chip safely
        damage_type: slashing    # cosmetic flavor label
      - id: vulnerary
  # Scramsax = the STRONG Jagen (our Seth-analog) who protects Hlin and does the killing.
  - id: scramsax
    name: "Scramsax"
    class: hero                  # retired sellsword, a real veteran (book p.33); promoted, strong
    is_npc: true                 # The Northlook's proprietor; the cold-open's "Jeigan"
    required: true
    level: 1                     # promoted prepromote — high stats despite low internal level (cf. Seth)
    position: [13, 9]            # N10 — forward, beside the enemies (Seth's vanilla spot)
    inventory:
      - id: steel-sword
        damage_type: slashing    # cosmetic flavor label
      - id: hand-axe             # a throwing option for reach/variety
        damage_type: slashing

# ── Enemy Units (vanilla FE) ─────────────────────────────────────────────────────
enemy_units:
  - id: sephek-kaltro
    name: "Sephek Kaltro"
    fe_name: "Sephek"           # FE8 name buffer is 12 chars; "Sephek Kaltro" (13) overflows
    is_boss: true
    count: 1
    position: [14, 8]            # O9 — cornered against the SE peaks (O'Neill's vanilla spot)
    class: myrmidon              # lithe ice-swordsman (book: Ice Longsword)
    level: 5
    inventory:
      - id: ice-longsword
        damage_type: cold        # cosmetic flavor label
    flavor_traits:               # narrative only — NOT mechanical in the prologue
      - "Kiss of the Frostmaiden: the cold does not touch him (undead servant of Auril)"
      - "Cold regeneration, fire vulnerability — the Frostmaiden's chill knits his wounds; flame unmakes them (echoed later by the Ch8 ice trolls)"
      - "True nature (book p.23): a drowned mariner possessed by a frost-druid spirit of Auril; kill the body and the winter spirit dies with it — but a single defeat only scatters him"
      - "Misty step: vanishes in a breath of frost — the diegetic reason he escapes the prologue despite being 'defeated'"
    ai_pattern: hold_position
    # Defeated on the field, but he does NOT die here — see the chapter_end cutscene (escape).
    death_quote: "You cut the ice… not the cold that made it…"
  - id: caravan-guard
    name: "Torg's Caravan Guard"
    count: 2                     # trivial practice mooks (Torrga Icevein's hirelings)
    positions: [[14, 7], [13, 7]]  # O8 / N8 — screening the boss (vanilla bandits' spots)
    class: fighter
    level: 2
    inventory:
      - id: iron-axe
        damage_type: slashing
    ai_pattern: aggressive

# ── Events (pacing / cutscene placement) ─────────────────────────────────────────
events:
  - trigger: chapter_start
    type: cutscene
    ea_file: events/ch00-cold-open.ea
    description: >
      The cold-open narration (paraphrased from the book's Cold Open boxed text):
      the sunless Rime, the sacrifices, the killings by a dagger of ice. Hlin and
      Scramsax corner Sephek mid-stalk — he's been killing those who cheated the
      sacrifice lottery, "doing the Frostmaiden's work." They note the cold doesn't
      touch him: no coat, no breath fog. Fight begins.
  - trigger: boss_low_hp
    type: dialogue
    ea_file: events/ch00-sephek-cold.ea
    description: "Sephek bleeds frost, unbothered by the cold — a first glimpse of Auril's reach."
  - trigger: chapter_end
    type: cutscene
    ea_file: events/ch00-ending.ea
    description: >
      They cut Sephek down — but his body rimes over, fractures like an icicle, and
      in a breath of frost he is simply GONE (misty step). They won the fight and it
      wasn't enough. Hlin, wounded and shaken, realizes the killings are a symptom of
      something far larger than one murderer — Auril's grip is tightening, and Ten-Towns
      will need more hands than two tired veterans'. Hard cut to The Northlook, Bryn
      Shander — and our seven, about to be hired. (Leads into ch01.) Sephek lives: a
      recurring threat whose reckoning is left for the story to place (the book's Torrga
      Icevein caravan is the natural payoff — held in reserve, not yet committed).

# ── Post-Chapter ─────────────────────────────────────────────────────────────────
post_chapter:
  gold_reward: 0                 # standalone cold-open; rewards begin in ch01
  unlocks_chapter: ch01-the-iron-trail
  hooks:
    - "Sephek escaped — a recurring threat. His reckoning is left for the story to place; the book's Torrga Icevein dogsled caravan (book p.24) is the natural payoff, held in reserve."
    - "Hlin (with Scramsax) hiring the party at The Northlook IS the diegetic reason the seven assemble for ch01 — the prologue hands the campaign to the PCs."
    - "Scramsax recurs as The Northlook's proprietor (Bryn Shander home base)."

# ── Design Notes ──────────────────────────────────────────────────────────────────
design_notes: >
  NPC cold-open (mirrors FE8's two-unit Prologue Seth + Eirika → Scramsax + Hlin). Its
  jobs: (1) teach the basics, tuned to vanilla difficulty via the strong-protects-weak
  shape — Scramsax the strong Jagen does the killing, frail Hlin is the must-survive lead;
  (2) establish the world (Rime, sacrifices, the dagger-of-ice killings) by SHOWING it;
  (3) make the player's first fight be against Auril's servant, seeding the true villain
  before the heroes arrive; (4) the "win the boss fight but he escapes in the cutscene"
  beat plants Sephek as a recurring villain AND gives Hlin her reason to hire the party.
  Sephek's cold/fire motif is pure narrative colour, echoed later by the Ch8 ice trolls.
  From Ch1 the must-survive lead becomes PLAYER-CHOSEN (their D&D character). Keep it tiny
  — this is the front porch, not a room.
