# chapters/ch00-prologue-a-dagger-of-ice.yaml
# Combat is vanilla FE (see docs/decisions.md §Combat). damage_type labels are cosmetic.
# COLD OPEN — an NPC-led tutorial prologue mirroring FE8's Prologue (DefeatBoss, 2 units).
# Two named book veterans (Hlin + Scramsax) cut Sephek down on the field, but the ending
# cutscene reveals he escapes (undead — misty-steps away). That gut-punch motivates Hlin
# hiring the party at The Northlook, leading into ch01 ("Foaming Mugs" / The Iron Trail).
# Source: Rime of the Frostmaiden "Cold Open" (book p.20) + starting quest "Cold-Hearted
#   Killer" (book pp. 21-24, incl. Torrga Icevein's caravan); Scramsax = The Northlook's
#   proprietor (book p.33). Sephek's escape seeds a recurring villain (payoff TBD by story).

id: ch00-prologue-a-dagger-of-ice
title: "A Dagger of Ice"
chapter_number: 0
milestone: M3
cadence: tutorial               # see docs/CHAPTERS.md — DefeatBoss, basics only
fe8_base_map: "FE8 Prologue — The Fall of Renais"   # DefeatBoss tutorial base
is_prologue: true

# ── Narrative ──────────────────────────────────────────────────────────────────
narrative: >
  Cold open, before our seven ever meet. Ten-Towns has gone two years without a
  sunrise — Auril the Frostmaiden's Everlasting Rime. The towns appease her with
  sacrifice lotteries, and lately a killer has been leaving Ten-Towners dead with a
  dagger of ice through the heart. Hlin Trollbane, a retired dwarf bounty hunter, has
  tracked the suspect — Sephek Kaltro — to a snowbound Bryn Shander street at night,
  and ropes in Scramsax, the old sellsword who runs The Northlook, to help her end
  it. They corner him and cut him down… and his body rimes over and is gone. The
  Frostmaiden's servant cannot be killed by two tired veterans. Shaken, Hlin realizes
  this is bigger than one bounty — Ten-Towns will need more hands than hers.

# ── Map ────────────────────────────────────────────────────────────────────────
map:
  file: maps/ch00-prologue.tmx
  tileset: town-night-snow       # tiny Bryn Shander street, night palette
  size: "14×10"                  # deliberately small — finalize in Tiled
  description: >
    A short, enclosed night street: shuttered houses, snowdrifts, a few barrels for
    cover, lanterns guttering in the wind (the book's "bright lanterns over narrow
    streets"). Hlin and Scramsax start together at one end; Sephek waits near the far
    end (mid-stalk). Small and legible — the player should never feel lost. (Map look
    still in collaborative design — see map-review/.)

# ── Objective ──────────────────────────────────────────────────────────────────
objective:
  type: defeat_boss              # mirrors FE8 Prologue = DefeatBoss
  description: "Defeat Sephek Kaltro"

win_condition: boss_defeated     # you WIN the fight on the field…
lose_condition: all_player_units_defeated   # gentle tutorial; a loss just retries
# NOTE: defeating Sephek triggers the ending cutscene, which reveals he ESCAPES (undead,
# misty-steps away). Mechanically a clean DefeatBoss win; narratively he survives to
# become a recurring threat. Standard FE "beat-the-boss-then-he-flees-in-cutscene" beat.

# ── Difficulty ─────────────────────────────────────────────────────────────────
difficulty_note: >
  The basics tutorial — teaches move, attack, end-turn, and switching between units
  (two allies), FE8-Prologue style (mirrors Seth + Eirika). Hlin and Scramsax are both
  strong self-sufficient veterans (our two "Jeigans") — the player can't really lose.
  Give them 1-2 trivial practice targets before the boss. Sephek is a sturdy boss but
  beatable with basic attacks — his Cold Regeneration and cold-immunity are FLAVOR ONLY
  here (shown in dialogue), NOT a mechanical gate. ~4-6 turns. Comfortable hit rates.

# ── Player Units ────────────────────────────────────────────────────────────────
player_units:
  - id: hlin-trollbane
    name: "Hlin Trollbane"
    class: warrior               # unarmored veteran with a battleaxe/handaxe (book: "veteran")
    is_npc: true                 # not one of the 7 PCs; a cold-open guest unit
    required: true
    inventory:
      - id: steel-axe
        damage_type: slashing    # cosmetic flavor label
      - id: vulnerary
  - id: scramsax
    name: "Scramsax"
    class: hero                  # retired sellsword, "still knows how to handle a blade" (book p.33: veteran)
    is_npc: true                 # The Northlook's proprietor; second cold-open guest
    required: true
    inventory:
      - id: steel-sword
        damage_type: slashing    # cosmetic flavor label; sword pairs vs Hlin's axe (teaches variety)

# ── Enemy Units (vanilla FE) ─────────────────────────────────────────────────────
enemy_units:
  - id: sephek-kaltro
    name: "Sephek Kaltro"
    is_boss: true
    count: 1
    position: tbd                # far end of the street
    class: myrmidon              # lithe ice-swordsman (book: Ice Longsword)
    level: 5
    inventory:
      - id: ice-longsword
        damage_type: cold        # cosmetic flavor label
    flavor_traits:               # narrative only — NOT mechanical in the prologue
      - "Kiss of the Frostmaiden: the cold does not touch him (undead servant of Auril)"
      - "Cold regeneration, fire vulnerability — the Frostmaiden's chill knits his wounds; flame unmakes them (echoed later by the Ch8 ice trolls)"
      - "True nature (book p.23): a drowned mariner possessed by a frost-druid spirit of Auril; kill the body and the winter spirit dies with it — but a single defeat only scatters him"
      - "Misty step: vanishes in a breath of frost — the diegetic reason he escapes the prologue despite being 'defeated'"
    ai_pattern: hold_position
    # Defeated on the field, but he does NOT die here — see the chapter_end cutscene (escape).
    death_quote: "You cut the ice… not the cold that made it…"
  - id: caravan-guard
    name: "Torg's Caravan Guard"
    count: 2                     # trivial practice mooks (Torrga Icevein's hirelings)
    class: fighter
    level: 2
    inventory:
      - id: iron-axe
        damage_type: slashing
    ai_pattern: aggressive

# ── Events (pacing / cutscene placement) ─────────────────────────────────────────
events:
  - trigger: chapter_start
    type: cutscene
    ea_file: events/ch00-cold-open.ea
    description: >
      The cold-open narration (paraphrased from the book's Cold Open boxed text):
      the sunless Rime, the sacrifices, the killings by a dagger of ice. Hlin and
      Scramsax corner Sephek mid-stalk — he's been killing those who cheated the
      sacrifice lottery, "doing the Frostmaiden's work." They note the cold doesn't
      touch him: no coat, no breath fog. Fight begins.
  - trigger: boss_low_hp
    type: dialogue
    ea_file: events/ch00-sephek-cold.ea
    description: "Sephek bleeds frost, unbothered by the cold — a first glimpse of Auril's reach."
  - trigger: chapter_end
    type: cutscene
    ea_file: events/ch00-ending.ea
    description: >
      They cut Sephek down — but his body rimes over, fractures like an icicle, and
      in a breath of frost he is simply GONE (misty step). They won the fight and it
      wasn't enough. Hlin, wounded and shaken, realizes the killings are a symptom of
      something far larger than one murderer — Auril's grip is tightening, and Ten-Towns
      will need more hands than two tired veterans'. Hard cut to The Northlook, Bryn
      Shander — and our seven, about to be hired. (Leads into ch01.) Sephek lives: a
      recurring threat whose reckoning is left for the story to place (the book's Torrga
      Icevein caravan is the natural payoff — held in reserve, not yet committed).

# ── Post-Chapter ─────────────────────────────────────────────────────────────────
post_chapter:
  gold_reward: 0                 # standalone cold-open; rewards begin in ch01
  unlocks_chapter: ch01-the-iron-trail
  hooks:
    - "Sephek escaped — a recurring threat. His reckoning is left for the story to place; the book's Torrga Icevein dogsled caravan (book p.24) is the natural payoff, held in reserve."
    - "Hlin (with Scramsax) hiring the party at The Northlook IS the diegetic reason the seven assemble for ch01 — the prologue hands the campaign to the PCs."
    - "Scramsax recurs as The Northlook's proprietor (Bryn Shander home base)."

# ── Design Notes ──────────────────────────────────────────────────────────────────
design_notes: >
  NPC cold-open (mirrors FE8's two-unit Prologue: Seth + Eirika → Hlin + Scramsax). Its
  jobs: (1) teach the basics with two strong veterans (move/attack/end-turn + switching
  units); (2) establish the world (Rime, sacrifices, the dagger-of-ice killings) by SHOWING
  it; (3) make the player's first fight be against Auril's servant, seeding the true villain
  before the heroes arrive; (4) the "win the boss fight but he escapes in the cutscene" beat
  plants Sephek as a recurring villain AND gives Hlin her reason to hire the party. Sephek's
  cold/fire motif is pure narrative colour, echoed later by the Ch8 ice trolls. Keep it tiny
  — this is the front porch, not a room.
