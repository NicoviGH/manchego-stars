lore_crawl:
  status: locked            # text final; awaiting #43 wiring
  cards:
    - >
      Far north, beyond the Spine of the World, lies Icewind Dale —
      a frozen land at the edge of the known realms.
    - >
      This land has not felt the warmth of the sun in over two years.
      Not even in what should be the height of summer.
    - >
      In this frozen tundra, darkness and bitter cold reign
      as king and queen.
    - >
      Most dale residents blame Auril the Frostmaiden,
      the god of winter's wrath.
    - >
      The shimmering aurora that weaves across the sky each night
      is said to be her doing — a potent spell that keeps the sun at bay.
    - >
      Each town has resolved to appease the Frostmaiden with sacrifices
      of one kind or another. No respite from winter's fury seems forthcoming.
    - >
      For adventurers, Ten-Towns is a place to test one's mettle — and,
      in the spirit of heroes who have come before, leave one's mark
      on this frigid, blighted land.

