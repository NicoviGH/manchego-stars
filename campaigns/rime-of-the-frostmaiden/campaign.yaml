# campaign.yaml — Manchego Stars: Rime of the Frostmaiden
# Read by tools/build-campaign.ts at build time.
# See docs/PRD.md §6.4 for the engine/content contract.

title: "Manchego Stars: Rime of the Frostmaiden"
id: rime-of-the-frostmaiden

chapters:
  count: 7
  list:
    - ch01-the-iron-trail
    - ch02-cold-welcome
    - ch03-the-termalaine-mine
    - ch04-the-elven-tomb
    - ch05-the-maer-monster
    - ch06-blood-in-bremen
    - ch07-the-eastway-ambush

progression:
  # FE level all PCs begin at (equivalent to D&D level 1–3)
  starting_fe_level: 1
  # FE level expected at end of chapter 7 (equivalent to D&D level 5–7)
  target_end_level: 12
  # All PCs promote at this FE level (not required within MVP scope)
  promotion_threshold: 20
  # Level cap for this campaign (unpromoted)
  level_cap_unpromoted: 20
  # Promoted level cap
  level_cap_promoted: 20

# Starting equipment GP (between-chapter shop budget estimate)
starting_gold: 500

permadeath:
  # "classic" or "casual" — player chooses via FE8's built-in toggle
  default_mode: classic
  casual_flavor: "retreated to the sled / carried to safety by Baxby"

# World map: Ten-Towns locations (FE8's world map system, sequential unlock)
world_map:
  - id: bryn-shander
    name: "Bryn Shander"
    unlocks_at_start: true
    shop: general   # weapons, basic armor, standard consumables
  - id: targos
    name: "Targos"
    unlocks_after: ch01
    shop: armory    # better weapons, cold-weather gear
  - id: termalaine
    name: "Termalaine"
    unlocks_after: ch02
    shop: specialty # gems, mining equipment, unusual items
  - id: lonelywood
    name: "Lonelywood"
    unlocks_after: ch03
    shop: vendor    # potions, basic consumables
  - id: bremen
    name: "Bremen"
    unlocks_after: ch06
    shop: harbor    # water-themed items, potions — run by Messie after ch06
  - id: easthaven
    name: "Easthaven"
    unlocks_after: null  # never a friendly visit in MVP

# Enemy class reskins (#21): clone a vanilla class into an otherwise-unused class slot
# with a custom MAP sprite only (stats + battle anim ride along unchanged), so enemies
# of that class show a themed overworld sprite without touching the shared vanilla class.
# Reversible + reusable; build wiring = build_campaign.inject_enemy_class_reskins. Each
# `sprite` resolves map_sprites/<sprite>.png (idle) + <sprite>_mu.png (walk); reskins
# sharing a sprite share one sheet. The slots are vanilla's unused ballista-empty classes
# (unreferenced by this campaign). `frame` (optional) overrides the idle frame size when
# the sprite isn't the base class's size class -- the Fire Imp is a tall 16x32 sprite on
# a 16x16-combat soldier/fighter, which the engine draws via the wait-row size flag.
# Ch1 grunts (the "Foaming Mugs goblins") use these; the chief stays the vanilla Knight.
# The Fire Imp {Alexsplode, FE-Repo} reads as a red imp under the enemy faction palette
# (its body sits on the standard faction-colour ramp -> fully shaded red, glowing eyes).
enemy_class_reskins:
  - id: goblin-soldier
    base: CLASS_SOLDIER
    slot: CLASS_BLST_REGULAR_EMPTY
    sprite: fire-imp
    frame: 16x32
  - id: goblin-fighter
    base: CLASS_FIGHTER
    slot: CLASS_BLST_LONG_EMPTY
    sprite: fire-imp
    frame: 16x32

# Item name overrides: rename a vanilla item's in-game text globally (build wiring =
# build_campaign.inject_item_names, which rewrites gItemData[].nameTextId's message).
# FE8 stores ONE name per item id, so every copy reads the same -- the cast's per-unit
# inventory `name:` fields (Healing Potion / Blood Vial / ...) are documentation only and
# can't differ in-engine. The reflavored Vulnerary is unified party-wide as "Goodberry"
# (Marty's druidic ration; everyone shares one consumable name).
item_names:
  ITEM_VULNERARY: "Goodberry"

# Item icon overrides: swap a vanilla item's 16x16 icon for a campaign asset under
# item_icons/<name>.4bpp (build wiring = build_campaign.inject_item_icons, which resolves
# the item's iconId -> its incbin in data/data_item_icon.s and overwrites that .4bpp).
# One icon per item id, so every Goodberry shows the berry. The asset is authored from
# FE8's shared item-icon palette via tools/item_icon_tool.py (blueberry_grid, design L2).
item_icons:
  ITEM_VULNERARY: goodberry

# D&D content sources (frozen snapshots committed at data/)
data_sources:
  srd: data/srd/srd-snapshot.json
  open5e: data/srd/open5e-snapshot.json
  homebrew: data/homebrew/

# Chapter-title banner theme — option A "glacial blue" (picked 2026-06-09; see
# docs/decisions.md "Chapter title cards are IMAGES"). The six colors replace
# vanilla's letter greens 1:1 (lightest fill -> darkest outline); every OTHER
# green in the title palettes (banner plaque leaf ramp, dim shimmer variant) is
# hue-mapped into the same ice family by build_campaign.py:inject_title_theme.
title_theme:
  letter_colors: ["#F0FAFF", "#BEE4FA", "#8CC4EC", "#5494D0", "#285CA0", "#0C2048"]
