# npcs/trex.yaml — Trex, the winged kobold (ch03 recruit)
# Class roster: docs/CLASSES.md (generated). Rationale: docs/decisions.md §Class Mapping.
# Combat is vanilla FE (docs/decisions.md §Combat). damage_type labels are cosmetic.
#
# STATUS: design record. Class + role LOCKED (Nicolas, 2026-06-20); bases/growths below are
# vanilla Thief CLASS data (data_classes.c [CLASS_THIEF - 1], verbatim) -- the same
# class-generic-data-in-YAML / personal-donor-growths-at-build-time split every other cast
# member uses (STAT_DONOR in build_campaign.py pulls Colm's actual personal growths at
# injection time; this file is the pre-wiring design record, not the final in-ROM numbers).
# NOT yet wired into build_campaign (inert until the recruit wiring lands: free slot + recruit
# logic + portrait + map sprite + a STAT_DONOR entry).

id: trex
name: Trex

# D&D flavor (from the DM notes): the kobold leader in the Termalaine gem mine — "a
# slightly smarter kobold who fashioned cosmetic wings for himself." Joins post-chapter.
dnd:
  class: Kobold (winged)
  race: Kobold

# ── Role (LOCKED 2026-06-20) ─────────────────────────────────────────────────
# THIEF — fills the army's utility hole (steal / chests / doors); the campaign gives us
# no other thief. Cleverness fits; Assassin promotion also adds a sword. The "cosmetic
# wings" are exactly that — cosmetic art, NOT a flier (Thief is a foot unit).
fe_stats:
  class: Thief
  level: 1
  # Vanilla FE8 Thief stats, verbatim from data_classes.c [CLASS_THIEF - 1].
  HP: 16
  STR: 3
  SKL: 1
  SPD: 9
  DEF: 2
  RES: 0
  LCK: 0                    # ClassData has no base luck
  MOV: 6                    # Thief baseMov
  CON: 6
donor:
  character: Colm           # vanilla Thief — bases/growths reference (data_classes.c)
  why: the game's starter Thief = full growth runway for a fresh utility unit

# ── Growth Rates (% per level) — vanilla Thief growths from data_classes.c ────
growth_rates:
  HP: 50
  STR: 5
  SKL: 45
  SPD: 40
  DEF: 5
  RES: 20
  LCK: 40

promotion:
  branch: [Rogue, Assassin]  # vanilla FE8 Thief branch (classchg-data.c [CLASS_THIEF])
  default: Rogue

recruited_via: "story — joins after the Termalaine mine (Ch3)"
recruit:
  chapter: ch03-the-termalaine-mine
  via: story

# ── Art (reskin lever: stock chassis, custom skin) ───────────────────────────
art:
  render:                     # exact reproduction of the shipped bust (tools/ref_to_bust.py)
    ref: "References/PCs/TrexBust.png"   # winged-kobold bust ref (supplied by Nicolas, 2026-07-07)
    crop: [54, 95, 894, 795]       # ref pixels, ~1.2 aspect — head + shoulders (framing A, Nicolas's pick 2026-07-07)
    zoom: 0.85                     # top headroom so the swept-back horns clear FE8's dead corners (0 px clipped)
    flip_h: false                  # ref already faces FE8-canonical screen-left
    sharpen: 0                     # off (clean ref + pngquant is already crisp)
    hand_pass: null
  approach: custom            # winged kobold over the Thief chassis (art-only reskin; mechanics stay vanilla Thief)
  fidelity: faithful          # keep the kobold/dino anatomy — do NOT humanize
  must_keep:                  # the tells that make the crop read as "Trex"
    - red scaled dino/kobold snout (elongated, toothy underjaw)
    - swept-back horns + spiny frill
    - brown leather goggle/eye-piece over one eye, gold slit eye
    - brown coat + cream underscales at the collar
  face: per-concept           # head as drawn (red kobold), not a human face
  expression: wry-confident   # the sly-thief energy that carries the steal/chests lesson
  palette_plan: >             # rough 16-color budget (incl. index-0 transparent)
    reds ×3 (scales) + dark maroon shade, cream/tan underbelly ×2, browns ×3
    (coat / goggle / straps), gold eye, grey buckles, black outline. Fits 16.
  map_sprite:                 # overworld idle/walk base (#38 art loop) — Thief chassis, cosmetic reskin
    base: Thief               # geometry token only; Trex IS a Thief mechanically
    footprint: 16x16
    weapon: stock             # the Thief's dagger — vanilla weapon economy
    adds:                     # reskin edits layered on the base (beyond recolour)
      - red kobold recolour into the shared cast palette
      - swept-back horns on the head
      - small cosmetic wings (NOT a flier — Thief is a foot unit; the "winged kobold" is art only)
