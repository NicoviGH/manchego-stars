# npcs/pepperjack.yaml — Pepperjack, a BALLISTA construct built by Prof. R.B. Geenius.
# Lean unit definition (mechanics only). Narrative/flavor lives in
# ../lore/pepperjack-and-brie.md. Pepperjack is NOT an RBG ability/summon — he joins the
# army as a recruit. ROLE LOCKED (Nicolas, 2026-06-20): a BALLISTA / siege engine — the
# cannon-golem art (barrel snout, fuse) was always artillery; RBG the Artillerist builds
# his ordnance. Debuts when vanilla introduces ballistae (route-split / mid-game era).

id: pepperjack
name: Pepperjack
portrait_ref: portraits/pepperjack.png            # shipped 96×80 bust (own portrait, grey)
portrait_source: "References/PCs/Pixel Pepperjack.png"   # own single-bust ref (split from the combined concept)

# ── Custom Art Brief (decided 2026-06-01 portrait walkthrough) ───────────────────
# ALL parts custom indexed-palette art. Follow the concept ref faithfully.
# Pepperjack & Brie are a COUPLE (Brie built by RBG for Pepperjack, Adam/Eve framing) — NOT
# twins/siblings. Mirror designs in opposing palettes: Pepperjack = grey+red, Brie = pink+cyan.
art:
  render:                     # exact reproduction of the shipped bust (tools/ref_to_bust.py)
    flip_h: true               # mirror to FE8-canonical screen-left facing
    ref: "References/PCs/Pixel Pepperjack.png"
    crop: [20, 60, 2130, 1818]     # ref pixels, ~1.2 aspect — whole-cannon framing
    zoom: 0.72                     # headroom so the fuse + barrel bore mostly clear FE8's dead corners (30 px residual)
    # No hand pass: pngquant renders the red star, orange eye + chili-pepper mustache natively.
  approach: custom
  fidelity: faithful
  build_when: with-batch      # pixel alongside the 7 PCs (visually simple, fun), though class/recruit is post-MVP
  must_keep:                  # tells that make the bust read as "Pepperjack"
    - gunmetal-grey cannon-golem body + barrel snout
    - one angry ORANGE eye
    - red star decal
    - tan rope fuse curling off the top
    - wide toothy grin with a RED CHILI-PEPPER mustache
  composition: three-quarter-profile   # as drawn — round body + eye + grin + fuse, barrel angled to the side
  face: visible               # eye blinks, toothy grin moves for talk
  expression: aggressive-grin # the brash, scrappy one of the pair
  palette_plan: >             # rough 16-color budget (incl. index-0 transparent)
    gunmetal greys ×4, barrel-bore black, orange eye + white, red (star + chili mustache),
    tan fuse, boot-grey, black outline. Mirror of Brie's palette.

# How he enters the army (story recruit; not a gameplay summon). Debut keyed to vanilla's
# ballista era — route-split / mid-game (~our Ch9, Act II opening). Exact FE8 ballista-debut
# chapter is [FE8]-tier (ballistae are unit-placed objects in baserom blobs, not decodable
# from the map terrain — to pin via in-emulator check or unit-blob decode; see roadmap).
recruited_via: "story — Prof. R.B. Geenius builds Pepperjack (~Ch9, vanilla ballista era)"
built_by: prof-rbg
paired_with: brie               # dating Brie; deployed as a pair, narratively
recruit:
  chapter: ch09-revels-end      # PROVISIONAL — pin to the exact vanilla ballista-debut chapter
  via: story

# ── FE role: BALLISTA (siege) — LOCKED 2026-06-20 ──────────────────────────────
# IMPLEMENTATION CAVEAT: FE8 has no playable ballista UNIT class in data_classes.c —
# ballistae are map-placed siege objects a unit mans (US_IN_BALLISTA on ballista terrain).
# So "Pepperjack is a ballista" needs a design call at wiring: either a deployable siege
# piece RBG sets up per map, or a small engine extension (a Ballistician-style mobile unit,
# which vanilla FE8 lacks). Recorded as the role; mechanics authored post-MVP.
fe_stats:
  class: null                   # no stock FE8 ballista unit class — see caveat above
  role: ballista                # siege / long-range artillery
  promoted_class: null
  level: 1

# inventory (concept): Ballista / Iron Ballista / Killer Ballista (ITEM_BALLISTA_*), tier
# scaling with the era. Authored at wiring.
