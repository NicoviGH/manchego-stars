# npcs/pinky.yaml — Pinky, Prof. R.B. Geenius's homunculus 'son'; the army's flier.
# Lean unit definition (mechanics only). Narrative/flavor lives in ../lore/pinky.md.
# Pinky is NOT an RBG ability/summon — joins the army as an ordinary FE8 recruit and is a stock
# vanilla FE8 class (Pegasus Knight). The "homunculus" identity is flavor only, not a mechanic.

id: pinky
name: Pinky
portrait_ref: portraits/pinky.png        # 96×80 bust shipped; GBA tile-sheet wiring pending (issue #23)

# How Pinky enters the army (story recruit; not a gameplay summon).
recruited_via: "available from Chapter 1"
built_by: prof-rbg                        # RBG's homunculus 'son'

# ── Portrait art brief (drives tools/ref_to_bust.py) ──
art:
  render:                     # exact reproduction of the shipped bust (tools/ref_to_bust.py)
    flip_h: true               # bust faces right; flip to FE8's canonical screen-left facing
    ref: "References/PCs/Pinky Art.png"
    crop: [380, 100, 1675, 1179]   # ref pixels, ~1.2 aspect
    zoom: 0.65                     # full-body pose; headroom so both tall ears clear FE8's dead corners (0 px clipped)
    # No hand pass: pngquant renders the blue eye + ruby nose natively (they no longer need rescuing).
  approach: custom
  fidelity: faithful
  must_keep:                  # tells that make the bust read as "Pinky"
    - big magenta-pink opossum ears (both fully in frame)
    - large bright-blue eyes (near eye + small far eye)
    - faceted red ruby nose (the signature accent — must pop)
    - grey fur with silver armour segments + decorative swirl etchings
  face: visible               # blue eyes blink, mouth moves for talk
  arms: trail                 # pink paws / silver-collared arm trail off the bottom corners
  effects: none               # homunculus identity is flavor; no magic aura in the bust
  expression: bright-eyed     # wide-eyed, alert little flier
  palette_plan: >             # rough 16-color budget (incl. index-0 transparent)
    greys ×4 (fur + armour shading), magenta/pink ×2 (ears/hands, lightened so the
    nose stands out), ruby reds ×2, true blues ×2 (irises), white highlight, darks ×3.
    pngquant holds the blue eye + ruby nose at the 16-colour ceiling natively.
  map_sprite:                 # overworld idle/walk base (issue #38 art loop; Nicolas's pick 2026-06-05)
    base: Gorgonegg           # geometry token only (16x16, 3-frame). ART = FE-Repo "Rat" (Squaresoft, RandomWizard) reskinned to the clockwork rat; see CREDITS.md. Flight is the Pegasus class (fe_stats), independent of this sprite.
    footprint: 16x16          # party-sized rat
    weapon: none              # mechanically a lance Pegasus Knight; not shown on the little automaton
    adds:
      - recolour to grey clockwork metal
      - the two wings -> big pink rat ears (they spread into an ear shape in the hover frames)
      - the dragon tail -> his long curly pink tail
      - pink nose/hands, mismatched eyes (one blue iris, one mechanical)

# ── FE Starting Stats (level 1) ────────────────────────────────────────────────
# Vanilla FE8 Pegasus Knight stats, verbatim from fireemblem8u/src/data_classes.c
# [CLASS_PEGASUS_KNIGHT - 1]. No custom tuning. FE has a single Pow stat. LCK base = 0
# (ClassData defines no base luck — a character-layer stat) until personal luck is assigned.
# This is the army's flier role (lance flier; promotes to Falcon Knight).
fe_stats:
  class: "Pegasus Knight"
  level: 1
  HP: 14
  STR: 4                                  # FE Pow (Pegasus Knight basePow)
  SKL: 5
  SPD: 5
  DEF: 3
  RES: 2
  LCK: 0                                  # ClassData has no base luck
  MOV: 7                                  # Pegasus Knight baseMov (flier)
  CON: 5

# ── Promotion (FE8 branched — the PLAYER chooses at the Master Seal) ──────────────
promotion:
  branch: ["Falcon Knight", "Wyvern Knight"]   # vanilla Pegasus Knight branch (classchg-data.c)
  default: "Falcon Knight"                      # thematic lean; player may pick either.

# ── Growth Rates (% per level) — vanilla Pegasus Knight growths from data_classes.c ──
growth_rates:
  HP: 65
  STR: 35
  SKL: 40
  SPD: 40
  DEF: 12
  RES: 35
  LCK: 35

# ── Inventory (Chapter 1 starting equipment) ───────────────────────────────────
# Stock FE weapons — stats inherited from the vanilla item in `fe_base` (no custom Might).
inventory:
  - id: iron-lance
    name: "Iron Lance"
    fe_base: iron-lance                   # vanilla FE8 stats (Mt/Hit/Crit/Wt/uses)
    fe_weapon_type: Lance                 # FE Pegasus Knight weapon class (baseRanks ITYPE_LANCE, D)
  - id: vulnerary
    name: "Healing Potion"                # reflavored Vulnerary (consumable)
    fe_base: vulnerary
    uses: 3

# ── Endgame beat (scripted story event, not a gameplay mechanic) ───────────────
# At the campaign finale, RBG spends a Wish charge from Luck E. Cheese (see pcs/prof-rbg.yaml
# inventory `story_only`) to turn Pinky from a homunculus into a true living being.
endgame_beat: "RBG wishes Pinky into a living being (campaign finale)"
