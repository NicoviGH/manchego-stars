# npcs/sahnar.yaml — Sahnar, the reawakened moon-elf mummy (ch05 recruit)
# Class roster: docs/CLASSES.md (generated). Rationale: docs/decisions.md §Class Mapping.
# Combat is vanilla FE (docs/decisions.md §Combat). damage_type labels are cosmetic.
#
# STATUS: design record. Class + role LOCKED (Nicolas, 2026-06-20); bases/growths below are
# vanilla Myrmidon CLASS data (data_classes.c [CLASS_MYRMIDON - 1], verbatim) -- the same
# class-generic-data-in-YAML / personal-donor-growths-at-build-time split every other cast
# member uses (STAT_DONOR in build_campaign.py pulls Joshua's actual personal growths at
# injection time; this file is the pre-wiring design record, not the final in-ROM numbers).
# NOT yet wired into build_campaign (inert until the recruit wiring lands: free slot + recruit
# logic + portrait + map sprite + a STAT_DONOR entry).

id: sahnar
name: Sahnar

# D&D flavor (from the DM notes): a reawakened mummy in the elven tomb who "is happy to
# help the party as long as they can learn more about druids in this time period." A
# moon-elf, freed by the moonlight-brazier puzzle.
dnd:
  class: Mummy (moon-elf)
  race: Elf (undead)

# ── Role (LOCKED 2026-06-20) ─────────────────────────────────────────────────
# MYRMIDON — fills the dedicated sword crit-duelist hole (we have sword ACCESS via Baxby
# + promos, but no Joshua-style duelist). The elegant moon-elf blade fits; undead-magic
# (Druid/Shaman) was the alt but we're already magic-rich, so sword is the coverage win.
fe_stats:
  class: Myrmidon
  level: 1
  # Vanilla FE8 Myrmidon stats, verbatim from data_classes.c [CLASS_MYRMIDON - 1].
  HP: 16
  STR: 4
  SKL: 9
  SPD: 9
  DEF: 2
  RES: 0
  LCK: 0                    # ClassData has no base luck
  MOV: 5                    # Myrmidon baseMov
  CON: 8
donor:
  character: Joshua         # vanilla Myrmidon — bases/growths reference (data_classes.c)
  why: the game's crit-sword duelist archetype

# ── Growth Rates (% per level) — vanilla Myrmidon growths from data_classes.c ─
growth_rates:
  HP: 70
  STR: 35
  SKL: 40
  SPD: 40
  DEF: 15
  RES: 20
  LCK: 30

promotion:
  branch: [Swordmaster, Assassin]  # vanilla FE8 Myrmidon branch (classchg-data.c [CLASS_MYRMIDON])
  default: Swordmaster

recruited_via: "story — freed from the sarcophagus in the Elven Tomb (Ch5)"
recruit:
  chapter: ch05-the-elven-tomb
  via: story                # light the moonlight brazier to open the sarcophagus

# ── Art (SHIPPED 2026-07-17 — spectral-skeleton direction, Nicolas's call) ────
# Direction change from the design-record "mummy": the FE + broader sprite community has NO
# elegant mummy bust/anim — only skeletal undead. Rather than generate custom art, Sahnar became
# a hooded SKELETAL revenant blademaster (still the reawakened-elf beat; skeleton reads cleaner
# than a green zombie and everything MATCHES across the trio). Decision + sweep: docs/decisions.md
# §Art & Audio "Adopting non-FE sprite sources".
art:
  approach: adopted           # community skeletal-undead assets reskinned to the cast palette; no generation
  portrait:                   # portraits/sahnar.png (+_preview) — APPROVED 2026-07-17
    source: "portraits/vendor/Skeleton Assassin {Glaceo} [F2E].png"   # FE-Repo hooded skeletal assassin bust
    recipe: >
      crop the 96x80 main frame from the 128x112 mug; recolor the red hood/cloak to the map
      sprite's exact slate ramp (deep shadow -> dark slate bulk -> slate highlight, matching
      map_sprites/sahnar.png cloak idx1+idx10); key the green bg to transparent; quantize <=15
      colours. Skull/bone left as-is (already matches the sprite bone). Deadzone verified clean.
    static: true              # no mouth-flap / blink, like the other custom busts
    credit: "Glaceo (FE-Repo, F2E); see CREDITS.md"
  map_sprite:                 # SHIPPED (map_sprites/sahnar{,_mu}.png); palette applied by Nicolas
    base: Bonewalker/Specter  # 16x16 SMS + 32x480 MU, adopted from the Specter overworld sprite
    source: "Bonewalker (U) Specter {Alexsplode} — FE-Repo Map Sprites/Monsters - Basic Types"
    recipe: >
      cast-palette match (bone -> tan/white/grey, cloak -> dark slate idx1+idx10, spectral cyan
      glow dropped for a solid-skeleton read); final index swaps applied by Nicolas in
      map_sprite_swapper. Validates UNIT_ICON_SIZE_16x16 x3 (SMS) + 32x32 x15 (MU).
    palette: cast
    credit: "Alexsplode (FE-Repo, F2E); see CREDITS.md"
  battle_anim:                # DECIDED but injection DEFERRED (needs the #90 FE-anim import pipeline)
    source: "[Skeleton-Custom] [U] Specter {Alexsplode} — FE-Repo Battle Animations/Monsters - Basic Types/1. Sword"
    plan: >
      adopt the Specter sword battle animation in its NATIVE palette (Nicolas: it's polished/
      consistent on its own — do NOT recolor it to the cloak; the skull + spectral glow are the
      throughline). Matched pair with the map sprite (both Alexsplode). Wire via the #90 import
      pipeline when it lands; until then this is a source pointer, not vendored (re-fetch on pickup).
    credit: "Alexsplode (FE-Repo, F2E); see CREDITS.md"
  # NOTE: still inert in build_campaign — recruit wiring (slot, Joshua STAT_DONOR, injection) is
  # ch05-slice work (#25/#19), same scoping as Basil and Lupin. This branch lands the ART only.
