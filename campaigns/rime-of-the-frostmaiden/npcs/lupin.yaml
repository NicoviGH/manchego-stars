# npcs/lupin.yaml — Lupin, the bespectacled talking direwolf (ch04 recruit)
# Class roster: docs/CLASSES.md (generated). Rationale: docs/decisions.md §Class Mapping.
# Combat is vanilla FE (docs/decisions.md §Combat). damage_type labels are cosmetic.
#
# STATUS: design record. Class + role LOCKED (Nicolas, 2026-06-20) — promoted from
# "non-combat sled NPC" to a playable recruit; bases/growths below are vanilla Cavalier CLASS
# data (data_classes.c [CLASS_CAVALIER - 1], verbatim) -- identical to Baxby's, since it's the
# same class (the class-generic-data-in-YAML / personal-donor-growths-at-build-time split
# every cast member uses; STAT_DONOR in build_campaign.py pulls Kyle's actual personal growths
# at injection time, distinct from Baxby's Franz, so the two Cavaliers won't be stat-twins
# in-ROM even though this design record shows the same class baseline for both).
# NOT yet wired into build_campaign (inert until the recruit wiring lands: free slot + recruit
# logic + portrait + map sprite + a STAT_DONOR entry).
# Voice bible: ../lore/lupin.md (locked 2026-07-03 with the ch04 dialogue pass — blunt
# pack-pragmatist; table-canon character grounded in the book's awaken magic).

id: lupin
name: Lupin
# Provisional death line (blunt pack-pragmatist voice); finalized in the Stage-4 ch04 dialogue-pass.
death_quote: "The pack... runs on without me. See them to the far side -- that was the whole of the bargain."

# D&D flavor (from the DM notes): the leader of the direwolf pack in the White Moose forest
# — "wears glasses and has the ability to speak"; Marty talks the pack into joining, and
# they take to the reins of the Rolling Cheddar beside Baxby.
dnd:
  class: Direwolf (awakened)
  race: Direwolf

# ── Role (LOCKED 2026-06-20: reskin lever) ───────────────────────────────────
# CAVALIER under the hood, WOLF sprite on top — no beast class needed; the wolf IS the
# mount. Gives mounted melee (sword/lance) and thickens our thin cavalry line. Pairs with
# Baxby (axe-beak Cavalier) as the "beast-cavalry" sled team — on-theme with the campaign's
# befriend-the-creatures motif. Custom map sprite + battle anim required (#38/#39).
fe_stats:
  class: Cavalier
  level: 1
  # Vanilla FE8 Cavalier stats, verbatim from data_classes.c [CLASS_CAVALIER - 1].
  HP: 20
  STR: 5
  SKL: 2
  SPD: 5
  DEF: 6
  RES: 0
  LCK: 0                    # ClassData has no base luck
  MOV: 7                    # Cavalier baseMov (mounted)
  CON: 9
donor:
  character: Kyle           # vanilla Cavalier — bases/growths reference (Franz is Baxby's ref)
  why: fresh Cavalier = full growth runway; distinct donor from Baxby

# ── Growth Rates (% per level) — vanilla Cavalier growths from data_classes.c ─
growth_rates:
  HP: 75
  STR: 35
  SKL: 40
  SPD: 28
  DEF: 15
  RES: 15
  LCK: 30

promotion:
  branch: [Paladin, "Great Knight"]   # vanilla FE8 Cavalier branch (classchg-data.c [CLASS_CAVALIER])
  default: Paladin

recruited_via: "story — Marty talks the direwolf pack into the sled team (Ch4)"
recruit:
  chapter: ch04-the-white-moose
  via: story
  initial_faction: red    # Joshua-style: placed RED (the hostile pack's leader), Marty's Talk CUSAs him blue

# ── Art (reskin lever: stock chassis, custom skin) ───────────────────────────
art:
  approach: custom            # direwolf map sprite + battle anim over the Cavalier chassis (#38/#39)
  note: "the wolf is the mount — no rider; sibling treatment to Baxby's axe-beak"
  render:                             # portraits/lupin.png — byte-reproducible bust
    ref: "campaigns/rime-of-the-frostmaiden/portraits/vendor/Hipster Wolf Head With Glasses {TotalityDesigns}.png"
                                      # original vendored in-repo (Redbubble listing, Nicolas 2026-07-03)
    crop: [-206, 0, 1033, 1032]       # out-of-bounds x pads as background: full head+mane at 1.2 aspect
    zoom: 1.0                         # full frame; the wide crop already clears the dead corners (0 px clipped)
    hand_pass: lupin_darken.py        # ref ink is warm charcoal; deepen outline/eyes/glasses to true black
    credit: "TotalityDesigns (Redbubble) — see CREDITS.md"
  # ── Map sprite (SHIPPED 2026-07-16) — adopted Lycanroc, Nicolas's direction ──
  # map_sprites/lupin.png (wait) + lupin_mu.png (MU walk), indexed on the cast palette.
  # Source: "Rockruff & Lycanroc Overworlds" by princess-phoenix (DeviantArt, CC-BY 3.0) —
  # the Midday Lycanroc form (quadruped wolf, 4-direction 4-frame overworld walk). Credits: CREDITS.md.
  # Build recipe (tools/-driven, no generated art):
  #   1. Extract Midday BLUE variant (sheet 8x16 of 32px; rows 4-7 = Midday, cols 4-7 = blue):
  #      down=row4, left=row5, right=row6, up=row7.
  #   2. Recolor to the cast GREY ramp by luminance (indices [1,2,3,11,4]) — matches Lupin's
  #      grey portrait fur (portraits/lupin.png). No hue kept; the source blue/pink drop to grey.
  #   3. Hand-draw GLASSES per frame, anchored to the detected eye (the source's green eye-dot,
  #      which tracks the head-bob): style = bold hipster frame raised +1px, OPAQUE white lens
  #      (cast idx4), near-black frame (cast idx1), dark pupil dot (cast idx2). On down + both
  #      sides; the UP (back) run has no face, so no glasses. Nicolas approved this exact spec.
  map_sprite:
    base: Gwyllgi             # geometry token ONLY: {3 frames, UNIT_ICON_SIZE_32x32} wait-table
                              # row (unit_icon_wait_data.c // 77) — FE8's own dire-wolf, apt AND
                              # correct geometry. NOT the visible sprite. Class stays Cavalier.
    footprint: 32x32          # quadruped ~27px wide -> needs the 32x32 monster size class
    wait: down-idle bob, frames [0,1,2]                    # lupin.png  = 32x96  (3x 32x32)
    mu: side[0-4]=left walk, down[5-9], up[10-14] (no glasses); each run frames [0,1,2,3,0]
        # lupin_mu.png = 32x480 (15x 32x32); right = engine H-flip of the side run
    palette: cast             # cast_palette.png; grey ramp + glasses idx1/2/4
    credit: "princess-phoenix (DeviantArt, CC-BY 3.0); see CREDITS.md"
  # Battle anim still deferred (#39). PMD SpriteCollab has Lycanroc (#0745) with a full side-view
  # anim set (Attack/Charge/Shoot) if we want a matching-style battle anim later — rides #90's pipeline.
