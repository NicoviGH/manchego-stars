# npcs/baxby.yaml — Baxby the axe-beak (ch01 recruit; the party's sled-puller / mount)
# Class roster: docs/CLASSES.md (generated). Rationale: docs/decisions.md §Class Mapping.
# Combat is vanilla FE (docs/decisions.md §Combat). damage_type labels are cosmetic.
#
# STATUS: WIRED (#23 recruit pass). Baxby is a real classed cast member (PORTRAIT_MAP ->
# Forde slot, STAT_DONOR -> Franz). Recruited by the ch01-ending cutscene (Marty wins him
# over), so cast_available_at() puts him on the ch02+ prep roster automatically -- no on-map
# recruit event (that's Trex's Colm-style talk recruit). He uses the STOCK Cavalier map
# sprite for now; his custom sheet is PARKED (map_sprites/_parked/baxby.png -- geometry
# mismatch, see art.map_sprite below) as a follow-up art task.

id: baxby
name: Baxby
# fe_name not needed — "Baxby" is 5 chars, well under FE8's 12-char name buffer.
# Falls-in-battle quote (#6). Register from his ch01-ending recruit lines (ch01 YAML):
# a gruff, dignified veteran teamster — "honest terms / hauled freight over this ice" —
# so his death is a hauler's, framed as the load and the road, not sentiment.
death_quote: "...Load's too heavy now. Get the sled home without me — that was always the job."

# ── Recruit ──────────────────────────────────────────────────────────────────
# Purchased at the Bryn Shander market for 200 GP (ch01 post_chapter); first recruit.
# Won over in the ch01 ending cutscene (Marty's promise of food + shelter).
recruit:
  chapter: ch01-the-iron-trail
  cost_gp: 200
  via: market               # post_chapter.units_available_to_recruit

# ── Donor class (Nicolas, 2026-06-17) ────────────────────────────────────────
# Use the SECOND mounted unit the vanilla game gives you — FRANZ, the fresh Cavalier —
# NOT Seth, the prepromote Paladin (Jagen) with little growth runway left. Baxby is a
# fresh Cavalier so he keeps full growth potential over the campaign. (Franz's actual
# CHARACTER slot is taken by Wolfram in our hack, so Baxby rides a free slot authored to
# the Cavalier class profile below; Franz's character growths 80/40/40/50/25/20/40 are
# the reference if we want to nudge him toward the fresh-cavalier ceiling at balance.)
donor:
  mounted_order: 2          # Seth(Paladin)=1, Franz(Cavalier)=2
  character: Franz
  why: fresh Cavalier = full growth runway (vs Seth's promoted Jagen)

# ── FE8 stats (vanilla Cavalier class data, verbatim from data_classes.c) ─────
# Authored FE-style (no 5e conversion). Sword + Lance mount; beak/claws are flavor on a
# vanilla lance/sword (the weapon TYPE drives the triangle, the bird look rides the art).
fe_stats:
  class: Cavalier
  level: 1
  HP: 20
  STR: 5
  SKL: 2
  SPD: 5
  DEF: 6
  RES: 0
  LCK: 0                    # ClassData has no base luck
  MOV: 7                    # Cavalier baseMov (mounted)
  CON: 9

# ── Growth Rates (% per level) — vanilla Cavalier class growths from data_classes.c ──
growth_rates:
  HP: 75
  STR: 35
  SKL: 40
  SPD: 28
  DEF: 15
  RES: 15
  LCK: 30

# ── Promotion (FE8 branched Cavalier) ─────────────────────────────────────────
promotion:
  branch: [Paladin, "Great Knight"]   # vanilla Cavalier branch (classchg-data.c [CLASS_CAVALIER])
  default: Paladin

# ── Inventory (joins with stock gear) ─────────────────────────────────────────
inventory:
  - id: iron-lance
    name: "Iron Lance"
    fe_base: iron-lance
    fe_weapon_type: Lance
    damage_type: piercing             # cosmetic — the beak/talons
  - id: iron-sword
    name: "Iron Sword"
    fe_base: iron-sword
    fe_weapon_type: Sword
    damage_type: slashing             # cosmetic

# ── Art ────────────────────────────────────────────────────────────────────────
# Portrait + map sprite are DONE (committed). Battle anim deferred (#39).
art:
  approach: vendor-reskin
  render:                             # portraits/baxby.png — byte-reproducible bust
    ref: "References/PCs/Baxby.png"   # axe-beak art from the Frostmaiden book, Gemini-modified (Nicolas)
    crop: [780, 18, 1920, 940]
    flip_h: true                      # face FE8-canonical screen-left
    zoom: 0.88                        # max size with the whole beak clear of the dead corners
    hand_pass: null
    credit: "WotC book art (axe-beak) + Google Gemini; see CREDITS.md"
  map_sprite:                         # PARKED at map_sprites/_parked/baxby.png (not injected yet).
    # Baxby is a real unit NOW on the stock vanilla Cavalier map sprite. His hand-painted custom
    # sheet is 32x32-per-frame (Chocobo-sized), but the vanilla Cavalier donor SMS is 16x32 --
    # a geometry mismatch inject_map_sprites can't reconcile (donor_sms_geometry('Cavalier') =
    # 16x32). To ship the custom sprite it must be re-fit to a 16x32 mounted donor OR ride a
    # matching 32x32 donor + committed _mu (cf. Trex: base is the VANILLA token 'Thief', with the
    # FE-Repo pixels in `source`, and a committed trex_mu.png). Follow-up art task.
    base: Cavalier                    # vanilla geometry token (once the pixels are re-fit to 16x32)
    source: "Chocobo Rider (F) Lance {SkidMarc25}"   # FE-Repo pixels; rider+lance stripped, snowy recolor
    size: 16x32                       # target (vanilla Cavalier SMS); current _parked art is 32x32
    palette: cast                     # cast_palette.png (cast OBJ bank)
    credit: "FE-Repo Chocobo Rider {SkidMarc25}; see CREDITS.md"
