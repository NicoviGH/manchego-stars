# npcs/brie.yaml — Brie, a BALLISTA construct built by Prof. R.B. Geenius.
# Lean unit definition (mechanics only). Narrative/flavor lives in
# ../lore/pepperjack-and-brie.md. ROLE LOCKED (Nicolas, 2026-06-20): Brie is a vanilla FE8
# BALLISTA — a map-placed siege emplacement the party mans, NOT a roster recruit (mirror of
# Pepperjack, same cannon-golem chassis). RBG the Artillerist builds the pair; appears from
# the vanilla ballista era (FE8 Ch10 "Revolt at Carcino" -> our ~Ch10), alongside/after
# Pepperjack. See pepperjack.yaml for the vanilla-ballista implementation note.

id: brie
name: Brie
gender: female                                    # the only female of the 10 cast (drives CA_FEMALE)
portrait_ref: portraits/brie.png                  # shipped 96×80 bust (own portrait, pink)
portrait_source: "References/PCs/Pixel Brie.png"   # own single-bust ref (split from the combined concept)

# ── Custom Art Brief (decided 2026-06-01 portrait walkthrough) ───────────────────
# ALL parts custom indexed-palette art. Follow the concept ref faithfully.
# Brie was built by RBG FOR Pepperjack (Adam/Eve framing) — they are a COUPLE, NOT twins/siblings.
# Mirror design of Pepperjack in opposing palette: Brie = pink+cyan, Pepperjack = grey+red.
art:
  render:                     # exact reproduction of the shipped bust (tools/ref_to_bust.py)
    flip_h: true               # bust faces right (mirror of Pepperjack); flip to FE8's canonical screen-left facing
    ref: "References/PCs/Pixel Brie.png"
    crop: [20, 40, 2150, 1800]     # ref pixels, ~1.2 aspect — whole-cannon framing (mirrors Pepperjack)
    zoom: 0.72                     # mirrors Pepperjack; fuse + barrel bore mostly clear FE8's dead corners (30 px residual)
    # No hand pass: pngquant renders the cyan star + glam eye (blue shadow/purple iris) natively.
  approach: custom
  fidelity: faithful
  build_when: with-batch      # pixel alongside the 7 PCs, though class/recruit is post-MVP
  must_keep:                  # tells that make the bust read as "Brie"
    - hot-pink cannon-golem body + barrel snout
    - one big GLAM eye — blue eyeshadow, purple iris, eyelashes
    - cyan/teal star decal
    - pink rope fuse curling off the top
    - toothy grin (glam counterpart to Pepperjack's chili-stache)
  composition: three-quarter-profile   # as drawn — mirror Pepperjack's framing (face the pair toward each other)
  face: visible               # glam eye blinks, grin moves for talk
  expression: glam-confident  # the poised, fabulous one of the pair
  palette_plan: >             # rough 16-color budget (incl. index-0 transparent)
    pinks ×4 (hot→deep), barrel-bore dark-magenta, eye (blue shadow + purple iris + white),
    cyan star, pink fuse, boot-pink, black outline. Mirror of Pepperjack's palette.

# NOT a roster recruit — a vanilla map ballista, flavored as RBG's siege construct (mirror
# of Pepperjack). Placed on relevant maps from the ballista era (~our Ch10), the party mans it.
recruited_via: "not a recruit — vanilla map ballista (RBG's siege), from ~Ch10"
built_by: prof-rbg
paired_with: pepperjack         # the matching ballista, placed together when both appear

# ── FE role: BALLISTA (siege), the VANILLA way — LOCKED 2026-06-20 ──────────────
# Same as Pepperjack (see pepperjack.yaml): a stock FE8 map ballista (terrain + object), not
# a unit class. No recruit slot, no deploy_limit cost; "Brie" is custom art on the emplacement.
fe_stats:
  class: null                   # a ballista is a map object, not a unit class
  role: ballista                # vanilla siege emplacement (ITEM_BALLISTA_* on a ballista tile)
  level: null

# weapon: Ballista / Iron Ballista / Killer Ballista (ITEM_BALLISTA_*).
