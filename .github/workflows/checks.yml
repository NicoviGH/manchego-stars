name: checks

# Lightweight drift guard. A full `make` is intentionally NOT run here: it needs the
# copyrighted base ROM (gitignored) and the agbcc toolchain. Instead we catch the cheap,
# high-value failures -- broken tooling, unparseable campaign data, and docs that point at
# files which no longer exist (the kind of drift this repo has bitten on before).

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        # no submodules: we don't build the ROM here, and fireemblem8u is huge.

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install pyyaml

      - name: Python tooling compiles
        run: python -m compileall -q tools

      - name: Campaign YAML parses
        run: |
          python - <<'PY'
          import glob, sys, yaml
          bad = 0
          for f in glob.glob("campaigns/**/*.yaml", recursive=True):
              try:
                  yaml.safe_load(open(f, encoding="utf-8"))
              except Exception as e:
                  print(f"YAML PARSE FAIL: {f}: {e}"); bad += 1
          print("ok" if not bad else f"{bad} bad file(s)")
          sys.exit(1 if bad else 0)
          PY

      - name: Docs don't reference missing tools (drift guard)
        run: |
          python - <<'PY'
          import glob, re, os, sys
          # Any tools/<name>.py or tools/<name>.rb referenced in a tracked doc must exist.
          # (.ts refs are allowed: decisions.md documents the abandoned TS plan on purpose.)
          pat = re.compile(r'tools/([\w-]+\.(?:py|rb))')
          docs = glob.glob("docs/**/*.md", recursive=True) + ["CLAUDE.md", "README.md", "HANDOFF.md"]
          missing = []
          for d in docs:
              if not os.path.isfile(d):
                  continue
              for m in pat.findall(open(d, encoding="utf-8").read()):
                  if not os.path.isfile(os.path.join("tools", m)):
                      missing.append((d, m))
          for d, m in missing:
              print(f"DRIFT: {d} references tools/{m} which does not exist")
          sys.exit(1 if missing else 0)
          PY

      - name: No resurrected dead concepts in docs (denylist)
        run: |
          python - <<'PY'
          import glob, re, os, sys
          # Terms that are NEVER legitimate in vision/ops docs -- abandoned tools, dead
          # code symbols, retired implementation phrases. decisions.md is EXEMPT: it's the
          # ADR log that records what we abandoned (e.g. "supersedes the flat-E placeholder").
          # Context-dependent terms (Event Assembler / devkitARM / "damage-type") are NOT
          # here because they appear legitimately in negation ("no Event Assembler").
          BANNED = [r'build-campaign\.ts', r'build-events\.ts', r'pull-srd', r'map-class\.ts',
                    r'srd-snapshot', r'open5e-snapshot', r'CLASS_WEAPON', r'WPN_EXP_E',
                    r'zeroed.{0,3}growth', r'flat-?E rank', r'pure[- ]class growth']
          files = [f for f in glob.glob("**/*.md", recursive=True)
                   if os.path.basename(f) != "decisions.md" and not f.startswith("fireemblem8u/")]
          pat = re.compile("|".join(BANNED), re.I)
          hits = [f"{f}:{i}: {pat.search(l).group(0)}" for f in files
                  for i, l in enumerate(open(f, encoding='utf-8'), 1) if pat.search(l)]
          for h in hits:
              print("DEAD CONCEPT:", h)
          sys.exit(1 if hits else 0)
          PY

  # The real "make green" gate. Mirrors the fireemblem8u decomp's own build.yml: a
  # MOCK base ROM (random 16MB) lets `make` compile + link the full ROM without the
  # copyrighted original -- which is what we want (we diverge from vanilla anyway).
  # This catches real breakage: bad C, missing symbols, malformed data tables, and a
  # broken build_campaign.py injection.
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential binutils-arm-none-eabi libpng-dev
          python3 -m pip install ttp numpy pillow pyyaml

      - name: Install agbcc into the decomp
        run: |
          git clone https://github.com/pret/agbcc.git
          cd agbcc && ./build.sh && ./install.sh "$GITHUB_WORKSPACE/fireemblem8u"

      - name: Build decomp tools
        run: cd fireemblem8u && ./build_tools.sh

      - name: Mock base ROM (no copyrighted ROM needed to verify the build links)
        run: head -c 16M /dev/urandom > fireemblem8u/baserom.gba

      - name: make green (inject campaign + build ROM)
        run: make CAMPAIGN=rime-of-the-frostmaiden
