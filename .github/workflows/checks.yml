name: checks

# Lightweight drift guard. A full `make` is intentionally NOT run here: it needs the
# copyrighted base ROM (gitignored) and the agbcc toolchain. Instead we catch the cheap,
# high-value failures -- broken tooling, unparseable campaign data, and docs that point at
# files which no longer exist (the kind of drift this repo has bitten on before).

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        # no submodules: we don't build the ROM here, and fireemblem8u is huge.

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install pyyaml

      # Same drift guard the git pre-commit hook and `make check` run -- ONE source of
      # check logic (tools/check.py): tooling compiles, YAML parses, no doc references a
      # missing tool, no resurrected dead concepts.
      - name: Drift guard (tools/check.py)
        run: python3 tools/check.py

  # The real "make green" gate. Mirrors the fireemblem8u decomp's own build.yml: a
  # MOCK base ROM (random 16MB) lets `make` compile + link the full ROM without the
  # copyrighted original -- which is what we want (we diverge from vanilla anyway).
  # This catches real breakage: bad C, missing symbols, malformed data tables, and a
  # broken build_campaign.py injection.
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential binutils-arm-none-eabi libpng-dev
          python3 -m pip install ttp numpy pillow pyyaml

      - name: Install agbcc into the decomp
        run: |
          git clone https://github.com/pret/agbcc.git
          cd agbcc && ./build.sh && ./install.sh "$GITHUB_WORKSPACE/fireemblem8u"

      - name: Build decomp tools
        run: cd fireemblem8u && ./build_tools.sh

      - name: Mock base ROM (no copyrighted ROM needed to verify the build links)
        run: head -c 16M /dev/urandom > fireemblem8u/baserom.gba

      - name: make green (inject campaign + build ROM)
        run: make CAMPAIGN=rime-of-the-frostmaiden
